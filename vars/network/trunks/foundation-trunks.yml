---
# Trunk example managed by the native `bigip_trunk` module.
# Use this model when physical interfaces should be grouped into a logical uplink before VLAN attachment.
bigip_trunks:
  - name: "trunk_app_uplinks"
    description: "Application-facing aggregated uplinks"
    interfaces:
      - "1.3"
      - "1.4"
    lacp_enabled: true
    lacp_mode: "active"
    lacp_timeout: "short"
    link_selection_policy: "maximum-bandwidth"
    frame_distribution_hash: "source-destination-ip"
