---
# BIG-IP day-0 license example for the bootstrap playbook.
# This file is consumed by `playbooks/bootstrap.yml` before the steadier `vars/system/*` trees are applied.
# Cross-file linkage: after licensing succeeds, operators typically continue with `vars/bootstrap/management/foundation-management.yml`
# and then hand off to `vars/system/*` plus `vars/ha/*` for ongoing Git-managed operation.
# Supported fields: `license_key`, `accept_eula`, `license_server`, `addon_keys`, `force`, and `state`.
bootstrap_licenses:
  - license_key: "AAAAA-BBBBB-CCCCC-DDDDD-EEEEEEE"
    accept_eula: true
    license_server: "activate.f5.com"
