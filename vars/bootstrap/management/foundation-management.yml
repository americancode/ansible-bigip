---
# BIG-IP day-0 management reachability example for the bootstrap playbook.
# This file is consumed by `playbooks/bootstrap.yml` after the device is reachable with temporary credentials.
# Cross-file linkage: the `address` here becomes the long-lived management endpoint that AWX inventory `f5_host`
# and CLI inventory entries should target after the bootstrap run completes. The broader steady-state setup then moves
# into `vars/system/hostname/foundation-hostname.yml`, `vars/system/dns/foundation-dns.yml`, and `vars/ha/*`.
# Supported fields: `address` (CIDR), `gateway`, and optional `route_name`.
bootstrap_management:
  - address: "192.0.2.10/24"
    gateway: "192.0.2.1"
    route_name: "default"
