---
# AWX usage:
# 1. Put the target BIG-IP management endpoint in the inventory host var `f5_host`.
# 2. Create a Custom Credential Type from `bigip-credential-config.yaml`.
# 3. Create a Credential from that type for auth only.
# 4. Attach the Credential to the Job Template.
provider:
  server: "{{ f5_host | default(lookup('env', 'F5_HOST'), true) | default('bigip-mgmt.my.domain.com', true) }}"
  user: "{{ lookup('env', 'F5_USERNAME') | default('admin', true) }}"
  password: "{{ lookup('env', 'F5_PASSWORD') }}"
  server_port: "{{ lookup('env', 'F5_SERVER_PORT') | default(443, true) }}"
  validate_certs: "{{ lookup('env', 'F5_VALIDATE_CERTS') | default(false, true) }}"
