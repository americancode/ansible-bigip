---
# Example GTM topology records for source-to-destination weighted DNS steering.
# Topology records define which pool serves which geographic source, with weights.
# Source and destination can reference regions, datacenters, pools, subnets, ISPs, continents, or countries.
gtm_topology_records:
  - source:
      - region: "us-east"
    destination:
      - pool: "/Common/pool_app_east"
    weight: 100
    description: "US East traffic to East pool"

  - source:
      - region: "us-west"
    destination:
      - pool: "/Common/pool_app_west"
    weight: 100
    description: "US West traffic to West pool"

  - source:
      - region: "emea"
    destination:
      - pool: "/Common/pool_app_europe"
    weight: 100
    description: "EMEA traffic to Europe pool"

  - source:
      - region: "apac"
    destination:
      - pool: "/Common/pool_app_asia"
    weight: 100
    description: "APAC traffic to Asia pool"

  - source:
      - subnet: "10.0.0.0/8"
    destination:
      - pool: "/Common/pool_internal"
    weight: 100
    description: "Internal RFC1918 traffic to internal pool"
