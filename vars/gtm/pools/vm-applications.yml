      - server: "bigip-east"
        virtual_server: "vs_reporting_east_443"
        address: "10.201.0.81"
        port: 443
      - server: "bigip-west"
        virtual_server: "vs_reporting_west_443"
        address: "10.202.0.81"
        port: 443
