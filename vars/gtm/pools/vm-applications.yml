---
# Verbose/shared-object GTM example.
# These GTM pools are referenced by `vars/gtm/wide_ips/vm-applications.yml`.
# The `server` field links to `vars/gtm/servers/regional-bigips.yml`.
# The `virtual_server` field links to repo-known LTM virtual servers in
# `vars/ltm/virtual_servers/vm-apps/business-apps.yml`.
# When `address` and `port` are omitted, `gtm.yml` resolves them from that LTM virtual server definition.
# Monitor aliases such as `inventory_https` expand through `vars/gtm/pools/settings.yml`.
gtm_pools:
  - name: "pool_inventory_global"
    record_type: "a"
    preferred_lb_method: "topology"
    monitors:
      - "inventory_https"
    members:
      - server: "bigip-east"
        virtual_server: "vs_inventory_east_443"
# This variant shows the optional explicit override for the lookup target.
# It is only needed when the GTM member name and the LTM virtual server name differ.
      - server: "bigip-west"
        virtual_server: "vs_inventory_west_443"
        ltm_virtual_server: "vs_inventory_west_443"

  - name: "pool_reporting_global"
    record_type: "a"
    preferred_lb_method: "topology"
    monitors:
      - "reporting_https"
    members:
      - server: "bigip-east"
        virtual_server: "vs_reporting_east_443"
      - server: "bigip-west"
        virtual_server: "vs_reporting_west_443"
