---
# Per-directory defaults for first-class GTM pools under `vars/gtm/pools/`.
# Files in this subtree can use short monitor aliases defined below.
gtm_pool_defaults:
  enabled: true
  alternate_lb_method: "round-robin"
  fallback_lb_method: "none"

gtm_member_defaults:
  enabled: true

# `inventory_https` and similar aliases expand to repo-created GTM monitors from
# `vars/gtm/monitors/platform-monitors.yml`.
gtm_monitor_sets:
  postgres_tcp:
    - "/Common/mon_gtm_postgres_tcp"
  inventory_https:
    - "/Common/mon_gtm_inventory_https"
  reporting_https:
    - "/Common/mon_gtm_reporting_https"
