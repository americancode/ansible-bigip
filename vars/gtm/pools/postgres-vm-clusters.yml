---
# Another verbose GTM example.
# `pool_pg_vm_global` is referenced by `vars/gtm/wide_ips/postgres.yml`.
# Here the member address and port are written explicitly instead of being resolved from LTM.
# That is the more verbose model when you want the GTM file to carry the full endpoint data itself.
gtm_pools:
  - name: "pool_pg_vm_global"
    record_type: "a"
    preferred_lb_method: "global-availability"
    monitors:
      - "postgres_tcp"
    members:
      - server: "bigip-east"
        virtual_server: "vs_pg_vm_east_5432"
        address: "10.201.0.70"
        port: 5432
      - server: "bigip-west"
        virtual_server: "vs_pg_vm_west_5432"
        address: "10.202.0.70"
        port: 5432
