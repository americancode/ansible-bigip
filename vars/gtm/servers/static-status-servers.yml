---
# Example GTM static servers.
# These are not BIG-IP devices. They represent generic hosts managed
# directly in GTM and are useful for external or non-F5-backed services.
gtm_servers:
  - name: "status-east-1"
    server_type: "generic-host"
    datacenter: "dc-east"
    devices:
      - name: "status-east-1"
        address: "203.0.113.20"
    virtual_server_discovery: "disabled"
    link_discovery: "disabled"

  - name: "status-west-1"
    server_type: "generic-host"
    datacenter: "dc-west"
    devices:
      - name: "status-west-1"
        address: "203.0.113.30"
    virtual_server_discovery: "disabled"
    link_discovery: "disabled"
