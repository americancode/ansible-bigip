---
gtm_wide_ips:
  - name: "grafana.my.domain.com"
    record_type: "a"
    pool_lb_method: "topology"
    pools:
      - name: "pool_grafana_primary"
        ratio: 1
        preferred_lb_method: "topology"
        alternate_lb_method: "global-availability"
        fallback_lb_method: "round-robin"
        default_monitors:
          - "/Common/mon_https_grafana"
        members:
          - server: "gtm-ltm-site-a"
            virtual_server: "gtm_vs_a_grafana_443"
            address: "10.10.11.102"
            port: 443
          - server: "gtm-ltm-site-b"
            virtual_server: "gtm_vs_b_grafana_443"
            address: "10.10.12.102"
            port: 443
