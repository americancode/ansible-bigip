---
# Concise/hybrid GTM example.
# Each Wide IP embeds its GTM pools inline so one file tells the story for the service.
# The embedded pools are authoring-time convenience data; `gtm/prep.yml` compiles them into
# canonical GTM pool objects and rewrites the Wide IP to reference those pools before runtime apply.
# The embedded `members` point to GTM servers in `vars/gtm/servers/regional-bigips.yml`.
# The `virtual_server` strings point to repo-known LTM virtual servers in:
# - `vars/ltm/intents/clusters/rke2-east/platform-cluster.yml`
# - `vars/ltm/intents/clusters/rke2-west/platform-cluster.yml`
# Here the member `address` and `port` are still shown explicitly for readability, but they could
# be omitted when the repo-known LTM virtual server should be the source of truth.
# Monitor aliases such as `platform_https` expand through the sibling `settings.yml`.
gtm_wide_ips:
  - name: "platform.apps.example.com"
    record_type: "a"
    pool_lb_method: "topology"
    pools:
      - name: "pool_platform_apps_east"
        preferred_lb_method: "global-availability"
        monitors:
          - "platform_https"
        members:
          - server: "bigip-east"
            virtual_server: "vs_rke2_east_traefik_443"
            address: "10.201.0.30"
            port: 443
      - name: "pool_platform_apps_west"
        preferred_lb_method: "global-availability"
        monitors:
          - "platform_https"
        members:
          - server: "bigip-west"
            virtual_server: "vs_rke2_west_traefik_443"
            address: "10.202.0.30"
            port: 443

  - name: "rke2-api.platform.example.com"
    record_type: "a"
    pool_lb_method: "global-availability"
    pools:
      - name: "pool_rke2_api_east"
        preferred_lb_method: "round-robin"
        default_monitors:
          - "kubeapi_tcp"
        members:
          - server: "bigip-east"
            virtual_server: "vs_rke2_east_kubeapi_6443"
            address: "10.201.0.20"
            port: 6443
      - name: "pool_rke2_api_west"
        preferred_lb_method: "round-robin"
        default_monitors:
          - "kubeapi_tcp"
        members:
          - server: "bigip-west"
            virtual_server: "vs_rke2_west_kubeapi_6443"
            address: "10.202.0.20"
            port: 6443

  - name: "rke2-registration.platform.example.com"
    record_type: "a"
    pool_lb_method: "global-availability"
    pools:
      - name: "pool_rke2_registration_east"
        preferred_lb_method: "round-robin"
        monitors:
          - "registration_tcp"
        members:
          - server: "bigip-east"
            virtual_server: "vs_rke2_east_registration_9345"
            address: "10.201.0.20"
            port: 9345
      - name: "pool_rke2_registration_west"
        preferred_lb_method: "round-robin"
        monitors:
          - "registration_tcp"
        members:
          - server: "bigip-west"
            virtual_server: "vs_rke2_west_registration_9345"
            address: "10.202.0.20"
            port: 9345

  - name: "argocd.platform.example.com"
    record_type: "a"
    pool_lb_method: "topology"
    pools:
      - name: "pool_argocd_east"
        preferred_lb_method: "global-availability"
        monitors:
          - "argocd_https"
        members:
          - server: "bigip-east"
            virtual_server: "vs_rke2_east_traefik_443"
            address: "10.201.0.30"
            port: 443
      - name: "pool_argocd_west"
        preferred_lb_method: "global-availability"
        monitors:
          - "argocd_https"
        members:
          - server: "bigip-west"
            virtual_server: "vs_rke2_west_traefik_443"
            address: "10.202.0.30"
            port: 443

  - name: "grafana.platform.example.com"
    record_type: "a"
    pool_lb_method: "topology"
    pools:
      - name: "pool_grafana_east"
        preferred_lb_method: "global-availability"
        monitors:
          - "grafana_https"
        members:
          - server: "bigip-east"
            virtual_server: "vs_rke2_east_traefik_443"
            address: "10.201.0.30"
            port: 443
      - name: "pool_grafana_west"
        preferred_lb_method: "global-availability"
        monitors:
          - "grafana_https"
        members:
          - server: "bigip-west"
            virtual_server: "vs_rke2_west_traefik_443"
            address: "10.202.0.30"
            port: 443
