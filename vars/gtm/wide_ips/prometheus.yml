---
gtm_wide_ips:
  - name: "prometheus.my.domain.com"
    record_type: "a"
    pool_lb_method: "global-availability"
    pools:
      - name: "pool_prometheus_primary"
        ratio: 1
        preferred_lb_method: "global-availability"
        alternate_lb_method: "round-robin"
        fallback_lb_method: "none"
        default_monitors:
          - "/Common/mon_tcp_prometheus"
        members:
          - server: "gtm-ltm-site-a"
            virtual_server: "gtm_vs_a_prometheus_9090"
            address: "10.10.11.130"
            port: 9090
          - server: "gtm-ltm-site-b"
            virtual_server: "gtm_vs_b_prometheus_9090"
            address: "10.10.12.130"
            port: 9090
