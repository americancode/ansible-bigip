---
# Verbose/shared-object GTM Wide IP example.
# Each Wide IP references first-class GTM pools from `vars/gtm/pools/vm-applications.yml`.
# Those GTM pools then reference first-class GTM servers in `vars/gtm/servers/regional-bigips.yml`
# and repo-known LTM virtual servers in `vars/ltm/virtual_servers/vm-apps/business-apps.yml`.
gtm_wide_ips:
  - name: "inventory.internal.example.com"
    record_type: "a"
    pool_lb_method: "topology"
    pools:
# Magic reference string:
# `name: "pool_inventory_global"` binds to the GTM pool object with the same name in
# `vars/gtm/pools/vm-applications.yml`.
      - name: "pool_inventory_global"
        ratio: 1

  - name: "reporting.internal.example.com"
    record_type: "a"
    pool_lb_method: "topology"
    pools:
      - name: "pool_reporting_global"
        ratio: 1
