---
gtm_monitors:
  - name: "mon_https_grafana"
    type: "https"
    send: "GET /login HTTP/1.1\\r\\nHost: grafana.my.domain.com\\r\\nConnection: close\\r\\n\\r\\n"
    receive: "200 OK"
    interval: 30
    timeout: 91
    probe_timeout: 5
    compatibility: true

  - name: "mon_https_api"
    type: "https"
    send: "GET /healthz HTTP/1.1\\r\\nHost: api.my.domain.com\\r\\nConnection: close\\r\\n\\r\\n"
    receive: "ok"
    interval: 15
    timeout: 46
    probe_timeout: 5

  - name: "mon_tcp_prometheus"
    type: "tcp"
    send: ""
    receive: ""
    interval: 30
    timeout: 91

  - name: "mon_tcp_postgres"
    type: "tcp"
    send: ""
    receive: ""
    interval: 15
    timeout: 46

  - name: "mon_https_status"
    type: "https"
    send: "GET /health HTTP/1.1\\r\\nHost: status.my.domain.com\\r\\nConnection: close\\r\\n\\r\\n"
    receive: "200 OK"
    interval: 15
    timeout: 46
    probe_timeout: 5
