---
enable_gtm: false

gtm_monitors:
  - name: "mon_https_grafana"
    type: "https"
    send: "GET /login HTTP/1.1\\r\\nHost: grafana.my.domain.com\\r\\nConnection: close\\r\\n\\r\\n"
    receive: "200 OK"
    interval: 30
    timeout: 91
    probe_timeout: 5
    compatibility: true

  - name: "mon_https_api"
    type: "https"
    send: "GET /healthz HTTP/1.1\\r\\nHost: api.my.domain.com\\r\\nConnection: close\\r\\n\\r\\n"
    receive: "ok"
    interval: 15
    timeout: 46
    probe_timeout: 5

  - name: "mon_tcp_prometheus"
    type: "tcp"
    send: ""
    receive: ""
    interval: 30
    timeout: 91

gtm_servers:
  - name: "gtm-ltm-site-a"
    address: "192.0.2.10"
    datacenter: "dc-east"
  - name: "gtm-ltm-site-b"
    address: "192.0.2.11"
    datacenter: "dc-east"
  - name: "gtm-ltm-site-c"
    address: "192.0.2.12"
    datacenter: "dc-west"

gtm_wide_ips:
  - name: "grafana.my.domain.com"
    record_type: "a"
    pool_lb_method: "topology"
    pools:
      - name: "pool_grafana_primary"
        ratio: 1
        preferred_lb_method: "topology"
        alternate_lb_method: "global-availability"
        fallback_lb_method: "round-robin"
        default_monitors:
          - "/Common/mon_https_grafana"
        members:
          - server: "gtm-ltm-site-a"
            virtual_server: "gtm_vs_a_grafana_443"
            address: "10.10.11.102"
            port: 443
          - server: "gtm-ltm-site-b"
            virtual_server: "gtm_vs_b_grafana_443"
            address: "10.10.12.102"
            port: 443

  - name: "api.my.domain.com"
    record_type: "a"
    pool_lb_method: "round-robin"
    pools:
      - name: "pool_api_east"
        ratio: 2
        preferred_lb_method: "global-availability"
        alternate_lb_method: "round-robin"
        fallback_lb_method: "none"
        default_monitors:
          - "/Common/mon_https_api"
        members:
          - server: "gtm-ltm-site-a"
            virtual_server: "gtm_vs_a_api_443"
            address: "10.10.11.100"
            port: 443
          - server: "gtm-ltm-site-b"
            virtual_server: "gtm_vs_b_api_443"
            address: "10.10.12.100"
            port: 443
      - name: "pool_api_west"
        ratio: 1
        preferred_lb_method: "global-availability"
        alternate_lb_method: "round-robin"
        fallback_lb_method: "none"
        default_monitors:
          - "/Common/mon_https_api"
        members:
          - server: "gtm-ltm-site-c"
            virtual_server: "gtm_vs_c_api_443"
            address: "10.10.13.100"
            port: 443
