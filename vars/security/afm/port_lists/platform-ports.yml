---
# AFM port list examples for service port grouping in firewall policies.
# Port lists are referenced by AFM firewall rules in `vars/security/afm/rules/platform-rules.yml`.
# Supported fields: `ports` (individual port numbers), `port_ranges` (start-end format),
# and `port_lists` (nested references to other port lists).
afm_port_lists:
  - name: web-ports
    description: Standard web traffic ports
    ports:
      - "80"
      - "443"
      - "8080"
      - "8443"

  - name: management-ports
    description: Management and monitoring ports
    ports:
      - "22"
      - "161"
      - "162"
    port_ranges:
      - "5666-5667"

  - name: database-ports
    description: Database access ports
    ports:
      - "3306"
      - "5432"
      - "1521"
