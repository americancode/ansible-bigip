---
# APM macro examples for reusable VPE flow building blocks.
# Macros are referenced by access policies and per-session policies in
# `vars/security/apm/access_profiles/` and `vars/security/apm/per_session_policies/`.
# Supported fields: `name`, `partition`, `description`, `nodes` (list of node mappings).
apm_macros:
  - name: ldap-auth-macro
    description: Reusable LDAP authentication macro
    nodes:
      - ordinal: 1
        name: ldap_logon
        type: logon_page
        config:
          logon_page: /common/custom_logon.php
          next_node: ldap_auth
      - ordinal: 2
        name: ldap_auth
        type: ad_auth
        config:
          ad_server: corp-ldap-server
          fallback: true
          next_node: ldap_result
      - ordinal: 3
        name: ldap_result
        type: empty
        config:
          branches:
            - name: Success
              next_node: end_allow
            - name: Failure
              next_node: end_deny
      - ordinal: 4
        name: end_allow
        type: ending
        config:
          ending_type: allow
      - ordinal: 5
        name: end_deny
        type: ending
        config:
          ending_type: deny

  - name: fallback-auth-macro
    description: Fallback authentication with multiple methods
    nodes:
      - ordinal: 1
        name: primary_auth
        type: logon_page
        config:
          logon_page: /common/custom_logon.php
          next_node: radius_check
      - ordinal: 2
        name: radius_check
        type: radius_auth
        config:
          radius_server: primary-radius
          fallback: true
          next_node: radius_result
      - ordinal: 3
        name: radius_result
        type: empty
        config:
          branches:
            - name: Success
              next_node: end_allow
            - name: Failure
              next_node: local_db
      - ordinal: 4
        name: local_db
        type: localdb_auth
        config:
          localdb_server: local-users
          next_node: local_result
      - ordinal: 5
        name: local_result
        type: empty
        config:
          branches:
            - name: Success
              next_node: end_allow
            - name: Failure
              next_node: end_deny
      - ordinal: 6
        name: end_allow
        type: ending
        config:
          ending_type: allow
      - ordinal: 7
        name: end_deny
        type: ending
        config:
          ending_type: deny
