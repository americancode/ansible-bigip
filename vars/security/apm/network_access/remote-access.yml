---
# APM Network Access examples for remote-access VPN configuration.
# Network Access resources are assigned within APM access policies (managed via VPE or policy imports).
# Supported fields: `name`, `partition`, `ip_version`, `split_tunnel`, `snat_pool`,
# `ipv4_address_space`, `excluded_ipv4_adresses`, `ipv4_lease_pool`,
# `allow_local_subnet`, `allow_local_dns`, and `state`.
apm_network_access:
  - name: corporate-remote-access
    ip_version: ipv4
    split_tunnel: true
    ipv4_address_space:
      - subnet: 10.10.1.0/24
      - subnet: 10.10.2.0/24
    excluded_ipv4_adresses:
      - subnet: 192.168.100.0/24
    allow_local_subnet: true
    allow_local_dns: true

  - name: contractor-access
    ip_version: ipv4
    split_tunnel: true
    snat_pool: /Common/corporate-snat
    ipv4_address_space:
      - subnet: 10.10.50.0/24
    ipv4_lease_pool: contractor-pool
    allow_local_subnet: false
    allow_local_dns: false
