---
# APM policy node examples (VPE flow items).
# Nodes define the authentication flow within an access policy.
# Supported fields: `name`, `partition`, `policy` (parent access policy name), `type`,
# and `properties` (type-specific tmsh key-value pairs).
#
# Common types: `logon_page`, `ad_auth`, `ldap_auth`, `kerberos_auth`, `kcd_sso`,
# `branch`, `allow`, `deny`, `fallback`, `macro`, `variable_assign`.
apm_policy_nodes:
  - name: lp-start
    policy: ldap-kerberos-sso
    type: logon_page
    properties:
      username_prompt: "Username"
      password_prompt: "Password"

  - name: ad-auth
    policy: ldap-kerberos-sso
    type: ad_auth
    properties:
      ad_server: corp-ad

  - name: ad-query
    policy: ldap-kerberos-sso
    type: ad_query
    properties:
      ad_server: corp-ad

  - name: branch-group
    policy: ldap-kerberos-sso
    type: branch
    properties:
      rules:
        - name: allow-admins
          expression: "session.ad.last.attr.memberOf contains \"Admins\""
        - name: allow-users
          expression: "session.ad.last.attr.memberOf contains \"Users\""

  - name: kcd-sso
    policy: ldap-kerberos-sso
    type: kcd_sso
    properties:
      kerberos_sso_object: kcd-backend-app

  - name: allow-access
    policy: ldap-kerberos-sso
    type: allow

  - name: deny-access
    policy: ldap-kerberos-sso
    type: deny
