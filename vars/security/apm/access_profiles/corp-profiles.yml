---
# APM access profile examples for authentication and policy enforcement.
# Access profiles reference access-policy nodes in `vars/security/apm/policy_nodes/`,
# per-session policies in `vars/security/apm/per_session_policies/`, and SSO objects in
# `vars/security/apm/sso_configs/`.
# Supported fields: `name`, `partition`, `description`, `default_access_policy`,
# `default_per_session_policy`, `sso_configuration`, `domain`, `agent_cap`,
# `session_timeout`, `idle_timeout`, `max_sessions`, and `cookie_fallback`.
apm_access_profiles:
  - name: corp-sso-profile
    description: Corporate SSO access profile with Kerberos
    default_access_policy: ldap-kerberos-sso
    default_per_session_policy: advanced-session-policy
    sso_configuration: /Common/kcd-backend-app
    domain: corp.example.com
    agent_cap: true
    session_timeout: 28800
    idle_timeout: 1800
    max_sessions: 500
    cookie_fallback: true

  - name: remote-vpn-profile
    description: Remote VPN access with network access resource
    default_access_policy: /Common/remote-vpn.policy
    default_per_session_policy: advanced-session-policy
    domain: vpn.corp.example.com
    agent_cap: false
    session_timeout: 43200
    idle_timeout: 3600
    max_sessions: 2000
    cookie_fallback: false
