---
tls_client_ssl_profiles:
  - name: "clientssl_platform_apps"
    parent: "/Common/clientssl"
    cert_key_chain:
      - cert: "wildcard_platform_example_com"
        key: "wildcard_platform_example_com"
        chain: "internal_root_bundle"
        true_names: true
    ciphers: "DEFAULT"
    options:
      - "no-sslv3"
      - "no-tlsv1"
      - "no-tlsv1.1"
    secure_renegotiation: "require"
    sni_default: true

  - name: "clientssl_platform_apps_strict_mtls"
    parent: "/Common/clientssl"
    cert_key_chain:
      - cert: "wildcard_platform_example_com"
        key: "wildcard_platform_example_com"
        chain: "internal_root_bundle"
        true_names: true
    client_certificate: "require"
    trusted_cert_authority: "/Common/internal_root_bundle"
    advertised_cert_authority: "/Common/internal_root_bundle"
    cert_auth_depth: 3
    secure_renegotiation: "require"
