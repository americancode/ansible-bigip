---
tls_server_ssl_profiles:
  - name: "serverssl_platform_upstream"
    parent: "/Common/serverssl"
    ca_file: "/Common/internal_root_bundle"
    server_certificate: "require"
    authenticate_name: "api.internal.example.com"
    ciphers: "DEFAULT"
    secure_renegotiation: "require"

  - name: "serverssl_platform_upstream_mtls"
    parent: "/Common/serverssl"
    certificate: "upstream_mtls_client"
    key: "upstream_mtls_client"
    chain: "internal_root_bundle"
    ca_file: "/Common/internal_root_bundle"
    server_certificate: "require"
    update_password: "on_create"
