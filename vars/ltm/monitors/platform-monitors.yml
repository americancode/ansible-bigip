---
# Built-in BIG-IP monitors such as `/Common/tcp` remain valid references.
# Declare only the custom monitors you want this repo to create.
ltm_monitors:
  - name: "mon_rke2_kubeapi_tcp"
    type: "tcp"
    interval: 10
    timeout: 31

  - name: "mon_rke2_registration_tcp"
    type: "tcp"
    interval: 10
    timeout: 31

  - name: "mon_traefik_https"
    type: "https"
    send: "GET /ping HTTP/1.1\\r\\nHost: platform.apps.example.com\\r\\nConnection: close\\r\\n\\r\\n"
    receive: "200 OK"
    interval: 15
    timeout: 46
    compatibility: true
