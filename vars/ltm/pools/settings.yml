---
# This file demonstrates per-directory defaults for first-class LTM pools.
# Files under `vars/ltm/pools/` inherit these values unless an object overrides them.
ltm_pool_defaults:
  enabled: true

# `reuse_nodes: true` means pool members may use `name` to bind to a first-class node object.
# See `vars/ltm/nodes/vm-applications.yml` for the referenced node objects.
ltm_member_defaults:
  reuse_nodes: true

# These aliases are convenience strings used in pool example files.
# `standard_https` is intentionally an out-of-the-box BIG-IP monitor, not a repo-created custom monitor.
ltm_monitor_sets:
  standard_tcp:
    - "/Common/tcp"
  standard_https:
    - "/Common/https"
