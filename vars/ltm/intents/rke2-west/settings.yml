---
ltm_rke2_server_intent_defaults:
  partition: "Common"
  enabled: true
  snat: "Automap"
  profiles:
    - "tcp"
  kubeapi_monitors:
    - "kubeapi_tcp"
  registration_monitors:
    - "registration_tcp"

ltm_pool_defaults:
  lb_method: "round-robin"
  enabled: true

ltm_member_defaults:
  reuse_nodes: true

ltm_monitor_sets:
  kubeapi_tcp:
    - "/Common/mon_rke2_kubeapi_tcp"
  registration_tcp:
    - "/Common/mon_rke2_registration_tcp"
  traefik_https:
    - "/Common/mon_traefik_https"
