---
# First-class/shared LTM profile examples.
# These objects are reusable across many virtual servers and are referenced by name from
# `ltm_virtual_servers[*].profiles`.
# Magic reference strings:
# - `http_platform_standard` points at the object with that `name` in this file.
# - `oneconnect_platform_standard` points at the object with that `name` in this file.
# - built-in BIG-IP profiles such as `/Common/tcp` are still valid and do not come from this repo.
ltm_profiles:
  - name: "http_platform_standard"
    type: "http"
    parent: "/Common/http"
    description: "Standard shared HTTP profile for platform application virtual servers"
    insert_xforwarded_for: true
    redirect_rewrite: "all"
    request_chunking: "preserve"
    response_chunking: "preserve"
    hsts_mode: true
    include_subdomains: true
    maximum_age: "31536000"

  - name: "http2_platform_standard"
    type: "http2"
    parent: "/Common/http2"
    description: "Shared HTTP/2 profile for platform edge services"
    activation_modes:
      - "alpn"
    insert_header: true
    insert_header_name: "X-Forwarded-Proto-Version"
    streams: 64

  - name: "oneconnect_platform_standard"
    type: "oneconnect"
    parent: "/Common/oneconnect"
    description: "Shared OneConnect profile for reused upstream connection pooling"
    maximum_size: 10000
    maximum_reuse: 1000
    share_pools: true
    source_mask: "255.255.255.255"

  - name: "tcp_platform_low_latency"
    type: "tcp"
    parent: "/Common/tcp"
    nagle: "disabled"
    delayed_acks: false
    proxy_options: true

  - name: "udp_platform_dns"
    type: "udp"
    parent: "/Common/udp"
    idle_timeout: "60"
    datagram_load_balancing: true

  - name: "fastl4_platform_passthrough"
    type: "fastl4"
    parent: "/Common/fastL4"
    description: "Shared fastL4 profile for high-throughput pass-through services"
    idle_timeout: "300"
    pva_acceleration: "full"
    loose_initialization: true
