---
# Concise/hybrid LTM example using embedded pools.
# Each virtual server keeps its pool and members inline so one file explains the full service.
# The short monitor names map through the sibling `settings.yml` to custom monitors in
# `vars/ltm/monitors/platform-monitors.yml`.
ltm_virtual_servers:
  - name: "vs_rke2_east_kubeapi_6443"
    description: "East region RKE2 Kubernetes API VIP"
    destination: "10.201.0.20"
    destination_port: 6443
    pool:
      name: "pool_rke2_east_kubeapi_6443"
      monitors:
        - "kubeapi_tcp"
      members:
        - host: "10.201.10.11"
          port: 6443
        - host: "10.201.10.12"
          port: 6443
        - host: "10.201.10.13"
          port: 6443

  - name: "vs_rke2_east_registration_9345"
    description: "East region RKE2 server registration VIP using the same control-plane IP"
    destination: "10.201.0.20"
    destination_port: 9345
    pool:
      name: "pool_rke2_east_registration_9345"
      monitors:
        - "registration_tcp"
      members:
        - host: "10.201.10.11"
          port: 9345
        - host: "10.201.10.12"
          port: 9345
        - host: "10.201.10.13"
          port: 9345

  - name: "vs_rke2_east_traefik_443"
    description: "East region Traefik ingress VIP"
    destination: "10.201.0.30"
    destination_port: 443
# Inline pool example:
# `pool.name` exists only inside this virtual server object and is not a first-class pool in
# `vars/ltm/pools/...`.
    pool:
      name: "pool_rke2_east_traefik_443"
      monitors:
        - "traefik_https"
      members:
        - host: "10.201.20.21"
          port: 443
        - host: "10.201.20.22"
          port: 443
        - host: "10.201.20.23"
          port: 443
