---
# Per-directory defaults for the concise/hybrid LTM model in `rke2-east/`.
# Files in this directory can embed pools inline while inheriting shared defaults and monitor aliases.
ltm_virtual_server_defaults:
  partition: "Common"
  enabled: true
  snat: "Automap"
  profiles:
    - "tcp"

ltm_pool_defaults:
  lb_method: "round-robin"
  enabled: true

ltm_member_defaults:
  reuse_nodes: true

# These aliases resolve to repo-created custom monitors from `vars/ltm/monitors/platform-monitors.yml`.
# Use fully-qualified strings such as `/Common/https` when you want an out-of-the-box BIG-IP monitor instead.
ltm_monitor_sets:
  kubeapi_tcp:
    - "/Common/mon_rke2_kubeapi_tcp"
  registration_tcp:
    - "/Common/mon_rke2_registration_tcp"
  traefik_https:
    - "/Common/mon_traefik_https"
