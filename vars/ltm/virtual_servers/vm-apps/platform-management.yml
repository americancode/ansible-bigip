---
# Example LTM virtual server with VLAN filtering, metadata, and log profiles.
ltm_virtual_servers:
  - name: "vs_platform_mgmt_443"
    description: "Platform management VIP with VLAN restrictions and logging"
    destination: "10.201.0.100"
    destination_port: 443
    pool:
      name: "pool_platform_mgmt_443"
      monitors:
        - "/Common/https"
      members:
        - host: "10.201.10.50"
          port: 443
        - host: "10.201.10.51"
          port: 443
    vlans:
      - "/Common/vlan_mgmt"
      - "/Common/vlan_servers"
    vlans_enabled: true
    metadata:
      - key: "owner"
        value: "platform-team"
      - key: "cost-center"
        value: "infra-001"
    log_profiles:
      - "/Common/local-db"
