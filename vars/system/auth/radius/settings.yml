---
# Default settings for the BIG-IP management-plane RADIUS auth profile.
# Objects in `vars/system/auth/radius/*.yml` reference `vars/system/auth/radius_servers/*.yml`
# by server name or explicit `/Partition/name`.
# Supported fields: `servers`, `retries`, `service_type`, `accounting_bug`, `fallback_to_local`,
# and `use_for_auth`.
system_auth_radius_defaults:
  retries: 3
  service_type: "administrative"
  fallback_to_local: true
