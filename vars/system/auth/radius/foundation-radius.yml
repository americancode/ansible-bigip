---
# BIG-IP management-plane RADIUS auth profile example.
# `servers` entries such as `radius_dc1` and `radius_dc2` point at objects in
# `vars/system/auth/radius_servers/foundation-radius-servers.yml`.
# Supported fields: `name`, `servers`, `retries`, `service_type`, `accounting_bug`,
# `fallback_to_local`, and `use_for_auth`.
system_auth_radius:
  - name: "corp-radius"
    servers:
      - "radius_dc1"
      - "radius_dc2"
    use_for_auth: false
