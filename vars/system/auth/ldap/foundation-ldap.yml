---
# BIG-IP management-plane LDAP / Active Directory auth example.
# This file configures how administrators log in to BIG-IP itself through `playbooks/system.yml`.
# It is separate from APM end-user identity under `vars/security/apm/`.
# Supported fields: `name`, `servers`, `bind_dn`, `bind_password`, `remote_directory_tree`,
# `user_template`, `login_ldap_attr`, `ssl`, `scope`, `port`, `use_for_auth`, and `fallback_to_local`.
system_auth_ldap:
  - name: "corp-ad-admins"
    servers:
      - "ad01.example.com"
      - "ad02.example.com"
    bind_dn: "CN=svc-bigip,OU=Svc,DC=example,DC=com"
    bind_password: !vault |
      $ANSIBLE_VAULT;1.1;AES256
      64376132616561356464306534323061616665323737633732636566366437343536633762633033
    remote_directory_tree: "DC=example,DC=com"
    user_template: "%s@example.com"
    login_ldap_attr: "sAMAccountName"
    use_for_auth: true
