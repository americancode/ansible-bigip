---
# Default settings for BIG-IP management-plane TACACS+ auth objects.
# Objects in `vars/system/auth/tacacs/*.yml` are consumed by `playbooks/system.yml` and point at
# external TACACS+ servers rather than other repo-managed BIG-IP objects.
# Supported fields: `servers`, `authentication`, `accounting`, `protocol_name`, `service_name`,
# `update_secret`, and `use_for_auth`.
system_auth_tacacs_defaults:
  authentication: "use-all-servers"
  accounting: "send-to-all-servers"
  protocol_name: "ip"
  service_name: "system"
  update_secret: "on_create"
