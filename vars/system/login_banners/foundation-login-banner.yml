---
# BIG-IP management-plane login banner example for compliance messaging.
# This file is consumed by `playbooks/system.yml` and applies to the BIG-IP currently targeted by
# `f5_host`; it does not reference other repo-managed object files.
# Supported fields: `enabled`, `text`, and optional `name` for repo-side labeling.
system_login_banners:
  - name: "authorized-use-banner"
    text: |
      WARNING: This system is for authorized use only.
      Activity may be monitored, recorded, and subject to audit.
