---
# Virtual-server-centric LTM model.
# Define reusable LTM monitors once in `ltm_monitors`, then map them to pools
# with fully-qualified monitor names in `pool.monitors`.

ltm_monitors:
  - name: "mon_tcp_9345"
    type: "tcp"
    interval: 30
    timeout: 91

  - name: "mon_tcp_6443"
    type: "tcp"
    interval: 30
    timeout: 91

  - name: "mon_https_ingress"
    type: "https"
    send: "GET / HTTP/1.1\\r\\nHost: ingress.example.com\\r\\nConnection: close\\r\\n\\r\\n"
    receive: "200 OK"
    interval: 30
    timeout: 91
    compatibility: true

ltm_virtual_servers:
  - name: "vs_a_api_9345"
    destination: "10.10.11.100"
    destination_port: 9345
    profiles:
      - "tcp"
    snat: "Automap"
    pool:
      name: "pool_a_api_9345"
      lb_method: "round-robin"
      monitors:
        - "/Common/mon_tcp_9345"
      members:
        - host: "10.10.11.11"
          port: 9345
        - host: "10.10.11.12"
          port: 9345
        - host: "10.10.11.13"
          port: 9345

  - name: "vs_a_control_6443"
    destination: "10.10.11.100"
    destination_port: 6443
    profiles:
      - "tcp"
    snat: "Automap"
    pool:
      name: "pool_a_control_6443"
      lb_method: "round-robin"
      monitors:
        - "/Common/mon_tcp_6443"
      members:
        - host: "10.10.11.11"
          port: 6443
        - host: "10.10.11.12"
          port: 6443
        - host: "10.10.11.13"
          port: 6443

  - name: "vs_a_ingress_443"
    destination: "10.10.11.102"
    destination_port: 443
    profiles:
      - "tcp"
    snat: "Automap"
    pool:
      name: "pool_a_ingress_30043"
      lb_method: "round-robin"
      monitors:
        - "/Common/mon_https_ingress"
      members:
        - host: "10.10.21.11"
          port: 30043
        - host: "10.10.21.12"
          port: 30043
        - host: "10.10.21.13"
          port: 30043

  - name: "vs_b_api_9345"
    destination: "10.10.12.100"
    destination_port: 9345
    profiles:
      - "tcp"
    snat: "Automap"
    pool:
      name: "pool_b_api_9345"
      lb_method: "round-robin"
      monitors:
        - "/Common/mon_tcp_9345"
      members:
        - host: "10.10.12.11"
          port: 9345
        - host: "10.10.12.12"
          port: 9345
        - host: "10.10.12.13"
          port: 9345

  - name: "vs_b_control_6443"
    destination: "10.10.12.100"
    destination_port: 6443
    profiles:
      - "tcp"
    snat: "Automap"
    pool:
      name: "pool_b_control_6443"
      lb_method: "round-robin"
      monitors:
        - "/Common/mon_tcp_6443"
      members:
        - host: "10.10.12.11"
          port: 6443
        - host: "10.10.12.12"
          port: 6443
        - host: "10.10.12.13"
          port: 6443

  - name: "vs_b_ingress_443"
    destination: "10.10.12.102"
    destination_port: 443
    profiles:
      - "tcp"
    snat: "Automap"
    pool:
      name: "pool_b_ingress_30043"
      lb_method: "round-robin"
      monitors:
        - "/Common/mon_https_ingress"
      members:
        - host: "10.10.22.11"
          port: 30043
        - host: "10.10.22.12"
          port: 30043
        - host: "10.10.22.13"
          port: 30043
