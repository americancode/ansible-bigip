- name: Discover APM ACL fragments
  ansible.builtin.set_fact:
    apm_acl_files: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          "find {{ repo_root }}/vars/security/apm/acls -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
        ).splitlines() | reject('equalto', '') | list
      }}
    apm_acl_deletion_files: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          "find {{ repo_root }}/vars/security/apm/deletions/acls -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
        ).splitlines() | reject('equalto', '') | list
      }}

- name: Load APM ACL fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: apm_acl_fragment
  loop: "{{ apm_acl_files }}"
  register: apm_acl_include_results

- name: Load APM ACL deletion fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: apm_acl_deletion_fragment
  loop: "{{ apm_acl_deletion_files }}"
  register: apm_acl_deletion_include_results

- name: Aggregate APM ACLs with directory settings
  ansible.builtin.set_fact:
    apm_acls: "{{ apm_acls | default([]) + [ apm_acl_directory_defaults | combine(item.1, recursive=True) ] }}"
  loop: "{{ query('subelements', apm_acl_include_results.results, 'ansible_facts.apm_acl_fragment.apm_acls', {'skip_missing': True}) }}"
  vars:
    apm_acl_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    apm_acl_directory_defaults: >-
      {{
        (
          lookup('ansible.builtin.file', apm_acl_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ).apm_acl_defaults | default({})
      }}

- name: Aggregate APM ACL deletions with directory settings
  ansible.builtin.set_fact:
    apm_acl_deletions: "{{ apm_acl_deletions | default([]) + [ (apm_acl_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
  loop: "{{ query('subelements', apm_acl_deletion_include_results.results, 'ansible_facts.apm_acl_deletion_fragment.apm_acls', {'skip_missing': True}) }}"
