- name: Load APM ACL fragments into apm_acls/apm_acl_deletions
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/load-fragment-tree.yml"
  vars:
    fragment_label: APM ACL
    source_root: "{{ repo_root }}/vars/security/apm/acls"
    deletion_root: "{{ repo_root }}/vars/security/apm/deletions/acls"
    fragment_var_name: apm_acl_fragment
    fragment_deletion_var_name: apm_acl_deletion_fragment
    collection_key: apm_acls
    defaults_key: apm_acl_defaults
    aggregate_var: apm_acls
    deletion_aggregate_var: apm_acl_deletions

