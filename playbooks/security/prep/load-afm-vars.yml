- name: Load AFM address list fragments into afm_address_lists/afm_address_list_deletions
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/load-fragment-tree.yml"
  vars:
    fragment_label: AFM address list
    source_root: "{{ repo_root }}/vars/security/afm/address_lists"
    deletion_root: "{{ repo_root }}/vars/security/afm/deletions/address_lists"
    fragment_var_name: afm_address_list_fragment
    fragment_deletion_var_name: afm_address_list_deletion_fragment
    collection_key: afm_address_lists
    defaults_key: afm_address_list_defaults
    aggregate_var: afm_address_lists
    deletion_aggregate_var: afm_address_list_deletions

