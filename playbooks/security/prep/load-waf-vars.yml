- name: Discover WAF policy fragments
  ansible.builtin.set_fact:
    waf_policy_files: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          "find {{ repo_root }}/vars/security/waf/policies -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
        ).splitlines() | reject('equalto', '') | list
      }}
    waf_policy_deletion_files: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          "find {{ repo_root }}/vars/security/waf/deletions/policies -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
        ).splitlines() | reject('equalto', '') | list
      }}

- name: Load WAF policy fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: waf_policy_fragment
  loop: "{{ waf_policy_files }}"
  register: waf_policy_include_results

- name: Load WAF policy deletion fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: waf_policy_deletion_fragment
  loop: "{{ waf_policy_deletion_files }}"
  register: waf_policy_deletion_include_results

- name: Aggregate WAF policies with directory settings
  ansible.builtin.set_fact:
    waf_policies: "{{ waf_policies | default([]) + [ waf_policy_directory_defaults | combine(item.1, recursive=True) ] }}"
  loop: "{{ query('subelements', waf_policy_include_results.results, 'ansible_facts.waf_policy_fragment.waf_policies', {'skip_missing': True}) }}"
  vars:
    waf_policy_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    waf_policy_directory_defaults: >-
      {{
        (
          lookup('ansible.builtin.file', waf_policy_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ).waf_policy_defaults | default({})
      }}

- name: Aggregate WAF policy deletions with directory settings
  ansible.builtin.set_fact:
    waf_policy_deletions: "{{ waf_policy_deletions | default([]) + [ (waf_policy_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
  loop: "{{ query('subelements', waf_policy_deletion_include_results.results, 'ansible_facts.waf_policy_deletion_fragment.waf_policies', {'skip_missing': True}) }}"
  vars:
    waf_policy_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    waf_policy_deletion_directory_defaults: >-
      {{
        (
          lookup('ansible.builtin.file', waf_policy_deletion_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ).waf_policy_defaults | default({})
      }}

