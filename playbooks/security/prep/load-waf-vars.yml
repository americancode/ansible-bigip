- name: Load WAF policy fragments into waf_policies/waf_policy_deletions
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/load-fragment-tree.yml"
  vars:
    fragment_label: WAF policy
    source_root: "{{ repo_root }}/vars/security/waf/policies"
    deletion_root: "{{ repo_root }}/vars/security/waf/deletions/policies"
    fragment_var_name: waf_policy_fragment
    fragment_deletion_var_name: waf_policy_deletion_fragment
    collection_key: waf_policies
    defaults_key: waf_policy_defaults
    aggregate_var: waf_policies
    deletion_aggregate_var: waf_policy_deletions

- name: Load WAF server technology fragments into waf_server_technologies/waf_server_technology_deletions
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/load-fragment-tree.yml"
  vars:
    fragment_label: WAF server technology
    source_root: "{{ repo_root }}/vars/security/waf/server_technologies"
    deletion_root: "{{ repo_root }}/vars/security/waf/deletions/server_technologies"
    fragment_var_name: waf_server_technology_fragment
    fragment_deletion_var_name: waf_server_technology_deletion_fragment
    collection_key: waf_server_technologies
    defaults_key: waf_server_technology_defaults
    aggregate_var: waf_server_technologies
    deletion_aggregate_var: waf_server_technology_deletions
