- name: Classify APM ACL operations into apm_acls_present/apm_acls_delete
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/classify-operations.yml"
  vars:
    object_label: APM ACL
    active_objects: "{{ apm_acls | default([]) }}"
    deletion_objects: "{{ apm_acl_deletions | default([]) }}"
    delete_var: apm_acls_delete
    present_var: apm_acls_present

