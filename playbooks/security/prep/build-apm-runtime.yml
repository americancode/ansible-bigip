- name: Classify APM ACL operations
  ansible.builtin.set_fact:
    apm_acls_delete: >-
      {{
        ((apm_acls | default([])) + (apm_acl_deletions | default([])))
        | selectattr('state', 'defined')
        | selectattr('state', 'equalto', 'absent')
        | list
      }}
    apm_acls_present: >-
      {{
        (apm_acls | default([]))
        | rejectattr('state', 'defined')
        | list
        +
        (
          (apm_acls | default([]))
          | selectattr('state', 'defined')
          | rejectattr('state', 'equalto', 'absent')
          | list
        )
      }}

