- name: Classify WAF policy operations into waf_policies_present/waf_policies_delete
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/classify-operations.yml"
  vars:
    object_label: WAF policy
    active_objects: "{{ waf_policies | default([]) }}"
    deletion_objects: "{{ waf_policy_deletions | default([]) }}"
    delete_var: waf_policies_delete
    present_var: waf_policies_present

- name: Classify WAF server technology operations into waf_server_technologies_present/waf_server_technologies_delete
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/classify-operations.yml"
  vars:
    object_label: WAF server technology
    active_objects: "{{ waf_server_technologies | default([]) }}"
    deletion_objects: "{{ waf_server_technology_deletions | default([]) }}"
    delete_var: waf_server_technologies_delete
    present_var: waf_server_technologies_present
