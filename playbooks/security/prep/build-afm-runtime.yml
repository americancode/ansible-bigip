- name: Classify AFM address list operations into afm_address_lists_present/afm_address_lists_delete
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/classify-operations.yml"
  vars:
    object_label: AFM address list
    active_objects: "{{ afm_address_lists | default([]) }}"
    deletion_objects: "{{ afm_address_list_deletions | default([]) }}"
    delete_var: afm_address_lists_delete
    present_var: afm_address_lists_present

