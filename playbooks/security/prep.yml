- name: Discover AFM address list fragments
  ansible.builtin.set_fact:
    afm_address_list_files: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          "find {{ repo_root }}/vars/security/afm/address_lists -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
        ).splitlines() | reject('equalto', '') | list
      }}
    afm_address_list_deletion_files: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          "find {{ repo_root }}/vars/security/afm/deletions/address_lists -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
        ).splitlines() | reject('equalto', '') | list
      }}

- name: Load AFM address list fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: afm_address_list_fragment
  loop: "{{ afm_address_list_files }}"
  register: afm_address_list_include_results

- name: Load AFM address list deletion fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: afm_address_list_deletion_fragment
  loop: "{{ afm_address_list_deletion_files }}"
  register: afm_address_list_deletion_include_results

- name: Aggregate AFM address lists with directory settings
  ansible.builtin.set_fact:
    afm_address_lists: "{{ afm_address_lists | default([]) + [ afm_address_list_directory_defaults | combine(item.1, recursive=True) ] }}"
  loop: "{{ query('subelements', afm_address_list_include_results.results, 'ansible_facts.afm_address_list_fragment.afm_address_lists', {'skip_missing': True}) }}"
  vars:
    afm_address_list_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    afm_address_list_directory_defaults: >-
      {{
        (
          lookup('ansible.builtin.file', afm_address_list_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ).afm_address_list_defaults | default({})
      }}

- name: Aggregate AFM address list deletions with directory settings
  ansible.builtin.set_fact:
    afm_address_list_deletions: "{{ afm_address_list_deletions | default([]) + [ (afm_address_list_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
