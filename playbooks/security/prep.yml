---
# Security prep orchestrator.
# Produces classified runtime sets for AFM, WAF, and APM, including:
# - AFM: `afm_address_lists_*`, `afm_port_lists_*`, `afm_rules_*`, `afm_policies_*`
# - WAF: `waf_policies_*`, `waf_server_technologies_*`
# - APM: `apm_acls_*`, `apm_auth_servers_*`, `apm_sso_configs_*`, `apm_resources_*`,
#   `apm_policy_nodes_*`, `apm_access_profiles_*`, `apm_per_session_policies_*`, `apm_macros_*`
# - flattened helper facts for tmsh-driven APM runtime loops such as
#   `apm_flattened_per_session_policy_nodes_*` and `apm_flattened_macro_nodes_*`

- name: Load AFM var fragments
  ansible.builtin.import_tasks: "{{ playbook_dir }}/security/prep/load-afm-vars.yml"

- name: Build AFM runtime facts
  ansible.builtin.import_tasks: "{{ playbook_dir }}/security/prep/build-afm-runtime.yml"

- name: Load WAF var fragments
  ansible.builtin.import_tasks: "{{ playbook_dir }}/security/prep/load-waf-vars.yml"

- name: Build WAF runtime facts
  ansible.builtin.import_tasks: "{{ playbook_dir }}/security/prep/build-waf-runtime.yml"

- name: Load APM var fragments
  ansible.builtin.import_tasks: "{{ playbook_dir }}/security/prep/load-apm-vars.yml"

- name: Build APM runtime facts
  ansible.builtin.import_tasks: "{{ playbook_dir }}/security/prep/build-apm-runtime.yml"
