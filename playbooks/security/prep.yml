        ((apm_macros | default([])) + (apm_macro_deletions | default([])))
        | selectattr('state', 'defined')
        | selectattr('state', 'equalto', 'absent')
        | list
      }}
    apm_macros_present: >-
      {{
        (apm_macros | default([]))
        | rejectattr('state', 'defined')
        | list
        +
        (
          (apm_macros | default([]))
          | selectattr('state', 'defined')
          | rejectattr('state', 'equalto', 'absent')
          | list
        )
      }}
