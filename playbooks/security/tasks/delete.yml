    provider: "{{ provider }}"
    name: "{{ item.name }}"
    partition: "{{ item.partition | default('Common') }}"
    state: absent
  loop: "{{ apm_acls_delete | default([]) }}"
  when: apm_acls_delete | default([]) | length > 0

- name: Delete APM access profiles
  bigip_command:
    provider: "{{ provider }}"
    commands:
      - tmsh delete apm profile access /{{ item.partition | default('Common') }}/{{ item.name }}
  loop: "{{ apm_access_profiles_delete | default([]) }}"
  when: apm_access_profiles_delete | default([]) | length > 0
  failed_when: false

- name: Delete APM policy nodes
  bigip_command:
    provider: "{{ provider }}"
    commands:
      - tmsh modify apm policy access /{{ item.partition | default('Common') }}/{{ item.policy }} items delete { {{ item.name }} }
  loop: "{{ apm_policy_nodes_delete | default([]) }}"
  when: apm_policy_nodes_delete | default([]) | length > 0
  failed_when: false

- name: Delete APM per-session policies
