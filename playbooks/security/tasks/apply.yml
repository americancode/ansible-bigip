- name: Create AFM address lists
  bigip_firewall_address_list:
    provider: "{{ f5_provider }}"
    name: "{{ item.name }}"
    partition: "{{ item.partition | default('Common') }}"
    description: "{{ item.description | default(omit) }}"
    addresses: "{{ item.addresses | default(omit) }}"
    address_ranges: "{{ item.address_ranges | default(omit) }}"
    address_lists: "{{ item.address_lists | default(omit) }}"
    geo_locations: "{{ item.geo_locations | default(omit) }}"
    fqdns: "{{ item.fqdns | default(omit) }}"
    state: present
  loop: "{{ afm_address_lists_present | default([]) }}"
  when: afm_address_lists_present | default([]) | length > 0

- name: Create AFM port lists
  bigip_firewall_port_list:
    provider: "{{ f5_provider }}"
    name: "{{ item.name }}"
    partition: "{{ item.partition | default('Common') }}"
    description: "{{ item.description | default(omit) }}"
    ports: "{{ item.ports | default(omit) }}"
    port_ranges: "{{ item.port_ranges | default(omit) }}"
    port_lists: "{{ item.port_lists | default(omit) }}"
    state: present
  loop: "{{ afm_port_lists_present | default([]) }}"
  when: afm_port_lists_present | default([]) | length > 0

- name: Create AFM firewall rules
  bigip_firewall_rule:
    provider: "{{ f5_provider }}"
    name: "{{ item.name }}"
    partition: "{{ item.partition | default('Common') }}"
    description: "{{ item.description | default(omit) }}"
    action: "{{ item.action | default(omit) }}"
    protocol: "{{ item.protocol | default(omit) }}"
    source: "{{ item.source | default(omit) }}"
    destination: "{{ item.destination | default(omit) }}"
    logging: "{{ item.logging | default(omit) }}"
    irule: "{{ item.irule | default(omit) }}"
    state: present
  loop: "{{ afm_rules_present | default([]) }}"
  when: afm_rules_present | default([]) | length > 0

- name: Create AFM firewall policies
  bigip_firewall_rule_list:
    provider: "{{ f5_provider }}"
    name: "{{ item.name }}"
    partition: "{{ item.partition | default('Common') }}"
    description: "{{ item.description | default(omit) }}"
    rules: "{{ item.rules | default(omit) }}"
    state: present
  loop: "{{ afm_policies_present | default([]) }}"
  when: afm_policies_present | default([]) | length > 0

- name: Create WAF/ASM policies
  bigip_asm_policy_manage:
    provider: "{{ f5_provider }}"
    name: "{{ item.name }}"
    template: "{{ item.template | default(omit) }}"
    active: "{{ item.active | default(omit) }}"
    apply: "{{ item.apply | default(omit) }}"
    state: present
  loop: "{{ waf_policies_present | default([]) }}"
  when: waf_policies_present | default([]) | length > 0

- name: Add WAF server technologies to policies
  bigip_asm_policy_server_technology:
    provider: "{{ f5_provider }}"
    name: "{{ item.name }}"
    policy_name: "{{ item.policy_name }}"
    state: present
  loop: "{{ waf_server_technologies_present | default([]) }}"
  when: waf_server_technologies_present | default([]) | length > 0

- name: Create APM ACLs
  bigip_apm_acl:
    provider: "{{ f5_provider }}"
    name: "{{ item.name }}"
    partition: "{{ item.partition | default('Common') }}"
    acl_order: "{{ item.acl_order | default(omit) }}"
    type: "{{ item.type | default(omit) }}"
    entries: "{{ item.entries | default(omit) }}"
    state: present
  loop: "{{ apm_acls_present | default([]) }}"
  when: apm_acls_present | default([]) | length > 0

- name: Create APM network access resources
  bigip_apm_network_access:
    provider: "{{ f5_provider }}"
    name: "{{ item.name }}"
    partition: "{{ item.partition | default('Common') }}"
    ip_version: "{{ item.ip_version | default(omit) }}"
    split_tunnel: "{{ item.split_tunnel | default(omit) }}"
    snat_pool: "{{ item.snat_pool | default(omit) }}"
    ipv4_address_space: "{{ item.ipv4_address_space | default(omit) }}"
    excluded_ipv4_adresses: "{{ item.excluded_ipv4_adresses | default(omit) }}"
    ipv4_lease_pool: "{{ item.ipv4_lease_pool | default(omit) }}"
    allow_local_subnet: "{{ item.allow_local_subnet | default(omit) }}"
    allow_local_dns: "{{ item.allow_local_dns | default(omit) }}"
    state: present
  loop: "{{ apm_network_access_present | default([]) }}"
  when: apm_network_access_present | default([]) | length > 0

- name: Import APM policies
  bigip_apm_policy_import:
    provider: "{{ f5_provider }}"
    name: "{{ item.name }}"
    partition: "{{ item.partition | default('Common') }}"
    source: "{{ item.source }}"
    type: "{{ item.type | default(omit) }}"
    force: "{{ item.force | default(omit) }}"
    reuse_objects: "{{ item.reuse_objects | default(omit) }}"
    state: present
  loop: "{{ apm_policies_present | default([]) }}"
  when: apm_policies_present | default([]) | length > 0
