- name: Create APM network access resources
  bigip_command:
    provider: "{{ f5_provider }}"
    commands:
      - >-
        tmsh create apm resource network-access /{{ item.partition | default('Common') }}/{{ item.name }}
        {% if item.ip_versions is defined %}ip-versions {{ item.ip_versions | join(' ') }}{% endif %}
        {% if item.address_spaces is defined %}ipv4-address-space {{ item.address_spaces | map(attribute='subnet') | join(',') }}{% endif %}
        {% if item.excluded_subnets is defined %}ipv4-excluded-subnets {{ item.excluded_subnets | map(attribute='subnet') | join(',') }}{% endif %}
        {% if item.dns_servers is defined %}dns-servers {{ item.dns_servers | join(' ') }}{% endif %}
        {% if item.ntdomain is defined %}ntdomain "{{ item.ntdomain }}"{% endif %}
        {% if item.split_tunnel is defined %}split-tunnel {{ 'enabled' if item.split_tunnel else 'disabled' }}{% endif %}
  loop: "{{ apm_resources_present | default([]) | selectattr('type', 'equalto', 'network_access') | list }}"
  when: apm_resources_present | default([]) | length > 0
  failed_when: false

- name: Modify APM network access resources
  bigip_command:
    provider: "{{ f5_provider }}"
    commands:
      - >-
        tmsh modify apm resource network-access /{{ item.partition | default('Common') }}/{{ item.name }}
        {% if item.ip_versions is defined %}ip-versions {{ item.ip_versions | join(' ') }}{% endif %}
        {% if item.address_spaces is defined %}ipv4-address-space {{ item.address_spaces | map(attribute='subnet') | join(',') }}{% endif %}
        {% if item.excluded_subnets is defined %}ipv4-excluded-subnets {{ item.excluded_subnets | map(attribute='subnet') | join(',') }}{% endif %}
        {% if item.dns_servers is defined %}dns-servers {{ item.dns_servers | join(' ') }}{% endif %}
        {% if item.ntdomain is defined %}ntdomain "{{ item.ntdomain }}"{% endif %}
        {% if item.split_tunnel is defined %}split-tunnel {{ 'enabled' if item.split_tunnel else 'disabled' }}{% endif %}
  loop: "{{ apm_resources_present | default([]) | selectattr('type', 'equalto', 'network_access') | list }}"
  when: apm_resources_present | default([]) | length > 0

- name: Create APM webtop resources
  bigip_command:
    provider: "{{ f5_provider }}"
    commands:
      - >-
        tmsh create apm resource webtop /{{ item.partition | default('Common') }}/{{ item.name }}
        webtop-type {{ item.webtop_type | default('full') }}
        {% if item.items is defined %}
        items add { {{ item.items | map('regex_replace', '^(.*)$', '{ \\1 }') | join(' ') }} }
        {% endif %}
  loop: "{{ apm_resources_present | default([]) | selectattr('type', 'equalto', 'webtop') | list }}"
  when: apm_resources_present | default([]) | length > 0
  failed_when: false

- name: Modify APM webtop resources
  bigip_command:
    provider: "{{ f5_provider }}"
    commands:
      - >-
        tmsh modify apm resource webtop /{{ item.partition | default('Common') }}/{{ item.name }}
        webtop-type {{ item.webtop_type | default('full') }}
        {% if item.items is defined %}
        items replace-all-with { {{ item.items | map('regex_replace', '^(.*)$', '{ \\1 }') | join(' ') }} }
        {% endif %}
  loop: "{{ apm_resources_present | default([]) | selectattr('type', 'equalto', 'webtop') | list }}"
  when: apm_resources_present | default([]) | length > 0

- name: Create APM policy nodes
  bigip_command:
    provider: "{{ f5_provider }}"
    commands:
      - >-
        tmsh modify apm policy access /{{ item.partition | default('Common') }}/{{ item.policy }}
        items add {
          {{ item.name }} {
            {% if item.type is defined %}type {{ item.type }}{% endif %}
            {% if item.properties is defined %}
            {% for key, value in item.properties.items() %}
            {% if key == 'rules' %}
            rules {
              {% for rule in value %}
              {{ rule.name }} { expression "{{ rule.expression }}" }
              {% endfor %}
            }
            {% elif key in ['ad_server', 'ldap_server', 'kerberos_sso_object', 'sso_config', 'auth_server'] %}
            {{ key }} /{{ item.partition | default('Common') }}/{{ value }}
            {% else %}
            {{ key }} "{{ value }}"
            {% endif %}
            {% endfor %}
            {% endif %}
          }
        }
  loop: "{{ apm_policy_nodes_present | default([]) }}"
  when: apm_policy_nodes_present | default([]) | length > 0
  failed_when: false

- name: Modify APM policy nodes
  bigip_command:
    provider: "{{ f5_provider }}"
    commands:
      - >-
        tmsh modify apm policy access /{{ item.partition | default('Common') }}/{{ item.policy }}
        items modify {
          {{ item.name }} {
            {% if item.type is defined %}type {{ item.type }}{% endif %}
            {% if item.properties is defined %}
            {% for key, value in item.properties.items() %}
            {% if key == 'rules' %}
            rules {
              {% for rule in value %}
              {{ rule.name }} { expression "{{ rule.expression }}" }
              {% endfor %}
            }
            {% elif key in ['ad_server', 'ldap_server', 'kerberos_sso_object', 'sso_config', 'auth_server'] %}
            {{ key }} /{{ item.partition | default('Common') }}/{{ value }}
            {% else %}
            {{ key }} "{{ value }}"
            {% endif %}
            {% endfor %}
            {% endif %}
          }
        }
  loop: "{{ apm_policy_nodes_present | default([]) }}"
  when: apm_policy_nodes_present | default([]) | length > 0
