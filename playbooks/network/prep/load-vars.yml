- name: Load VLAN fragments into bigip_vlans/bigip_vlan_deletions
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/load-fragment-tree.yml"
  vars:
    fragment_label: VLAN
    source_root: "{{ repo_root }}/vars/network/vlans"
    deletion_root: "{{ repo_root }}/vars/network/deletions/vlans"
    fragment_var_name: vlan_fragment
    fragment_deletion_var_name: vlan_deletion_fragment
    collection_key: bigip_vlans
    defaults_key: network_vlan_defaults
    aggregate_var: bigip_vlans
    deletion_aggregate_var: bigip_vlan_deletions

