- name: Classify network object operations
  ansible.builtin.set_fact:
    bigip_vlans_delete: >-
      {{
        ((bigip_vlans | default([])) + (bigip_vlan_deletions | default([])))
        | selectattr('state', 'defined')
        | selectattr('state', 'equalto', 'absent')
        | list
      }}
    bigip_vlans_present: >-
      {{
        (bigip_vlans | default([]))
        | rejectattr('state', 'defined')
        | list
        +
        (
          (bigip_vlans | default([]))
