- name: Classify VLAN operations into bigip_vlans_present/bigip_vlans_delete
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/classify-operations.yml"
  vars:
    object_label: VLAN
    active_objects: "{{ bigip_vlans | default([]) }}"
    deletion_objects: "{{ bigip_vlan_deletions | default([]) }}"
    delete_var: bigip_vlans_delete
    present_var: bigip_vlans_present

