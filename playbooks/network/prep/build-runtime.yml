- name: Probe NAT presence on BIG-IP
  f5networks.f5_modules.bigip_command:
    provider: "{{ provider }}"
    commands:
      - "{{ item | build_nat_tmsh_command('show') }}"
    warn: false
  loop: "{{ (bigip_nats_present | default([])) + (bigip_nats_delete | default([])) }}"
  loop_control:
    label: "{{ item.partition | default('Common') }}/{{ item.name }}"
  register: nat_probe_results
  failed_when: false

- name: Build NAT existence map
  ansible.builtin.set_fact:
    bigip_nat_exists_by_name: >-
      {{
        bigip_nat_exists_by_name | default({}) | combine({
          ((item.item.partition | default('Common')) ~ '/' ~ item.item.name): (
            item.failed is defined and not item.failed and
            (item.stdout is defined) and
            (item.stdout | length > 0) and
            ((item.stdout[0] | default('')) != '')
          )
        })
      }}
  loop: "{{ nat_probe_results.results | default([]) }}"

