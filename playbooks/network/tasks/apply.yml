- name: Create VLANs
  f5networks.f5_modules.bigip_vlan:
    provider: "{{ provider }}"
    partition: "{{ item.partition | default('Common') }}"
    name: "{{ item.name }}"
    tag: "{{ item.tag | default(omit) }}"
    mtu: "{{ item.mtu | default(omit) }}"
    interfaces: "{{ item.interfaces | default(omit) }}"
    description: "{{ item.description | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ bigip_vlans_present | default([]) }}"
  loop_control:
    label: "{{ item.partition | default('Common') }}/{{ item.name }}"

- name: Create trunks
  f5networks.f5_modules.bigip_trunk:
    provider: "{{ provider }}"
    name: "{{ item.name }}"
    interfaces: "{{ item.interfaces | default(omit) }}"
    lacp_enabled: "{{ item.lacp_enabled | default(omit) }}"
    lacp_mode: "{{ item.lacp_mode | default(omit) }}"
    lacp_timeout: "{{ item.lacp_timeout | default(omit) }}"
    link_selection_policy: "{{ item.link_selection_policy | default(omit) }}"
    frame_distribution_hash: "{{ item.frame_distribution_hash | default(omit) }}"
    qinq_ethertype: "{{ item.qinq_ethertype | default(omit) }}"
    description: "{{ item.description | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ bigip_trunks_present | default([]) }}"
  loop_control:
    label: "{{ item.name }}"

- name: Create route domains
  f5networks.f5_modules.bigip_routedomain:
    provider: "{{ provider }}"
    partition: "{{ item.partition | default('Common') }}"
    name: "{{ item.name | default(omit) }}"
    id: "{{ item.id | default(omit) }}"
    parent: "{{ item.parent | default(omit) }}"
    strict: "{{ item.strict | default(omit) }}"
    vlans: "{{ item.vlans | default(omit) }}"
    description: "{{ item.description | default(omit) }}"
    connection_limit: "{{ item.connection_limit | default(omit) }}"
    routing_protocol: "{{ item.routing_protocol | default(omit) }}"
    bwc_policy: "{{ item.bwc_policy | default(omit) }}"
    flow_eviction_policy: "{{ item.flow_eviction_policy | default(omit) }}"
    fw_enforced_policy: "{{ item.fw_enforced_policy | default(omit) }}"
    service_policy: "{{ item.service_policy | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ bigip_route_domains_present | default([]) }}"
  loop_control:
    label: "{{ item.partition | default('Common') }}/{{ item.name | default(item.id) }}"

- name: Create self IPs
  f5networks.f5_modules.bigip_selfip:
    provider: "{{ provider }}"
    partition: "{{ item.partition | default('Common') }}"
    name: "{{ item.name }}"
    address: "{{ item.address }}"
    netmask: "{{ item.netmask }}"
    vlan: "{{ item.vlan }}"
    traffic_group: "{{ item.traffic_group | default(omit) }}"
    allow_service: "{{ item.allow_service | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ bigip_self_ips_present | default([]) }}"
  loop_control:
    label: "{{ item.partition | default('Common') }}/{{ item.name }}"

- name: Create SNAT translations
  f5networks.f5_modules.bigip_snat_translation:
    provider: "{{ provider }}"
    partition: "{{ item.partition | default('Common') }}"
    name: "{{ item.name }}"
    address: "{{ item.address | default(omit) }}"
    arp: "{{ item.arp | default(omit) }}"
    connection_limit: "{{ item.connection_limit | default(omit) }}"
    description: "{{ item.description | default(omit) }}"
    ip_idle_timeout: "{{ item.ip_idle_timeout | default(omit) }}"
    tcp_idle_timeout: "{{ item.tcp_idle_timeout | default(omit) }}"
    udp_idle_timeout: "{{ item.udp_idle_timeout | default(omit) }}"
    traffic_group: "{{ item.traffic_group | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ bigip_snat_translations_present | default([]) }}"
  loop_control:
    label: "{{ item.partition | default('Common') }}/{{ item.name }}"

- name: Create SNAT pools
  f5networks.f5_modules.bigip_snat_pool:
    provider: "{{ provider }}"
    partition: "{{ item.partition | default('Common') }}"
    name: "{{ item.name }}"
    members: "{{ item.members | default(omit) }}"
    description: "{{ item.description | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ bigip_snat_pools_present | default([]) }}"
  loop_control:
    label: "{{ item.partition | default('Common') }}/{{ item.name }}"

- name: Create static routes
  f5networks.f5_modules.bigip_static_route:
    provider: "{{ provider }}"
    partition: "{{ item.partition | default('Common') }}"
    name: "{{ item.name }}"
    destination: "{{ item.destination | default(omit) }}"
    netmask: "{{ item.netmask | default(omit) }}"
    gateway_address: "{{ item.gateway_address | default(omit) }}"
    mtu: "{{ item.mtu | default(omit) }}"
    pool: "{{ item.pool | default(omit) }}"
    reject: "{{ item.reject | default(omit) }}"
    route_domain: "{{ item.route_domain | default(omit) }}"
    vlan: "{{ item.vlan | default(omit) }}"
    description: "{{ item.description | default(omit) }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ bigip_static_routes_present | default([]) }}"
  loop_control:
    label: "{{ item.partition | default('Common') }}/{{ item.name }}"

- name: Create or modify NATs
  f5networks.f5_modules.bigip_command:
    provider: "{{ provider }}"
    commands:
      - "{{ item | build_nat_tmsh_command(((bigip_nat_exists_by_name | default({})).get((item.partition | default('Common')) ~ '/' ~ item.name, false)) | ternary('modify', 'create')) }}"
    warn: false
  loop: "{{ bigip_nats_present | default([]) }}"
  loop_control:
    label: "{{ item.partition | default('Common') }}/{{ item.name }}"
