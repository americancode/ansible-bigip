---
# Network prep orchestrator.
# Produces canonical runtime sets and helper facts including:
# - `network_vlans_present` / `network_vlans_delete`
# - `network_route_domains_present` / `network_route_domains_delete`
# - `network_self_ips_present` / `network_self_ips_delete`
# - `network_routes_present` / `network_routes_delete`
# - `network_snat_translations_present` / `network_snat_translations_delete`
# - `network_snats_present` / `network_snats_delete`
# - `network_trunks_present` / `network_trunks_delete`
# - `network_nats_present` / `network_nats_delete`
# - `bigip_nat_exists_by_name`

- name: Load network var fragments
  ansible.builtin.import_tasks: "{{ playbook_dir }}/network/prep/load-vars.yml"

- name: Build network runtime facts
  ansible.builtin.import_tasks: "{{ playbook_dir }}/network/prep/build-runtime.yml"
