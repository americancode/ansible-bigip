- name: Load HA device trust fragments into ha_device_trusts/ha_device_trust_deletions
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/load-fragment-tree.yml"
  vars:
    fragment_label: HA device trust
    source_root: "{{ repo_root }}/vars/ha/device_trust"
    deletion_root: "{{ repo_root }}/vars/ha/deletions/device_trust"
    fragment_var_name: ha_device_trust_fragment
    fragment_deletion_var_name: ha_device_trust_deletion_fragment
    collection_key: ha_device_trusts
    defaults_key: ha_device_trust_defaults
    aggregate_var: ha_device_trusts
    deletion_aggregate_var: ha_device_trust_deletions

