- name: Classify HA device trust operations into ha_device_trusts_present/ha_device_trusts_delete
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/classify-operations.yml"
  vars:
    object_label: HA device trust
    active_objects: "{{ ha_device_trusts | default([]) }}"
    deletion_objects: "{{ ha_device_trust_deletions | default([]) }}"
    delete_var: ha_device_trusts_delete
    present_var: ha_device_trusts_present

