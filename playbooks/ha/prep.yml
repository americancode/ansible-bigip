- name: Discover HA device trust fragments
  ansible.builtin.set_fact:
    ha_device_trust_files: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          "find {{ repo_root }}/vars/ha/device_trust -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
        ).splitlines() | reject('equalto', '') | list
      }}
    ha_device_trust_deletion_files: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          "find {{ repo_root }}/vars/ha/deletions/device_trust -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
        ).splitlines() | reject('equalto', '') | list
      }}

- name: Load HA device trust fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: ha_device_trust_fragment
  loop: "{{ ha_device_trust_files }}"
  register: ha_device_trust_include_results

- name: Load HA device trust deletion fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: ha_device_trust_deletion_fragment
  loop: "{{ ha_device_trust_deletion_files }}"
  register: ha_device_trust_deletion_include_results

- name: Aggregate HA device trusts with directory settings
  ansible.builtin.set_fact:
    ha_device_trusts: "{{ ha_device_trusts | default([]) + [ ha_device_trust_directory_defaults | combine(item.1, recursive=True) ] }}"
  loop: "{{ query('subelements', ha_device_trust_include_results.results, 'ansible_facts.ha_device_trust_fragment.ha_device_trusts', {'skip_missing': True}) }}"
  vars:
    ha_device_trust_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    ha_device_trust_directory_defaults: >-
      {{
        (
          lookup('ansible.builtin.file', ha_device_trust_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ).ha_device_trust_defaults | default({})
      }}

- name: Aggregate HA device trust deletions with directory settings
  ansible.builtin.set_fact:
    ha_device_trust_deletions: "{{ ha_device_trust_deletions | default([]) + [ (ha_device_trust_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
  loop: "{{ query('subelements', ha_device_trust_deletion_include_results.results, 'ansible_facts.ha_device_trust_deletion_fragment.ha_device_trusts', {'skip_missing': True}) }}"
  vars:
    ha_device_trust_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    ha_device_trust_deletion_directory_defaults: >-
      {{
        (
          lookup('ansible.builtin.file', ha_device_trust_deletion_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ).ha_device_trust_defaults | default({})
      }}

