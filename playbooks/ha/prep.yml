---
# HA prep orchestrator.
# Produces the classified HA object sets consumed by runtime tasks, including:
# - `ha_device_trusts_present` / `ha_device_trusts_delete`
# - `ha_device_groups_present` / `ha_device_groups_delete`
# - `ha_device_group_members_present` / `ha_device_group_members_delete`
# - `ha_traffic_groups_present` / `ha_traffic_groups_delete`
# - `ha_device_connectivity_present` / `ha_device_connectivity_delete`
# - `ha_groups_present` / `ha_groups_delete`
# - `ha_configsync_actions_present` / `ha_configsync_actions_delete`

- name: Load HA var fragments
  ansible.builtin.import_tasks: "{{ playbook_dir }}/ha/prep/load-vars.yml"

- name: Build HA runtime facts
  ansible.builtin.import_tasks: "{{ playbook_dir }}/ha/prep/build-runtime.yml"
