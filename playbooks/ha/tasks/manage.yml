- name: Remove HA device group members
  f5networks.f5_modules.bigip_device_group_member:
    provider: "{{ provider }}"
    device_group: "{{ item.device_group }}"
    name: "{{ item.name }}"
    state: absent
  loop: "{{ ha_device_group_members_delete | default([]) }}"
  loop_control:
    label: "{{ item.device_group }}/{{ item.name }}"

- name: Remove device groups
  f5networks.f5_modules.bigip_device_group:
    provider: "{{ provider }}"
    name: "{{ item.name }}"
    state: absent
  loop: "{{ ha_device_groups_delete | default([]) }}"
  loop_control:
    label: "{{ item.name }}"

- name: Remove traffic groups
  f5networks.f5_modules.bigip_device_traffic_group:
    provider: "{{ provider }}"
    partition: "{{ item.partition | default('Common') }}"
    name: "{{ item.name }}"
    state: absent
  loop: "{{ ha_traffic_groups_delete | default([]) }}"
  loop_control:
    label: "{{ item.partition | default('Common') }}/{{ item.name }}"

- name: Remove device trusts
  f5networks.f5_modules.bigip_device_trust:
    provider: "{{ provider }}"
    peer_server: "{{ item.peer_server }}"
    peer_hostname: "{{ item.peer_hostname | default(omit) }}"
    peer_user: "{{ item.peer_user | default(omit) }}"
    peer_password: "{{ item.peer_password | default(omit) }}"
    type: "{{ item.type | default(omit) }}"
    state: absent
  loop: "{{ ha_device_trusts_delete | default([]) }}"
  loop_control:
    label: "{{ item.peer_hostname | default(item.peer_server) }}"

- name: Create device trusts
  f5networks.f5_modules.bigip_device_trust:
    provider: "{{ provider }}"
    peer_server: "{{ item.peer_server }}"
    peer_hostname: "{{ item.peer_hostname | default(omit) }}"
    peer_user: "{{ item.peer_user | default(omit) }}"
    peer_password: "{{ item.peer_password | default(omit) }}"
    type: "{{ item.type | default('peer') }}"
    state: present
  loop: "{{ ha_device_trusts_present | default([]) }}"
  loop_control:
    label: "{{ item.peer_hostname | default(item.peer_server) }}"

- name: Create device groups
  f5networks.f5_modules.bigip_device_group:
    provider: "{{ provider }}"
    name: "{{ item.name }}"
    type: "{{ item.type | default(omit) }}"
    auto_sync: "{{ item.auto_sync | default(omit) }}"
    asm_sync: "{{ item.asm_sync | default(omit) }}"
    description: "{{ item.description | default(omit) }}"
    full_sync: "{{ item.full_sync | default(omit) }}"
    max_incremental_sync_size: "{{ item.max_incremental_sync_size | default(omit) }}"
    network_failover: "{{ item.network_failover | default(omit) }}"
    save_on_auto_sync: "{{ item.save_on_auto_sync | default(omit) }}"
    state: present
  loop: "{{ ha_device_groups_present | default([]) }}"
  loop_control:
    label: "{{ item.name }}"

- name: Add members to device groups
  f5networks.f5_modules.bigip_device_group_member:
    provider: "{{ provider }}"
    device_group: "{{ item.device_group }}"
    name: "{{ item.name }}"
    state: present
  loop: "{{ ha_device_group_members_present | default([]) }}"
  loop_control:
    label: "{{ item.device_group }}/{{ item.name }}"

- name: Create traffic groups
  f5networks.f5_modules.bigip_device_traffic_group:
    provider: "{{ provider }}"
    partition: "{{ item.partition | default('Common') }}"
    name: "{{ item.name }}"
    ha_order: "{{ item.ha_order | default(omit) }}"
    ha_group: "{{ item.ha_group | default(omit) }}"
    ha_load_factor: "{{ item.ha_load_factor | default(omit) }}"
    mac_address: "{{ item.mac_address | default(omit) }}"
    auto_failback: "{{ item.auto_failback | default(omit) }}"
    auto_failback_time: "{{ item.auto_failback_time | default(omit) }}"
    state: present
  loop: "{{ ha_traffic_groups_present | default([]) }}"
  loop_control:
    label: "{{ item.partition | default('Common') }}/{{ item.name }}"

- name: Run config sync actions
  f5networks.f5_modules.bigip_configsync_action:
    provider: "{{ provider }}"
    device_group: "{{ item.device_group }}"
    sync_device_to_group: "{{ item.sync_device_to_group | default(omit) }}"
    sync_group_to_device: "{{ item.sync_group_to_device | default(omit) }}"
    overwrite_config: "{{ item.overwrite_config | default(omit) }}"
  loop: "{{ ha_configsync_actions | default([]) }}"
  loop_control:
    label: "{{ item.device_group }}"

- name: Save BIG-IP configuration after HA changes
  f5networks.f5_modules.bigip_config:
    provider: "{{ provider }}"
    save: true
