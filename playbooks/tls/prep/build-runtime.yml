- name: Classify TLS object operations
  ansible.builtin.set_fact:
    tls_keys_delete: >-
      {{
        ((tls_keys | default([])) + (tls_key_deletions | default([])))
        | selectattr('state', 'defined')
        | selectattr('state', 'equalto', 'absent')
        | list
      }}
    tls_keys_present: >-
      {{
        (tls_keys | default([]))
        | rejectattr('state', 'defined')
        | list
        +
        (
          (tls_keys | default([]))
          | selectattr('state', 'defined')
          | rejectattr('state', 'equalto', 'absent')
          | list
        )
      }}
    tls_certificates_delete: >-
      {{
