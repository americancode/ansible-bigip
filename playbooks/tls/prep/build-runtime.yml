- name: Classify TLS key operations into tls_keys_present/tls_keys_delete
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/classify-operations.yml"
  vars:
    object_label: TLS key
    active_objects: "{{ tls_keys | default([]) }}"
    deletion_objects: "{{ tls_key_deletions | default([]) }}"
    delete_var: tls_keys_delete
    present_var: tls_keys_present

