- name: Load TLS key fragments into tls_keys/tls_key_deletions
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/load-fragment-tree.yml"
  vars:
    fragment_label: TLS key
    source_root: "{{ repo_root }}/vars/tls/keys"
    deletion_root: "{{ repo_root }}/vars/tls/deletions/keys"
    fragment_var_name: tls_key_fragment
    fragment_deletion_var_name: tls_key_deletion_fragment
    collection_key: tls_keys
    defaults_key: tls_key_defaults
    aggregate_var: tls_keys
    deletion_aggregate_var: tls_key_deletions

