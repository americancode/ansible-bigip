- name: Discover TLS key fragments
  ansible.builtin.set_fact:
    tls_key_files: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          "find {{ repo_root }}/vars/tls/keys -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
        ).splitlines() | reject('equalto', '') | list
      }}
    tls_key_deletion_files: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          "find {{ repo_root }}/vars/tls/deletions/keys -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
        ).splitlines() | reject('equalto', '') | list
      }}

- name: Load TLS key fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: tls_key_fragment
  loop: "{{ tls_key_files }}"
  register: tls_key_include_results

- name: Load TLS key deletion fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: tls_key_deletion_fragment
  loop: "{{ tls_key_deletion_files }}"
  register: tls_key_deletion_include_results

- name: Aggregate TLS keys with directory settings
  ansible.builtin.set_fact:
    tls_keys: "{{ tls_keys | default([]) + [ tls_key_directory_defaults | combine(item.1, recursive=True) ] }}"
  loop: "{{ query('subelements', tls_key_include_results.results, 'ansible_facts.tls_key_fragment.tls_keys', {'skip_missing': True}) }}"
  vars:
    tls_key_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    tls_key_directory_defaults: >-
      {{
        (
          lookup('ansible.builtin.file', tls_key_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ).tls_key_defaults | default({})
      }}

- name: Aggregate TLS key deletions with directory settings
  ansible.builtin.set_fact:
    tls_key_deletions: "{{ tls_key_deletions | default([]) + [ (tls_key_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
  loop: "{{ query('subelements', tls_key_deletion_include_results.results, 'ansible_facts.tls_key_deletion_fragment.tls_keys', {'skip_missing': True}) }}"
  vars:
    tls_key_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    tls_key_deletion_directory_defaults: >-
      {{
        (
          lookup('ansible.builtin.file', tls_key_deletion_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ).tls_key_defaults | default({})
      }}

