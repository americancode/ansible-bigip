---
# TLS prep orchestrator.
# Produces the classified TLS runtime sets consumed by apply/delete tasks:
# - `tls_keys_present` / `tls_keys_delete`
# - `tls_certificates_present` / `tls_certificates_delete`
# - `tls_ca_bundles_present` / `tls_ca_bundles_delete`
# - `tls_client_ssl_profiles_present` / `tls_client_ssl_profiles_delete`
# - `tls_server_ssl_profiles_present` / `tls_server_ssl_profiles_delete`

- name: Load TLS var fragments
  ansible.builtin.import_tasks: "{{ playbook_dir }}/tls/prep/load-vars.yml"

- name: Build TLS runtime facts
  ansible.builtin.import_tasks: "{{ playbook_dir }}/tls/prep/build-runtime.yml"
