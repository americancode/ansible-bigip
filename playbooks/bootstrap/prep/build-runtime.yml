- name: Classify bootstrap license operations into bootstrap_licenses_present/bootstrap_licenses_delete
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/classify-operations.yml"
  vars:
    object_label: bootstrap license
    active_objects: "{{ bootstrap_licenses | default([]) }}"
    deletion_objects: "{{ bootstrap_license_deletions | default([]) }}"
    delete_var: bootstrap_licenses_delete
    present_var: bootstrap_licenses_present

- name: Classify bootstrap management operations into bootstrap_management_present/bootstrap_management_delete
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/classify-operations.yml"
  vars:
    object_label: bootstrap management
    active_objects: "{{ bootstrap_management | default([]) }}"
    deletion_objects: "{{ bootstrap_management_deletions | default([]) }}"
    delete_var: bootstrap_management_delete
    present_var: bootstrap_management_present

- name: Probe management route presence on BIG-IP
  f5networks.f5_modules.bigip_command:
    provider: "{{ provider }}"
    commands:
      - "{{ item | build_management_route_tmsh_command('show') }}"
    warn: false
  loop: "{{ bootstrap_management_present | default([]) }}"
  loop_control:
    label: "{{ item.route_name | default('default') }}"
  register: bootstrap_management_route_probe_results
  failed_when: false

- name: Build bootstrap management route existence map
  ansible.builtin.set_fact:
    bootstrap_management_route_exists_by_name: >-
      {{
        bootstrap_management_route_exists_by_name | default({}) | combine({
          (item.item.route_name | default('default')): (
            item.failed is defined and not item.failed and
            (item.stdout is defined) and
            (item.stdout | length > 0) and
            ((item.stdout[0] | default('')) != '')
          )
        })
      }}
  loop: "{{ bootstrap_management_route_probe_results.results | default([]) }}"
