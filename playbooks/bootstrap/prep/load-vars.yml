- name: Load bootstrap license fragments into bootstrap_licenses/bootstrap_license_deletions
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/load-fragment-tree.yml"
  vars:
    fragment_label: bootstrap license
    source_root: "{{ repo_root }}/vars/bootstrap/license"
    deletion_root: "{{ repo_root }}/vars/bootstrap/deletions/license"
    fragment_var_name: bootstrap_license_fragment
    fragment_deletion_var_name: bootstrap_license_deletion_fragment
    collection_key: bootstrap_licenses
    defaults_key: bootstrap_license_defaults
    aggregate_var: bootstrap_licenses
    deletion_aggregate_var: bootstrap_license_deletions

- name: Load bootstrap management fragments into bootstrap_management/bootstrap_management_deletions
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/load-fragment-tree.yml"
  vars:
    fragment_label: bootstrap management
    source_root: "{{ repo_root }}/vars/bootstrap/management"
    deletion_root: "{{ repo_root }}/vars/bootstrap/deletions/management"
    fragment_var_name: bootstrap_management_fragment
    fragment_deletion_var_name: bootstrap_management_deletion_fragment
    collection_key: bootstrap_management
    defaults_key: bootstrap_management_defaults
    aggregate_var: bootstrap_management
    deletion_aggregate_var: bootstrap_management_deletions
