- name: Aggregate system config with directory settings
  ansible.builtin.set_fact:
    system_config: "{{ system_config | default([]) + [ system_config_directory_defaults | combine(item.1, recursive=True) ] }}"
  loop: "{{ query('subelements', system_config_include_results.results, 'ansible_facts.system_config_fragment.system_config', {'skip_missing': True}) }}"
  vars:
    system_config_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    system_config_directory_defaults: >-
      {{
        (
          lookup('ansible.builtin.file', system_config_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ).system_config_defaults | default({})
      }}

- name: Classify system DNS operations
  ansible.builtin.set_fact:
    system_dns_delete: >-
      {{
        ((system_dns | default([])) + (system_dns_deletions | default([])))
        | selectattr('state', 'defined')
        | selectattr('state', 'equalto', 'absent')
        | list
      }}
    system_dns_present: >-
      {{
        (system_dns | default([]))
        | rejectattr('state', 'defined')
        | list
        +
        (
          (system_dns | default([]))
          | selectattr('state', 'defined')
          | rejectattr('state', 'equalto', 'absent')
          | list
        )
      }}

