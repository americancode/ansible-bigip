- name: Discover system hostname fragments
  ansible.builtin.set_fact:
    system_hostname_files: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          "find {{ repo_root }}/vars/system/hostname -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
        ).splitlines() | reject('equalto', '') | list
      }}

- name: Load system hostname fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: system_hostname_fragment
  loop: "{{ system_hostname_files }}"
  register: system_hostname_include_results

- name: Aggregate system hostnames with directory settings
  ansible.builtin.set_fact:
    system_hostnames: "{{ system_hostnames | default([]) + [ system_hostname_directory_defaults | combine(item.1, recursive=True) ] }}"
  loop: "{{ query('subelements', system_hostname_include_results.results, 'ansible_facts.system_hostname_fragment.system_hostnames', {'skip_missing': True}) }}"
  vars:
    system_hostname_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    system_hostname_directory_defaults: >-
      {{
        (
          lookup('ansible.builtin.file', system_hostname_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ).system_hostname_defaults | default({})
      }}

