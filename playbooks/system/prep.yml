---
# System prep orchestrator.
# Produces the classified system runtime sets, including:
# - `system_dns_present` / `system_dns_delete`
# - `system_ntp_present` / `system_ntp_delete`
# - `system_provisioning_present` / `system_provisioning_delete`
# - `system_users_present` / `system_users_delete`
# - `system_auth_ldap_present` / `system_auth_ldap_delete`
# - `system_auth_tacacs_present` / `system_auth_tacacs_delete`
# - `system_auth_radius_servers_present` / `system_auth_radius_servers_delete`
# - `system_auth_radius_present` / `system_auth_radius_delete`
# - `system_login_banner_present` / `system_login_banner_delete`

- name: Load system var fragments
  ansible.builtin.import_tasks: "{{ playbook_dir }}/system/prep/load-vars.yml"

- name: Build system runtime facts
  ansible.builtin.import_tasks: "{{ playbook_dir }}/system/prep/build-runtime.yml"
