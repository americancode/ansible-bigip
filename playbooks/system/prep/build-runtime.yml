- name: Classify system DNS operations into system_dns_present/system_dns_delete
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/classify-operations.yml"
  vars:
    object_label: system DNS
    active_objects: "{{ system_dns | default([]) }}"
    deletion_objects: "{{ system_dns_deletions | default([]) }}"
    delete_var: system_dns_delete
    present_var: system_dns_present

