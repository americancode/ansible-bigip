- name: Load system hostname fragments into system_hostnames
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/load-fragment-tree.yml"
  vars:
    fragment_label: system hostname
    source_root: "{{ repo_root }}/vars/system/hostname"
    deletion_root: ""
    fragment_var_name: system_hostname_fragment
    collection_key: system_hostnames
    defaults_key: system_hostname_defaults
    aggregate_var: system_hostnames
    deletion_aggregate_var: system_hostname_deletions

