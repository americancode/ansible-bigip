- name: Delete GTM BIG-IP monitors
  f5networks.f5_modules.bigip_gtm_monitor_bigip:
    provider: "{{ provider }}"
    partition: "{{ item.partition | default('Common') }}"
    name: "{{ item.name }}"
    state: absent
  loop: "{{ gtm_monitors_delete | default([]) }}"
  loop_control:
    label: "{{ item.partition | default('Common') }}/{{ item.name }}"
  when:
    - item.type == 'bigip'

