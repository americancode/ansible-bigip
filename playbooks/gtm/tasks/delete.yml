- name: Delete GTM topology records
  f5networks.f5_modules.bigip_gtm_topology_record:
    provider: "{{ provider }}"
    partition: "{{ item.partition | default('Common') }}"
    source: "{{ item.source }}"
    destination: "{{ item.destination }}"
    state: absent
  loop: "{{ gtm_topology_records_delete | default([]) }}"
  loop_control:
    label: "source={{ item.source | to_json }} destination={{ item.destination | to_json }}"

- name: Delete Wide IPs
  f5networks.f5_modules.bigip_gtm_wide_ip:
    provider: "{{ provider }}"
    partition: "{{ item.partition | default('Common') }}"
    name: "{{ item.name }}"
    type: "{{ item.record_type | default('a') }}"
    state: absent
  loop: "{{ gtm_wide_ips_delete | default([]) }}"
  loop_control:
    label: "{{ item.partition | default('Common') }}/{{ item.name }}"

- name: Delete GTM pools
  f5networks.f5_modules.bigip_gtm_pool:
    provider: "{{ provider }}"
    partition: "{{ item.partition | default('Common') }}"
    name: "{{ item.name }}"
    type: "{{ item.record_type | default('a') }}"
    state: absent
  loop: "{{ gtm_all_pools_delete | default([]) }}"
  loop_control:
    label: "{{ item.partition | default('Common') }}/{{ item.name }}"

- name: Delete manual GTM virtual servers for deleted pools
  f5networks.f5_modules.bigip_gtm_virtual_server:
    provider: "{{ provider }}"
    partition: "{{ item.1.partition | default(item.0.partition | default('Common')) }}"
    server_name: "{{ item.1.server }}"
    name: "{{ item.1.virtual_server }}"
    state: absent
  loop: "{{ query('subelements', gtm_all_pools_delete | default([]), 'members', {'skip_missing': True}) }}"
  loop_control:
    label: "{{ item.1.partition | default(item.0.partition | default('Common')) }}/{{ item.1.server }}/{{ item.1.virtual_server }}"

- name: Delete GTM servers
  f5networks.f5_modules.bigip_gtm_server:
    provider: "{{ provider }}"
    partition: "{{ item.partition | default('Common') }}"
    name: "{{ item.name }}"
    state: absent
  loop: "{{ gtm_servers_delete | default([]) }}"
  loop_control:
    label: "{{ item.partition | default('Common') }}/{{ item.name }}"

