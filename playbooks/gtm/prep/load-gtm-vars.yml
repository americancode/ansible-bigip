- name: Discover GTM pool fragments
  ansible.builtin.set_fact:
    gtm_pool_files: "{{ (repo_root ~ '/vars/gtm/pools') | discover_yaml_fragments }}"
    gtm_pool_deletion_files: "{{ (repo_root ~ '/vars/gtm/deletions/pools') | discover_yaml_fragments }}"

- name: Load GTM pool fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: gtm_pool_fragment
  loop: "{{ gtm_pool_files }}"
  register: gtm_pool_include_results

- name: Load GTM pool deletion fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: gtm_pool_deletion_fragment
  loop: "{{ gtm_pool_deletion_files }}"
  register: gtm_pool_deletion_include_results

- name: Aggregate GTM pools with layered directory settings
  ansible.builtin.set_fact:
    gtm_pools: >-
      {{
        gtm_pools | default([]) + [
          (
            gtm_pool_settings_payload.gtm_pool_defaults
            | default({})
            | combine(item.1, recursive=True)
            | normalize_gtm_pool(
                gtm_pool_settings_payload.gtm_pool_defaults | default({}),
                gtm_pool_settings_payload.gtm_member_defaults | default({}),
                gtm_pool_settings_payload.gtm_monitor_sets | default({}),
                repo_ltm_virtual_server_lookup | default({})
              )
          )
        ]
      }}
  loop: "{{ query('subelements', gtm_pool_include_results.results, 'ansible_facts.gtm_pool_fragment.gtm_pools', {'skip_missing': True}) }}"
  vars:
    gtm_pool_settings_payload: >-
      {{
        item.0.item
        | load_settings_hierarchy(repo_root ~ '/vars/gtm/pools')
      }}

- name: Aggregate GTM pool deletions with layered directory settings
  ansible.builtin.set_fact:
    gtm_pool_deletions: >-
      {{
        gtm_pool_deletions | default([]) + [
          (
            (
              gtm_pool_deletion_settings_payload.gtm_pool_defaults
              | default({})
              | combine(item.1, recursive=True)
              | normalize_gtm_pool(
                  gtm_pool_deletion_settings_payload.gtm_pool_defaults | default({}),
                  gtm_pool_deletion_settings_payload.gtm_member_defaults | default({}),
                  gtm_pool_deletion_settings_payload.gtm_monitor_sets | default({}),
                  repo_ltm_virtual_server_lookup | default({})
                )
            )
            | combine({'state': 'absent'}, recursive=True)
          )
        ]
      }}
  loop: "{{ query('subelements', gtm_pool_deletion_include_results.results, 'ansible_facts.gtm_pool_deletion_fragment.gtm_pools', {'skip_missing': True}) }}"
  vars:
    gtm_pool_deletion_settings_payload: >-
      {{
        item.0.item
        | load_settings_hierarchy(repo_root ~ '/vars/gtm/deletions/pools')
      }}

