- name: Discover GTM datacenter fragments
  ansible.builtin.set_fact:
    gtm_datacenter_files: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          "find {{ repo_root }}/vars/gtm/datacenters -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
        ).splitlines() | reject('equalto', '') | list
      }}
    gtm_datacenter_deletion_files: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          "find {{ repo_root }}/vars/gtm/deletions/datacenters -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
        ).splitlines() | reject('equalto', '') | list
      }}

- name: Load GTM datacenter fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: gtm_datacenter_fragment
  loop: "{{ gtm_datacenter_files }}"
  register: gtm_datacenter_include_results

- name: Load GTM datacenter deletion fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: gtm_datacenter_deletion_fragment
  loop: "{{ gtm_datacenter_deletion_files }}"
  register: gtm_datacenter_deletion_include_results

- name: Aggregate GTM datacenters with directory settings
  ansible.builtin.set_fact:
    gtm_datacenters: "{{ gtm_datacenters | default([]) + [ gtm_datacenter_directory_defaults | combine(item.1, recursive=True) ] }}"
  loop: "{{ query('subelements', gtm_datacenter_include_results.results, 'ansible_facts.gtm_datacenter_fragment.gtm_datacenters', {'skip_missing': True}) }}"
  vars:
    gtm_datacenter_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    gtm_datacenter_directory_defaults: >-
      {{
        (
          lookup('ansible.builtin.file', gtm_datacenter_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ).gtm_datacenter_defaults | default({})
      }}

