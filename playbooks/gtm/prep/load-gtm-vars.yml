- name: Aggregate GTM pools with directory settings
  ansible.builtin.set_fact:
    gtm_pools: >-
      {{
        gtm_pools | default([]) + [
          (
            gtm_pool_directory_defaults
            | combine(item.1, recursive=True)
            | normalize_gtm_pool(
                gtm_pool_directory_defaults,
                gtm_pool_member_defaults,
                gtm_pool_monitor_sets,
                repo_ltm_virtual_server_lookup | default({})
              )
          )
        ]
      }}
  loop: "{{ query('subelements', gtm_pool_include_results.results, 'ansible_facts.gtm_pool_fragment.gtm_pools', {'skip_missing': True}) }}"
  vars:
    gtm_pool_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    gtm_pool_settings_payload: >-
      {{
        (
          lookup('ansible.builtin.file', gtm_pool_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        )
      }}
    gtm_pool_directory_defaults: >-
      {{
        gtm_pool_settings_payload.gtm_pool_defaults | default({})
      }}
    gtm_pool_member_defaults: "{{ gtm_pool_settings_payload.gtm_member_defaults | default({}) }}"
    gtm_pool_monitor_sets: "{{ gtm_pool_settings_payload.gtm_monitor_sets | default({}) }}"

