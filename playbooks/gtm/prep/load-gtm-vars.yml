  loop: "{{ query('subelements', gtm_pool_deletion_include_results.results, 'ansible_facts.gtm_pool_deletion_fragment.gtm_pools', {'skip_missing': True}) }}"
  vars:
    gtm_pool_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
