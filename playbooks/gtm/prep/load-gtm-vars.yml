- name: Load GTM datacenter fragments into gtm_datacenters/gtm_datacenter_deletions
  ansible.builtin.import_tasks: "{{ playbook_dir }}/shared/prep/load-fragment-tree.yml"
  vars:
    fragment_label: GTM datacenter
    source_root: "{{ repo_root }}/vars/gtm/datacenters"
    deletion_root: "{{ repo_root }}/vars/gtm/deletions/datacenters"
    fragment_var_name: gtm_datacenter_fragment
    fragment_deletion_var_name: gtm_datacenter_deletion_fragment
    collection_key: gtm_datacenters
    defaults_key: gtm_datacenter_defaults
    aggregate_var: gtm_datacenters
    deletion_aggregate_var: gtm_datacenter_deletions

