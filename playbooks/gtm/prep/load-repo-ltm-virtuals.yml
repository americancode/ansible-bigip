- name: Discover repo-known LTM virtual server fragments
  ansible.builtin.set_fact:
    ltm_virtual_server_files: "{{ (repo_root ~ '/vars/ltm/virtual_servers') | discover_yaml_fragments }}"
    ltm_virtual_server_deletion_files: "{{ (repo_root ~ '/vars/ltm/deletions/virtual_servers') | discover_yaml_fragments }}"

- name: Load repo-known LTM virtual server fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: ltm_virtual_server_fragment
  loop: "{{ ltm_virtual_server_files }}"
  register: ltm_virtual_server_include_results

- name: Load repo-known LTM virtual server deletion fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: ltm_virtual_server_deletion_fragment
  loop: "{{ ltm_virtual_server_deletion_files }}"
  register: ltm_virtual_server_deletion_include_results

- name: Aggregate repo-known LTM virtual servers with layered directory settings
  ansible.builtin.set_fact:
    repo_ltm_virtual_servers: >-
      {{
        repo_ltm_virtual_servers | default([]) + [
          (
            ltm_virtual_server_settings_payload.ltm_virtual_server_defaults
            | default({})
            | combine(item.1, recursive=True)
          )
        ]
      }}
  loop: "{{ query('subelements', ltm_virtual_server_include_results.results, 'ansible_facts.ltm_virtual_server_fragment.ltm_virtual_servers', {'skip_missing': True}) }}"
  vars:
    ltm_virtual_server_settings_payload: >-
      {{
        item.0.item
        | load_settings_hierarchy(repo_root ~ '/vars/ltm/virtual_servers')
      }}

- name: Aggregate repo-known LTM virtual server deletions with layered directory settings
  ansible.builtin.set_fact:
    repo_ltm_virtual_server_deletions: >-
      {{
        repo_ltm_virtual_server_deletions | default([]) + [
          (
            ltm_virtual_server_deletion_settings_payload.ltm_virtual_server_defaults
            | default({})
            | combine(item.1, recursive=True)
            | combine({'state': 'absent'}, recursive=True)
          )
        ]
      }}
  loop: "{{ query('subelements', ltm_virtual_server_deletion_include_results.results, 'ansible_facts.ltm_virtual_server_deletion_fragment.ltm_virtual_servers', {'skip_missing': True}) }}"
  vars:
    ltm_virtual_server_deletion_settings_payload: >-
      {{
        item.0.item
        | load_settings_hierarchy(repo_root ~ '/vars/ltm/deletions/virtual_servers')
      }}

- name: Load repo-known dedicated LTM intent fragments
  ansible.builtin.import_tasks: "{{ playbook_dir }}/gtm/prep/intents/clusters/load-repo-ltm-rke2-server-intents.yml"
