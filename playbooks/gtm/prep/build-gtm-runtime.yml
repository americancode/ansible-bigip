- name: Classify GTM object operations
  ansible.builtin.set_fact:
    gtm_datacenters_delete: "{{ gtm_datacenter_ops.delete }}"
    gtm_datacenters_present: "{{ gtm_datacenter_ops.present }}"
    gtm_monitors_delete: "{{ gtm_monitor_ops.delete }}"
    gtm_monitors_present: "{{ gtm_monitor_ops.present }}"
    gtm_servers_delete: "{{ gtm_server_ops.delete }}"
    gtm_servers_present: "{{ gtm_server_ops.present }}"
    gtm_pools_delete: "{{ gtm_pool_ops.delete }}"
    gtm_pools_present: "{{ gtm_pool_ops.present }}"
    gtm_wide_ips_delete: "{{ gtm_wide_ip_ops.delete }}"
    gtm_wide_ips_present: "{{ gtm_wide_ip_ops.present }}"
    gtm_topology_regions_delete: "{{ gtm_topology_region_ops.delete }}"
    gtm_topology_regions_present: "{{ gtm_topology_region_ops.present }}"
    gtm_topology_records_delete: "{{ gtm_topology_record_ops.delete }}"
    gtm_topology_records_present: "{{ gtm_topology_record_ops.present }}"
  vars:
    gtm_datacenter_ops: "{{ (gtm_datacenters | default([])) | classify_operations(gtm_datacenter_deletions | default([])) }}"
    gtm_monitor_ops: "{{ (gtm_monitors | default([])) | classify_operations(gtm_monitor_deletions | default([])) }}"
    gtm_server_ops: "{{ (gtm_servers | default([])) | classify_operations(gtm_server_deletions | default([])) }}"
    gtm_pool_ops: "{{ (gtm_pools | default([])) | classify_operations(gtm_pool_deletions | default([])) }}"
    gtm_wide_ip_ops: "{{ (gtm_wide_ips | default([])) | classify_operations(gtm_wide_ip_deletions | default([])) }}"
    gtm_topology_region_ops: "{{ (gtm_topology_regions | default([])) | classify_operations(gtm_topology_region_deletions | default([])) }}"
    gtm_topology_record_ops: "{{ (gtm_topology_records | default([])) | classify_operations(gtm_topology_record_deletions | default([])) }}"

- name: Build GTM server-derived datacenter intents
  ansible.builtin.import_tasks: "{{ playbook_dir }}/gtm/prep/intents/inline/build-server-datacenter-intents.yml"

- name: Build GTM Wide IP intent shortcuts
  ansible.builtin.import_tasks: "{{ playbook_dir }}/gtm/prep/intents/inline/build-wide-ip-intents.yml"
