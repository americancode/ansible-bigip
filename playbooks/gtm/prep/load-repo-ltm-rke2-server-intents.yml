- name: Discover repo-known LTM RKE2 server intent fragments
  ansible.builtin.set_fact:
    repo_ltm_rke2_server_intent_files: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          "find {{ repo_root }}/vars/ltm/intents -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
        ).splitlines() | reject('equalto', '') | list
      }}

- name: Load repo-known LTM RKE2 server intent fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: repo_ltm_rke2_server_intent_fragment
  loop: "{{ repo_ltm_rke2_server_intent_files }}"
  register: repo_ltm_rke2_server_intent_include_results

- name: Aggregate repo-known LTM RKE2 server intents with directory settings
  ansible.builtin.set_fact:
    repo_ltm_rke2_server_intents: >-
      {{
        repo_ltm_rke2_server_intents | default([]) + [
          (
            repo_ltm_rke2_server_intent_directory_defaults
            | combine(item.1, recursive=True)
            | combine({'__source_file': item.0.item}, recursive=True)
          )
        ]
      }}
  loop: "{{ query('subelements', repo_ltm_rke2_server_intent_include_results.results, 'ansible_facts.repo_ltm_rke2_server_intent_fragment.ltm_rke2_server_intents', {'skip_missing': True}) }}"
  vars:
    repo_ltm_rke2_server_intent_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    repo_ltm_rke2_server_intent_directory_defaults: >-
      {{
        (
          lookup('ansible.builtin.file', repo_ltm_rke2_server_intent_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ).ltm_rke2_server_intent_defaults | default({})
      }}

