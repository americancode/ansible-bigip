- name: Classify repo-known LTM virtual server operations
  ansible.builtin.set_fact:
    repo_ltm_virtual_servers_present: >-
      {{
        (repo_ltm_virtual_servers | default([]))
        | rejectattr('state', 'defined')
        | list
        +
        (
          (repo_ltm_virtual_servers | default([]))
          | selectattr('state', 'defined')
          | rejectattr('state', 'equalto', 'absent')
          | list
        )
      }}

- name: Classify repo-known LTM RKE2 server intent operations
  ansible.builtin.set_fact:
    repo_ltm_rke2_server_intents_present: >-
      {{
        (repo_ltm_rke2_server_intents | default([]))
        | rejectattr('state', 'defined')
        | list
        +
        (
          (repo_ltm_rke2_server_intents | default([]))
          | selectattr('state', 'defined')
          | rejectattr('state', 'equalto', 'absent')
          | list
        )
      }}

- name: Compile repo-known LTM RKE2 intent virtual servers
  ansible.builtin.import_tasks: "{{ playbook_dir }}/gtm/prep/intents/clusters/compile-repo-ltm-rke2-server-intents.yml"

- name: Build repo-known LTM virtual server lookup
  ansible.builtin.set_fact:
    repo_ltm_virtual_server_lookup: >-
      {{
        repo_ltm_virtual_server_lookup | default({}) | combine({
          ('/' ~ (item.partition | default('Common')) ~ '/' ~ item.name): {
            'destination': item.destination,
            'destination_port': item.destination_port
          }
        })
      }}
  loop: "{{ repo_ltm_virtual_servers_present | default([]) }}"
  when:
    - item.name is defined
    - item.destination is defined
    - item.destination_port is defined
