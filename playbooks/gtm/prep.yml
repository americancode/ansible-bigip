- name: Aggregate GTM topology record deletions with directory settings
  ansible.builtin.set_fact:
    gtm_topology_record_deletions: "{{ gtm_topology_record_deletions | default([]) + [ (gtm_topology_record_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
  loop: "{{ query('subelements', gtm_topology_record_deletion_include_results.results, 'ansible_facts.gtm_topology_record_deletion_fragment.gtm_topology_records', {'skip_missing': True}) }}"
  vars:
    gtm_topology_record_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    gtm_topology_record_deletion_directory_defaults: >-
      {{
        (
          lookup('ansible.builtin.file', gtm_topology_record_deletion_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ).gtm_topology_record_defaults | default({})
      }}

- name: Classify GTM object operations
  ansible.builtin.set_fact:
    gtm_datacenters_delete: >-
      {{
        ((gtm_datacenters | default([])) + (gtm_datacenter_deletions | default([])))
        | selectattr('state', 'defined')
        | selectattr('state', 'equalto', 'absent')
        | list
      }}
    gtm_datacenters_present: >-
      {{
        (gtm_datacenters | default([]))
        | rejectattr('state', 'defined')
        | list
        +
        (
          (gtm_datacenters | default([]))
          | selectattr('state', 'defined')
          | rejectattr('state', 'equalto', 'absent')
          | list
        )
      }}
    gtm_monitors_delete: >-
      {{
        ((gtm_monitors | default([])) + (gtm_monitor_deletions | default([])))
        | selectattr('state', 'defined')
        | selectattr('state', 'equalto', 'absent')
        | list
      }}
    gtm_monitors_present: >-
      {{
        (gtm_monitors | default([]))
        | rejectattr('state', 'defined')
        | list
        +
        (
          (gtm_monitors | default([]))
          | selectattr('state', 'defined')
          | rejectattr('state', 'equalto', 'absent')
          | list
        )
      }}
    gtm_servers_delete: >-
      {{
        ((gtm_servers | default([])) + (gtm_server_deletions | default([])))
        | selectattr('state', 'defined')
        | selectattr('state', 'equalto', 'absent')
        | list
      }}
    gtm_servers_present: >-
      {{
        (gtm_servers | default([]))
        | rejectattr('state', 'defined')
        | list
        +
        (
          (gtm_servers | default([]))
          | selectattr('state', 'defined')
          | rejectattr('state', 'equalto', 'absent')
          | list
        )
      }}
    gtm_pools_delete: >-
      {{
        ((gtm_pools | default([])) + (gtm_pool_deletions | default([])))
        | selectattr('state', 'defined')
        | selectattr('state', 'equalto', 'absent')
        | list
      }}
    gtm_pools_present: >-
      {{
        (gtm_pools | default([]))
        | rejectattr('state', 'defined')
        | list
        +
        (
          (gtm_pools | default([]))
          | selectattr('state', 'defined')
          | rejectattr('state', 'equalto', 'absent')
          | list
        )
      }}
    gtm_wide_ips_delete: >-
      {{
        ((gtm_wide_ips | default([])) + (gtm_wide_ip_deletions | default([])))
        | selectattr('state', 'defined')
        | selectattr('state', 'equalto', 'absent')
        | list
      }}
    gtm_wide_ips_present: >-
      {{
        (gtm_wide_ips | default([]))
        | rejectattr('state', 'defined')
        | list
        +
        (
          (gtm_wide_ips | default([]))
          | selectattr('state', 'defined')
          | rejectattr('state', 'equalto', 'absent')
          | list
        )
      }}
    gtm_topology_regions_delete: >-
      {{
        ((gtm_topology_regions | default([])) + (gtm_topology_region_deletions | default([])))
        | selectattr('state', 'defined')
        | selectattr('state', 'equalto', 'absent')
        | list
      }}
    gtm_topology_regions_present: >-
      {{
        (gtm_topology_regions | default([]))
        | rejectattr('state', 'defined')
        | list
        +
        (
          (gtm_topology_regions | default([]))
          | selectattr('state', 'defined')
          | rejectattr('state', 'equalto', 'absent')
          | list
        )
      }}
    gtm_topology_records_delete: >-
      {{
        ((gtm_topology_records | default([])) + (gtm_topology_record_deletions | default([])))
        | selectattr('state', 'defined')
        | selectattr('state', 'equalto', 'absent')
        | list
      }}
    gtm_topology_records_present: >-
      {{
        (gtm_topology_records | default([]))
        | rejectattr('state', 'defined')
        | list
        +
        (
          (gtm_topology_records | default([]))
          | selectattr('state', 'defined')
          | rejectattr('state', 'equalto', 'absent')
          | list
        )
      }}

- name: Gather embedded GTM datacenter names from deleted servers
  ansible.builtin.set_fact:
    gtm_embedded_datacenter_names_delete: >-
      {{
        (
          (gtm_servers_delete | default([]))
          | selectattr('datacenter', 'defined')
          | map(attribute='datacenter')
          | unique
          | list
        )
      }}
    gtm_embedded_datacenters_delete: []

- name: Gather embedded GTM datacenter names from active servers
  ansible.builtin.set_fact:
    gtm_embedded_datacenter_names_present: >-
      {{
        (
          (gtm_servers_present | default([]))
          | selectattr('datacenter', 'defined')
          | map(attribute='datacenter')
          | unique
          | list
        )
      }}
    gtm_embedded_datacenters_present: []

- name: Build embedded GTM datacenter deletions
  ansible.builtin.set_fact:
    gtm_embedded_datacenters_delete: "{{ (gtm_embedded_datacenters_delete | default([])) + [ {'name': item} ] }}"
  loop: "{{ gtm_embedded_datacenter_names_delete | default([]) }}"

- name: Build embedded GTM datacenters
  ansible.builtin.set_fact:
    gtm_embedded_datacenters_present: "{{ (gtm_embedded_datacenters_present | default([])) + [ {'name': item} ] }}"
  loop: "{{ gtm_embedded_datacenter_names_present | default([]) }}"

- name: Build canonical GTM datacenter operations
  ansible.builtin.set_fact:
    gtm_canonical_datacenters_delete: "{{ (gtm_datacenters_delete | default([])) + (gtm_embedded_datacenters_delete | default([])) }}"
    gtm_canonical_datacenters_present: "{{ (gtm_datacenters_present | default([])) + (gtm_embedded_datacenters_present | default([])) }}"

- name: Initialize compiled GTM shortcut objects from deleted Wide IPs
  ansible.builtin.set_fact:
    gtm_compiled_wide_ips_delete: []
    gtm_compiled_pools_delete: []

- name: Initialize compiled GTM shortcut objects from active Wide IPs
  ansible.builtin.set_fact:
    gtm_compiled_wide_ips_present: []
    gtm_compiled_pools_present: []

- name: Compile deleted GTM Wide IP shortcut objects
  ansible.builtin.set_fact:
    gtm_compiled_wide_ips_delete: >-
      {{
        (gtm_compiled_wide_ips_delete | default([])) + [gtm_compiled_service.wide_ip]
      }}
    gtm_compiled_pools_delete: >-
      {{
        (gtm_compiled_pools_delete | default([])) + (gtm_compiled_service.pools | default([]))
      }}
  loop: "{{ gtm_wide_ips_delete | default([]) }}"
  vars:
    gtm_wide_ip_settings_path: "{{ item.__source_file | regex_replace('/[^/]+$', '/settings.yml') if item.__source_file is defined else '' }}"
    gtm_wide_ip_settings_payload: >-
      {{
        (
          lookup('ansible.builtin.file', gtm_wide_ip_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ) if gtm_wide_ip_settings_path else {}
      }}
    gtm_wide_ip_pool_defaults: "{{ gtm_wide_ip_settings_payload.gtm_pool_defaults | default({}) }}"
    gtm_wide_ip_member_defaults: "{{ gtm_wide_ip_settings_payload.gtm_member_defaults | default({}) }}"
    gtm_wide_ip_monitor_sets: "{{ gtm_wide_ip_settings_payload.gtm_monitor_sets | default({}) }}"
    gtm_compiled_service: >-
      {{
        item
        | compile_gtm_wide_ip_intent(
            gtm_wide_ip_pool_defaults,
            gtm_wide_ip_member_defaults,
            gtm_wide_ip_monitor_sets,
            repo_ltm_virtual_server_lookup | default({})
          )
      }}

- name: Compile active GTM Wide IP shortcut objects
  ansible.builtin.set_fact:
    gtm_compiled_wide_ips_present: >-
      {{
        (gtm_compiled_wide_ips_present | default([])) + [gtm_compiled_service.wide_ip]
      }}
    gtm_compiled_pools_present: >-
      {{
        (gtm_compiled_pools_present | default([])) + (gtm_compiled_service.pools | default([]))
      }}
  loop: "{{ gtm_wide_ips_present | default([]) }}"
  vars:
    gtm_wide_ip_settings_path: "{{ item.__source_file | regex_replace('/[^/]+$', '/settings.yml') if item.__source_file is defined else '' }}"
    gtm_wide_ip_settings_payload: >-
      {{
        (
          lookup('ansible.builtin.file', gtm_wide_ip_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ) if gtm_wide_ip_settings_path else {}
      }}
    gtm_wide_ip_pool_defaults: "{{ gtm_wide_ip_settings_payload.gtm_pool_defaults | default({}) }}"
    gtm_wide_ip_member_defaults: "{{ gtm_wide_ip_settings_payload.gtm_member_defaults | default({}) }}"
    gtm_wide_ip_monitor_sets: "{{ gtm_wide_ip_settings_payload.gtm_monitor_sets | default({}) }}"
    gtm_compiled_service: >-
      {{
        item
        | compile_gtm_wide_ip_intent(
            gtm_wide_ip_pool_defaults,
            gtm_wide_ip_member_defaults,
            gtm_wide_ip_monitor_sets,
            repo_ltm_virtual_server_lookup | default({})
          )
      }}

- name: Replace raw Wide IP shortcut objects with compiled canonical Wide IPs
  ansible.builtin.set_fact:
    gtm_wide_ips_delete: "{{ gtm_compiled_wide_ips_delete | default([]) }}"
    gtm_wide_ips_present: "{{ gtm_compiled_wide_ips_present | default([]) }}"

- name: Build canonical GTM pool operations
  ansible.builtin.set_fact:
    gtm_canonical_pools_delete: "{{ (gtm_pools_delete | default([])) + (gtm_compiled_pools_delete | default([])) }}"
    gtm_canonical_pools_present: "{{ (gtm_pools_present | default([])) + (gtm_compiled_pools_present | default([])) }}"
