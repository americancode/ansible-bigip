---
# GTM prep orchestrator.
# Produces canonical runtime sets and compiler outputs, including:
# - `repo_ltm_virtual_servers_present`
# - `repo_ltm_virtual_server_lookup`
# - `gtm_datacenters_present` / `gtm_datacenters_delete`
# - `gtm_servers_present` / `gtm_servers_delete`
# - `gtm_wide_ips_present` / `gtm_wide_ips_delete`
# - `gtm_canonical_datacenters_present` / `gtm_canonical_datacenters_delete`
# - `gtm_canonical_pools_present` / `gtm_canonical_pools_delete`
# `repo_ltm_virtual_servers_present` can include first-class LTM virtual-server vars plus compiled output from dedicated LTM intents such as RKE2 clusters.
# The canonical GTM pool sets include both first-class pool vars and compiler output from Wide IP shortcut intents.

- name: Load repo-known LTM virtual-server fragments
  ansible.builtin.import_tasks: "{{ playbook_dir }}/gtm/prep/load-repo-ltm-virtuals.yml"

- name: Build repo-known LTM virtual-server lookup
  ansible.builtin.import_tasks: "{{ playbook_dir }}/gtm/prep/build-repo-ltm-virtuals.yml"

- name: Load GTM var fragments
  ansible.builtin.import_tasks: "{{ playbook_dir }}/gtm/prep/load-gtm-vars.yml"

- name: Build GTM runtime facts and compile intents
  ansible.builtin.import_tasks: "{{ playbook_dir }}/gtm/prep/build-gtm-runtime.yml"
