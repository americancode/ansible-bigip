---
- name: Configure BIG-IP HA objects
  hosts: localhost
  gather_facts: false
  collections:
    - f5networks.f5_modules

  vars:
    repo_root: "{{ playbook_dir }}/.."

  vars_files:
    - "{{ playbook_dir }}/../vars/common.yml"

  pre_tasks:
    - name: Discover HA device trust fragments
      ansible.builtin.set_fact:
        ha_device_trust_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/ha/device_trust -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        ha_device_trust_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/ha/deletions/device_trust -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load HA device trust fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: ha_device_trust_fragment
      loop: "{{ ha_device_trust_files }}"
      register: ha_device_trust_include_results

    - name: Load HA device trust deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: ha_device_trust_deletion_fragment
      loop: "{{ ha_device_trust_deletion_files }}"
      register: ha_device_trust_deletion_include_results

    - name: Aggregate HA device trusts with directory settings
      ansible.builtin.set_fact:
        ha_device_trusts: "{{ ha_device_trusts | default([]) + [ ha_device_trust_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', ha_device_trust_include_results.results, 'ansible_facts.ha_device_trust_fragment.ha_device_trusts', {'skip_missing': True}) }}"
      vars:
        ha_device_trust_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        ha_device_trust_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', ha_device_trust_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).ha_device_trust_defaults | default({})
          }}

    - name: Aggregate HA device trust deletions with directory settings
      ansible.builtin.set_fact:
        ha_device_trust_deletions: "{{ ha_device_trust_deletions | default([]) + [ (ha_device_trust_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', ha_device_trust_deletion_include_results.results, 'ansible_facts.ha_device_trust_deletion_fragment.ha_device_trusts', {'skip_missing': True}) }}"
      vars:
        ha_device_trust_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        ha_device_trust_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', ha_device_trust_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).ha_device_trust_defaults | default({})
          }}

    - name: Discover HA device group fragments
      ansible.builtin.set_fact:
        ha_device_group_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/ha/device_groups -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        ha_device_group_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/ha/deletions/device_groups -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load HA device group fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: ha_device_group_fragment
      loop: "{{ ha_device_group_files }}"
      register: ha_device_group_include_results

    - name: Load HA device group deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: ha_device_group_deletion_fragment
      loop: "{{ ha_device_group_deletion_files }}"
      register: ha_device_group_deletion_include_results

    - name: Aggregate HA device groups with directory settings
      ansible.builtin.set_fact:
        ha_device_groups: "{{ ha_device_groups | default([]) + [ ha_device_group_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', ha_device_group_include_results.results, 'ansible_facts.ha_device_group_fragment.ha_device_groups', {'skip_missing': True}) }}"
      vars:
        ha_device_group_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        ha_device_group_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', ha_device_group_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).ha_device_group_defaults | default({})
          }}

    - name: Aggregate HA device group deletions with directory settings
      ansible.builtin.set_fact:
        ha_device_group_deletions: "{{ ha_device_group_deletions | default([]) + [ (ha_device_group_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', ha_device_group_deletion_include_results.results, 'ansible_facts.ha_device_group_deletion_fragment.ha_device_groups', {'skip_missing': True}) }}"
      vars:
        ha_device_group_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        ha_device_group_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', ha_device_group_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).ha_device_group_defaults | default({})
          }}

    - name: Discover HA device group member fragments
      ansible.builtin.set_fact:
        ha_device_group_member_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/ha/device_group_members -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        ha_device_group_member_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/ha/deletions/device_group_members -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load HA device group member fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: ha_device_group_member_fragment
      loop: "{{ ha_device_group_member_files }}"
      register: ha_device_group_member_include_results

    - name: Load HA device group member deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: ha_device_group_member_deletion_fragment
      loop: "{{ ha_device_group_member_deletion_files }}"
      register: ha_device_group_member_deletion_include_results

    - name: Aggregate HA device group members with directory settings
      ansible.builtin.set_fact:
        ha_device_group_members: "{{ ha_device_group_members | default([]) + [ ha_device_group_member_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', ha_device_group_member_include_results.results, 'ansible_facts.ha_device_group_member_fragment.ha_device_group_members', {'skip_missing': True}) }}"
      vars:
        ha_device_group_member_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        ha_device_group_member_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', ha_device_group_member_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).ha_device_group_member_defaults | default({})
          }}

    - name: Aggregate HA device group member deletions with directory settings
      ansible.builtin.set_fact:
        ha_device_group_member_deletions: "{{ ha_device_group_member_deletions | default([]) + [ (ha_device_group_member_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', ha_device_group_member_deletion_include_results.results, 'ansible_facts.ha_device_group_member_deletion_fragment.ha_device_group_members', {'skip_missing': True}) }}"
      vars:
        ha_device_group_member_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        ha_device_group_member_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', ha_device_group_member_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).ha_device_group_member_defaults | default({})
          }}

    - name: Discover HA traffic group fragments
      ansible.builtin.set_fact:
        ha_traffic_group_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/ha/traffic_groups -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        ha_traffic_group_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/ha/deletions/traffic_groups -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load HA traffic group fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: ha_traffic_group_fragment
      loop: "{{ ha_traffic_group_files }}"
      register: ha_traffic_group_include_results

    - name: Load HA traffic group deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: ha_traffic_group_deletion_fragment
      loop: "{{ ha_traffic_group_deletion_files }}"
      register: ha_traffic_group_deletion_include_results

    - name: Aggregate HA traffic groups with directory settings
      ansible.builtin.set_fact:
        ha_traffic_groups: "{{ ha_traffic_groups | default([]) + [ ha_traffic_group_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', ha_traffic_group_include_results.results, 'ansible_facts.ha_traffic_group_fragment.ha_traffic_groups', {'skip_missing': True}) }}"
      vars:
        ha_traffic_group_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        ha_traffic_group_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', ha_traffic_group_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).ha_traffic_group_defaults | default({})
          }}

    - name: Aggregate HA traffic group deletions with directory settings
      ansible.builtin.set_fact:
        ha_traffic_group_deletions: "{{ ha_traffic_group_deletions | default([]) + [ (ha_traffic_group_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', ha_traffic_group_deletion_include_results.results, 'ansible_facts.ha_traffic_group_deletion_fragment.ha_traffic_groups', {'skip_missing': True}) }}"
      vars:
        ha_traffic_group_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        ha_traffic_group_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', ha_traffic_group_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).ha_traffic_group_defaults | default({})
          }}

    - name: Discover HA config sync action fragments
      ansible.builtin.set_fact:
        ha_configsync_action_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/ha/configsync_actions -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load HA config sync action fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: ha_configsync_action_fragment
      loop: "{{ ha_configsync_action_files }}"
      register: ha_configsync_action_include_results

    - name: Aggregate HA config sync actions with directory settings
      ansible.builtin.set_fact:
        ha_configsync_actions: "{{ ha_configsync_actions | default([]) + [ ha_configsync_action_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', ha_configsync_action_include_results.results, 'ansible_facts.ha_configsync_action_fragment.ha_configsync_actions', {'skip_missing': True}) }}"
      vars:
        ha_configsync_action_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        ha_configsync_action_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', ha_configsync_action_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).ha_configsync_action_defaults | default({})
          }}

    - name: Classify HA object operations
      ansible.builtin.set_fact:
        ha_device_trusts_delete: >-
          {{
            ((ha_device_trusts | default([])) + (ha_device_trust_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        ha_device_trusts_present: >-
          {{
            (ha_device_trusts | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (ha_device_trusts | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}
        ha_device_groups_delete: >-
          {{
            ((ha_device_groups | default([])) + (ha_device_group_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        ha_device_groups_present: >-
          {{
            (ha_device_groups | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (ha_device_groups | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}
        ha_device_group_members_delete: >-
          {{
            ((ha_device_group_members | default([])) + (ha_device_group_member_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        ha_device_group_members_present: >-
          {{
            (ha_device_group_members | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (ha_device_group_members | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}
        ha_traffic_groups_delete: >-
          {{
            ((ha_traffic_groups | default([])) + (ha_traffic_group_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        ha_traffic_groups_present: >-
          {{
            (ha_traffic_groups | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (ha_traffic_groups | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}

  tasks:
    - name: Remove HA device group members
      f5networks.f5_modules.bigip_device_group_member:
        provider: "{{ provider }}"
        device_group: "{{ item.device_group }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ ha_device_group_members_delete | default([]) }}"
      loop_control:
        label: "{{ item.device_group }}/{{ item.name }}"

    - name: Remove device groups
      f5networks.f5_modules.bigip_device_group:
        provider: "{{ provider }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ ha_device_groups_delete | default([]) }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Remove traffic groups
      f5networks.f5_modules.bigip_device_traffic_group:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ ha_traffic_groups_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Remove device trusts
      f5networks.f5_modules.bigip_device_trust:
        provider: "{{ provider }}"
        peer_server: "{{ item.peer_server }}"
        peer_hostname: "{{ item.peer_hostname | default(omit) }}"
        peer_user: "{{ item.peer_user | default(omit) }}"
        peer_password: "{{ item.peer_password | default(omit) }}"
        type: "{{ item.type | default(omit) }}"
        state: absent
      loop: "{{ ha_device_trusts_delete | default([]) }}"
      loop_control:
        label: "{{ item.peer_hostname | default(item.peer_server) }}"

    - name: Create device trusts
      f5networks.f5_modules.bigip_device_trust:
        provider: "{{ provider }}"
        peer_server: "{{ item.peer_server }}"
        peer_hostname: "{{ item.peer_hostname | default(omit) }}"
        peer_user: "{{ item.peer_user | default(omit) }}"
        peer_password: "{{ item.peer_password | default(omit) }}"
        type: "{{ item.type | default('peer') }}"
        state: present
      loop: "{{ ha_device_trusts_present | default([]) }}"
      loop_control:
        label: "{{ item.peer_hostname | default(item.peer_server) }}"

    - name: Create device groups
      f5networks.f5_modules.bigip_device_group:
        provider: "{{ provider }}"
        name: "{{ item.name }}"
        type: "{{ item.type | default(omit) }}"
        auto_sync: "{{ item.auto_sync | default(omit) }}"
        asm_sync: "{{ item.asm_sync | default(omit) }}"
        description: "{{ item.description | default(omit) }}"
        full_sync: "{{ item.full_sync | default(omit) }}"
        max_incremental_sync_size: "{{ item.max_incremental_sync_size | default(omit) }}"
        network_failover: "{{ item.network_failover | default(omit) }}"
        save_on_auto_sync: "{{ item.save_on_auto_sync | default(omit) }}"
        state: present
      loop: "{{ ha_device_groups_present | default([]) }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Add members to device groups
      f5networks.f5_modules.bigip_device_group_member:
        provider: "{{ provider }}"
        device_group: "{{ item.device_group }}"
        name: "{{ item.name }}"
        state: present
      loop: "{{ ha_device_group_members_present | default([]) }}"
      loop_control:
        label: "{{ item.device_group }}/{{ item.name }}"

    - name: Create traffic groups
      f5networks.f5_modules.bigip_device_traffic_group:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        ha_order: "{{ item.ha_order | default(omit) }}"
        ha_group: "{{ item.ha_group | default(omit) }}"
        ha_load_factor: "{{ item.ha_load_factor | default(omit) }}"
        mac_address: "{{ item.mac_address | default(omit) }}"
        auto_failback: "{{ item.auto_failback | default(omit) }}"
        auto_failback_time: "{{ item.auto_failback_time | default(omit) }}"
        state: present
      loop: "{{ ha_traffic_groups_present | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Run config sync actions
      f5networks.f5_modules.bigip_configsync_action:
        provider: "{{ provider }}"
        device_group: "{{ item.device_group }}"
        sync_device_to_group: "{{ item.sync_device_to_group | default(omit) }}"
        sync_group_to_device: "{{ item.sync_group_to_device | default(omit) }}"
        overwrite_config: "{{ item.overwrite_config | default(omit) }}"
      loop: "{{ ha_configsync_actions | default([]) }}"
      loop_control:
        label: "{{ item.device_group }}"

    - name: Save BIG-IP configuration after HA changes
      f5networks.f5_modules.bigip_config:
        provider: "{{ provider }}"
        save: true
