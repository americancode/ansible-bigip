---
- name: Configure BIG-IP TLS objects
  hosts: localhost
  gather_facts: false
  collections:
    - f5networks.f5_modules

  vars:
    repo_root: "{{ playbook_dir }}/.."

  vars_files:
    - "{{ playbook_dir }}/../vars/common.yml"

  pre_tasks:
    - name: Discover TLS key fragments
      ansible.builtin.set_fact:
        tls_key_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/tls/keys -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        tls_key_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/tls/deletions/keys -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load TLS key fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: tls_key_fragment
      loop: "{{ tls_key_files }}"
      register: tls_key_include_results

    - name: Load TLS key deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: tls_key_deletion_fragment
      loop: "{{ tls_key_deletion_files }}"
      register: tls_key_deletion_include_results

    - name: Aggregate TLS keys with directory settings
      ansible.builtin.set_fact:
        tls_keys: "{{ tls_keys | default([]) + [ tls_key_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', tls_key_include_results.results, 'ansible_facts.tls_key_fragment.tls_keys', {'skip_missing': True}) }}"
      vars:
        tls_key_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        tls_key_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', tls_key_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).tls_key_defaults | default({})
          }}

    - name: Aggregate TLS key deletions with directory settings
      ansible.builtin.set_fact:
        tls_key_deletions: "{{ tls_key_deletions | default([]) + [ (tls_key_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', tls_key_deletion_include_results.results, 'ansible_facts.tls_key_deletion_fragment.tls_keys', {'skip_missing': True}) }}"
      vars:
        tls_key_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        tls_key_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', tls_key_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).tls_key_defaults | default({})
          }}

    - name: Discover TLS certificate fragments
      ansible.builtin.set_fact:
        tls_certificate_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/tls/certificates -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        tls_certificate_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/tls/deletions/certificates -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load TLS certificate fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: tls_certificate_fragment
      loop: "{{ tls_certificate_files }}"
      register: tls_certificate_include_results

    - name: Load TLS certificate deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: tls_certificate_deletion_fragment
      loop: "{{ tls_certificate_deletion_files }}"
      register: tls_certificate_deletion_include_results

    - name: Aggregate TLS certificates with directory settings
      ansible.builtin.set_fact:
        tls_certificates: "{{ tls_certificates | default([]) + [ tls_certificate_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', tls_certificate_include_results.results, 'ansible_facts.tls_certificate_fragment.tls_certificates', {'skip_missing': True}) }}"
      vars:
        tls_certificate_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        tls_certificate_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', tls_certificate_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).tls_certificate_defaults | default({})
          }}

    - name: Aggregate TLS certificate deletions with directory settings
      ansible.builtin.set_fact:
        tls_certificate_deletions: "{{ tls_certificate_deletions | default([]) + [ (tls_certificate_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', tls_certificate_deletion_include_results.results, 'ansible_facts.tls_certificate_deletion_fragment.tls_certificates', {'skip_missing': True}) }}"
      vars:
        tls_certificate_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        tls_certificate_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', tls_certificate_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).tls_certificate_defaults | default({})
          }}

    - name: Discover TLS CA bundle fragments
      ansible.builtin.set_fact:
        tls_ca_bundle_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/tls/ca_bundles -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        tls_ca_bundle_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/tls/deletions/ca_bundles -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load TLS CA bundle fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: tls_ca_bundle_fragment
      loop: "{{ tls_ca_bundle_files }}"
      register: tls_ca_bundle_include_results

    - name: Load TLS CA bundle deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: tls_ca_bundle_deletion_fragment
      loop: "{{ tls_ca_bundle_deletion_files }}"
      register: tls_ca_bundle_deletion_include_results

    - name: Aggregate TLS CA bundles with directory settings
      ansible.builtin.set_fact:
        tls_ca_bundles: "{{ tls_ca_bundles | default([]) + [ tls_ca_bundle_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', tls_ca_bundle_include_results.results, 'ansible_facts.tls_ca_bundle_fragment.tls_ca_bundles', {'skip_missing': True}) }}"
      vars:
        tls_ca_bundle_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        tls_ca_bundle_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', tls_ca_bundle_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).tls_ca_bundle_defaults | default({})
          }}

    - name: Aggregate TLS CA bundle deletions with directory settings
      ansible.builtin.set_fact:
        tls_ca_bundle_deletions: "{{ tls_ca_bundle_deletions | default([]) + [ (tls_ca_bundle_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', tls_ca_bundle_deletion_include_results.results, 'ansible_facts.tls_ca_bundle_deletion_fragment.tls_ca_bundles', {'skip_missing': True}) }}"
      vars:
        tls_ca_bundle_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        tls_ca_bundle_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', tls_ca_bundle_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).tls_ca_bundle_defaults | default({})
          }}

    - name: Discover TLS client SSL profile fragments
      ansible.builtin.set_fact:
        tls_client_ssl_profile_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/tls/client_ssl_profiles -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        tls_client_ssl_profile_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/tls/deletions/client_ssl_profiles -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load TLS client SSL profile fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: tls_client_ssl_profile_fragment
      loop: "{{ tls_client_ssl_profile_files }}"
      register: tls_client_ssl_profile_include_results

    - name: Load TLS client SSL profile deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: tls_client_ssl_profile_deletion_fragment
      loop: "{{ tls_client_ssl_profile_deletion_files }}"
      register: tls_client_ssl_profile_deletion_include_results

    - name: Aggregate TLS client SSL profiles with directory settings
      ansible.builtin.set_fact:
        tls_client_ssl_profiles: "{{ tls_client_ssl_profiles | default([]) + [ tls_client_ssl_profile_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', tls_client_ssl_profile_include_results.results, 'ansible_facts.tls_client_ssl_profile_fragment.tls_client_ssl_profiles', {'skip_missing': True}) }}"
      vars:
        tls_client_ssl_profile_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        tls_client_ssl_profile_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', tls_client_ssl_profile_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).tls_client_ssl_profile_defaults | default({})
          }}

    - name: Aggregate TLS client SSL profile deletions with directory settings
      ansible.builtin.set_fact:
        tls_client_ssl_profile_deletions: "{{ tls_client_ssl_profile_deletions | default([]) + [ (tls_client_ssl_profile_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', tls_client_ssl_profile_deletion_include_results.results, 'ansible_facts.tls_client_ssl_profile_deletion_fragment.tls_client_ssl_profiles', {'skip_missing': True}) }}"
      vars:
        tls_client_ssl_profile_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        tls_client_ssl_profile_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', tls_client_ssl_profile_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).tls_client_ssl_profile_defaults | default({})
          }}

    - name: Discover TLS server SSL profile fragments
      ansible.builtin.set_fact:
        tls_server_ssl_profile_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/tls/server_ssl_profiles -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        tls_server_ssl_profile_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find {{ repo_root }}/vars/tls/deletions/server_ssl_profiles -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load TLS server SSL profile fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: tls_server_ssl_profile_fragment
      loop: "{{ tls_server_ssl_profile_files }}"
      register: tls_server_ssl_profile_include_results

    - name: Load TLS server SSL profile deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: tls_server_ssl_profile_deletion_fragment
      loop: "{{ tls_server_ssl_profile_deletion_files }}"
      register: tls_server_ssl_profile_deletion_include_results

    - name: Aggregate TLS server SSL profiles with directory settings
      ansible.builtin.set_fact:
        tls_server_ssl_profiles: "{{ tls_server_ssl_profiles | default([]) + [ tls_server_ssl_profile_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', tls_server_ssl_profile_include_results.results, 'ansible_facts.tls_server_ssl_profile_fragment.tls_server_ssl_profiles', {'skip_missing': True}) }}"
      vars:
        tls_server_ssl_profile_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        tls_server_ssl_profile_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', tls_server_ssl_profile_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).tls_server_ssl_profile_defaults | default({})
          }}

    - name: Aggregate TLS server SSL profile deletions with directory settings
      ansible.builtin.set_fact:
        tls_server_ssl_profile_deletions: "{{ tls_server_ssl_profile_deletions | default([]) + [ (tls_server_ssl_profile_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', tls_server_ssl_profile_deletion_include_results.results, 'ansible_facts.tls_server_ssl_profile_deletion_fragment.tls_server_ssl_profiles', {'skip_missing': True}) }}"
      vars:
        tls_server_ssl_profile_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        tls_server_ssl_profile_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', tls_server_ssl_profile_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).tls_server_ssl_profile_defaults | default({})
          }}

    - name: Classify TLS object operations
      ansible.builtin.set_fact:
        tls_keys_delete: >-
          {{
            ((tls_keys | default([])) + (tls_key_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        tls_keys_present: >-
          {{
            (tls_keys | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (tls_keys | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}
        tls_certificates_delete: >-
          {{
            ((tls_certificates | default([])) + (tls_certificate_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        tls_certificates_present: >-
          {{
            (tls_certificates | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (tls_certificates | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}
        tls_ca_bundles_delete: >-
          {{
            ((tls_ca_bundles | default([])) + (tls_ca_bundle_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        tls_ca_bundles_present: >-
          {{
            (tls_ca_bundles | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (tls_ca_bundles | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}
        tls_client_ssl_profiles_delete: >-
          {{
            ((tls_client_ssl_profiles | default([])) + (tls_client_ssl_profile_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        tls_client_ssl_profiles_present: >-
          {{
            (tls_client_ssl_profiles | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (tls_client_ssl_profiles | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}
        tls_server_ssl_profiles_delete: >-
          {{
            ((tls_server_ssl_profiles | default([])) + (tls_server_ssl_profile_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        tls_server_ssl_profiles_present: >-
          {{
            (tls_server_ssl_profiles | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (tls_server_ssl_profiles | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}

  tasks:
    - name: Delete client SSL profiles
      f5networks.f5_modules.bigip_profile_client_ssl:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ tls_client_ssl_profiles_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Delete server SSL profiles
      f5networks.f5_modules.bigip_profile_server_ssl:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ tls_server_ssl_profiles_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Delete TLS certificates
      f5networks.f5_modules.bigip_ssl_certificate:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ (tls_certificates_delete | default([])) + (tls_ca_bundles_delete | default([])) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Delete TLS keys
      f5networks.f5_modules.bigip_ssl_key:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ tls_keys_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Create TLS keys
      f5networks.f5_modules.bigip_ssl_key:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        content: "{{ item.content }}"
        passphrase: "{{ item.passphrase | default(omit) }}"
        true_names: "{{ item.true_names | default(omit) }}"
        state: present
      loop: "{{ tls_keys_present | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Create TLS certificates
      f5networks.f5_modules.bigip_ssl_certificate:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        content: "{{ item.content }}"
        issuer_cert: "{{ item.issuer_cert | default(omit) }}"
        true_names: "{{ item.true_names | default(omit) }}"
        state: present
      loop: "{{ tls_certificates_present | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Create TLS CA bundles
      f5networks.f5_modules.bigip_ssl_certificate:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        content: "{{ item.content }}"
        issuer_cert: "{{ item.issuer_cert | default(omit) }}"
        true_names: "{{ item.true_names | default(omit) }}"
        state: present
      loop: "{{ tls_ca_bundles_present | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Create client SSL profiles
      f5networks.f5_modules.bigip_profile_client_ssl:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        parent: "{{ item.parent | default(omit) }}"
        cert_key_chain: "{{ item.cert_key_chain | default(omit) }}"
        ciphers: "{{ item.ciphers | default(omit) }}"
        cipher_group: "{{ item.cipher_group | default(omit) }}"
        options: "{{ item.options | default(omit) }}"
        secure_renegotiation: "{{ item.secure_renegotiation | default(omit) }}"
        allow_non_ssl: "{{ item.allow_non_ssl | default(omit) }}"
        cache_size: "{{ item.cache_size | default(omit) }}"
        cache_timeout: "{{ item.cache_timeout | default(omit) }}"
        client_certificate: "{{ item.client_certificate | default(omit) }}"
        client_auth_frequency: "{{ item.client_auth_frequency | default(omit) }}"
        cert_auth_depth: "{{ item.cert_auth_depth | default(omit) }}"
        trusted_cert_authority: "{{ item.trusted_cert_authority | default(omit) }}"
        advertised_cert_authority: "{{ item.advertised_cert_authority | default(omit) }}"
        client_auth_crl: "{{ item.client_auth_crl | default(omit) }}"
        allow_expired_crl: "{{ item.allow_expired_crl | default(omit) }}"
        renegotiation: "{{ item.renegotiation | default(omit) }}"
        retain_certificate: "{{ item.retain_certificate | default(omit) }}"
        server_name: "{{ item.server_name | default(omit) }}"
        sni_default: "{{ item.sni_default | default(omit) }}"
        sni_require: "{{ item.sni_require | default(omit) }}"
        strict_resume: "{{ item.strict_resume | default(omit) }}"
        state: present
      loop: "{{ tls_client_ssl_profiles_present | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Create server SSL profiles
      f5networks.f5_modules.bigip_profile_server_ssl:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        parent: "{{ item.parent | default(omit) }}"
        certificate: "{{ item.certificate | default(omit) }}"
        key: "{{ item.key | default(omit) }}"
        chain: "{{ item.chain | default(omit) }}"
        passphrase: "{{ item.passphrase | default(omit) }}"
        ciphers: "{{ item.ciphers | default(omit) }}"
        cipher_group: "{{ item.cipher_group | default(omit) }}"
        options: "{{ item.options | default(omit) }}"
        secure_renegotiation: "{{ item.secure_renegotiation | default(omit) }}"
        authenticate_name: "{{ item.authenticate_name | default(omit) }}"
        ca_file: "{{ item.ca_file | default(omit) }}"
        ocsp_profile: "{{ item.ocsp_profile | default(omit) }}"
        renegotiation: "{{ item.renegotiation | default(omit) }}"
        server_certificate: "{{ item.server_certificate | default(omit) }}"
        server_name: "{{ item.server_name | default(omit) }}"
        sni_default: "{{ item.sni_default | default(omit) }}"
        sni_require: "{{ item.sni_require | default(omit) }}"
        update_password: "{{ item.update_password | default(omit) }}"
        state: present
      loop: "{{ tls_server_ssl_profiles_present | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Save BIG-IP configuration after TLS changes
      f5networks.f5_modules.bigip_config:
        provider: "{{ provider }}"
        save: true
