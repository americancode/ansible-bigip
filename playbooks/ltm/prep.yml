                ltm_pool_directory_defaults,
                ltm_pool_member_defaults,
                ltm_pool_monitor_sets
              )
          )
        ]
      }}
  loop: "{{ query('subelements', ltm_pool_include_results.results, 'ansible_facts.ltm_pool_fragment.ltm_pools', {'skip_missing': True}) }}"
