      {{
        ltm_pools | default([]) + [
          (
            ltm_pool_directory_defaults
            | combine(item.1, recursive=True)
            | normalize_ltm_pool(
                ltm_pool_directory_defaults,
                ltm_pool_member_defaults,
                ltm_pool_monitor_sets
              )
          )
        ]
      }}
  loop: "{{ query('subelements', ltm_pool_include_results.results, 'ansible_facts.ltm_pool_fragment.ltm_pools', {'skip_missing': True}) }}"
  vars:
    ltm_pool_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    ltm_pool_settings_payload: >-
      {{
        (
          lookup('ansible.builtin.file', ltm_pool_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        )
      }}
    ltm_pool_directory_defaults: >-
      {{
        ltm_pool_settings_payload.ltm_pool_defaults | default({})
      }}
    ltm_pool_member_defaults: "{{ ltm_pool_settings_payload.ltm_member_defaults | default({}) }}"
    ltm_pool_monitor_sets: "{{ ltm_pool_settings_payload.ltm_monitor_sets | default({}) }}"

