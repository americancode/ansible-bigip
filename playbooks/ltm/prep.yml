- name: Load LTM policy fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: ltm_policy_fragment
  loop: "{{ ltm_policy_files }}"
  register: ltm_policy_include_results

- name: Load LTM policy deletion fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: ltm_policy_deletion_fragment
  loop: "{{ ltm_policy_deletion_files }}"
  register: ltm_policy_deletion_include_results

- name: Aggregate LTM policies with directory settings
  ansible.builtin.set_fact:
    ltm_policies: "{{ ltm_policies | default([]) + [ ltm_policy_directory_defaults | combine(item.1, recursive=True) ] }}"
  loop: "{{ query('subelements', ltm_policy_include_results.results, 'ansible_facts.ltm_policy_fragment.ltm_policies', {'skip_missing': True}) }}"
  vars:
    ltm_policy_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    ltm_policy_directory_defaults: >-
      {{
        (
          lookup('ansible.builtin.file', ltm_policy_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ).ltm_policy_defaults | default({})
      }}

- name: Aggregate LTM policy deletions with directory settings
  ansible.builtin.set_fact:
    ltm_policy_deletions: "{{ ltm_policy_deletions | default([]) + [ (ltm_policy_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
  loop: "{{ query('subelements', ltm_policy_deletion_include_results.results, 'ansible_facts.ltm_policy_deletion_fragment.ltm_policies', {'skip_missing': True}) }}"
  vars:
    ltm_policy_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    ltm_policy_deletion_directory_defaults: >-
      {{
        (
          lookup('ansible.builtin.file', ltm_policy_deletion_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ).ltm_policy_defaults | default({})
      }}

- name: Classify LTM monitor operations
  ansible.builtin.set_fact:
    ltm_monitors_delete: >-
      {{
        ((ltm_monitors | default([])) + (ltm_monitor_deletions | default([])))
        | selectattr('state', 'defined')
        | selectattr('state', 'equalto', 'absent')
        | list
      }}
    ltm_monitors_present: >-
      {{
        (ltm_monitors | default([]))
        | rejectattr('state', 'defined')
        | list
        +
        (
          (ltm_monitors | default([]))
          | selectattr('state', 'defined')
          | rejectattr('state', 'equalto', 'absent')
          | list
        )
      }}

