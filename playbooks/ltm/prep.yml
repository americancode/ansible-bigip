- name: Classify LTM monitor operations
  ansible.builtin.set_fact:
    ltm_monitors_delete: >-
      {{
        ((ltm_monitors | default([])) + (ltm_monitor_deletions | default([])))
        | selectattr('state', 'defined')
        | selectattr('state', 'equalto', 'absent')
        | list
      }}
    ltm_monitors_present: >-
      {{
        (ltm_monitors | default([]))
        | rejectattr('state', 'defined')
        | list
        +
        (
          (ltm_monitors | default([]))
          | selectattr('state', 'defined')
          | rejectattr('state', 'equalto', 'absent')
          | list
        )
      }}

