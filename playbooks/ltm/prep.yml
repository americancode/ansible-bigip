---
# LTM prep orchestrator.
# Produces canonical runtime sets and compiler outputs, including:
# - `ltm_monitors_present` / `ltm_monitors_delete`
# - `ltm_nodes_present` / `ltm_nodes_delete`
# - `ltm_profiles_present` / `ltm_profiles_delete`
# - `ltm_virtual_servers_present` / `ltm_virtual_servers_delete`
# - `ltm_persistence_profiles_present` / `ltm_persistence_profiles_delete`
# - `ltm_irules_present` / `ltm_irules_delete`
# - `ltm_data_groups_present` / `ltm_data_groups_delete`
# - `ltm_policies_present` / `ltm_policies_delete`
# - `ltm_rke2_server_intents_present` / `ltm_rke2_server_intents_delete`
# - `ltm_canonical_pools_present` / `ltm_canonical_pools_delete`
# The canonical pool sets include first-class pools plus compiler output from virtual-server shortcuts and dedicated LTM intents such as RKE2 server clusters.

- name: Load LTM var fragments
  ansible.builtin.import_tasks: "{{ playbook_dir }}/ltm/prep/load-vars.yml"

- name: Build LTM runtime facts and compile intents
  ansible.builtin.import_tasks: "{{ playbook_dir }}/ltm/prep/build-runtime.yml"
