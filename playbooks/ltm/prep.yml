- name: Derive embedded LTM pool deletions from virtual servers
  ansible.builtin.set_fact:
    ltm_embedded_pool_deletions: []

- name: Derive embedded LTM pools from active virtual servers
  ansible.builtin.set_fact:
    ltm_embedded_pools_present: []

- name: Collect embedded LTM pool deletions
  ansible.builtin.set_fact:
    ltm_embedded_pool_deletions: >-
      {{
        (ltm_embedded_pool_deletions | default([])) + [
          (
            {'partition': item.partition | default('Common')}
            | combine(
                (
                  item.pool
                  | normalize_ltm_pool(
                      ltm_virtual_server_pool_defaults,
                      ltm_virtual_server_member_defaults,
                      ltm_virtual_server_monitor_sets
                    )
                ),
                recursive=True
              )
          )
        ]
      }}
  loop: "{{ ltm_virtual_servers_delete | default([]) }}"
  when:
    - item.pool is defined
    - item.pool is mapping
  vars:
    ltm_virtual_server_settings_path: "{{ item.__source_file | regex_replace('/[^/]+$', '/settings.yml') if item.__source_file is defined else '' }}"
    ltm_virtual_server_settings_payload: >-
      {{
        (
          lookup('ansible.builtin.file', ltm_virtual_server_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ) if ltm_virtual_server_settings_path else {}
      }}
    ltm_virtual_server_pool_defaults: "{{ ltm_virtual_server_settings_payload.ltm_pool_defaults | default({}) }}"
    ltm_virtual_server_member_defaults: "{{ ltm_virtual_server_settings_payload.ltm_member_defaults | default({}) }}"
    ltm_virtual_server_monitor_sets: "{{ ltm_virtual_server_settings_payload.ltm_monitor_sets | default({}) }}"

- name: Collect embedded LTM pools
  ansible.builtin.set_fact:
    ltm_embedded_pools_present: >-
      {{
        (ltm_embedded_pools_present | default([])) + [
          (
            {'partition': item.partition | default('Common')}
            | combine(
                (
                  item.pool
                  | normalize_ltm_pool(
                      ltm_virtual_server_pool_defaults,
                      ltm_virtual_server_member_defaults,
                      ltm_virtual_server_monitor_sets
                    )
                ),
                recursive=True
              )
          )
        ]
      }}
  loop: "{{ ltm_virtual_servers_present | default([]) }}"
  when:
    - item.pool is defined
    - item.pool is mapping
  vars:
    ltm_virtual_server_settings_path: "{{ item.__source_file | regex_replace('/[^/]+$', '/settings.yml') if item.__source_file is defined else '' }}"
    ltm_virtual_server_settings_payload: >-
      {{
        (
          lookup('ansible.builtin.file', ltm_virtual_server_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ) if ltm_virtual_server_settings_path else {}
      }}
    ltm_virtual_server_pool_defaults: "{{ ltm_virtual_server_settings_payload.ltm_pool_defaults | default({}) }}"
    ltm_virtual_server_member_defaults: "{{ ltm_virtual_server_settings_payload.ltm_member_defaults | default({}) }}"
    ltm_virtual_server_monitor_sets: "{{ ltm_virtual_server_settings_payload.ltm_monitor_sets | default({}) }}"

- name: Combine first-class and embedded LTM pool operations
  ansible.builtin.set_fact:
    ltm_all_pools_delete: "{{ (ltm_pools_delete | default([])) + (ltm_embedded_pool_deletions | default([])) }}"
    ltm_all_pools_present: "{{ (ltm_pools_present | default([])) + (ltm_embedded_pools_present | default([])) }}"
