- name: Discover LTM monitor fragments
  ansible.builtin.set_fact:
    ltm_monitor_files: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          "find {{ repo_root }}/vars/ltm/monitors -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
        ).splitlines() | reject('equalto', '') | list
      }}
    ltm_monitor_deletion_files: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          "find {{ repo_root }}/vars/ltm/deletions/monitors -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
        ).splitlines() | reject('equalto', '') | list
      }}

- name: Load LTM monitor fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: ltm_monitor_fragment
  loop: "{{ ltm_monitor_files }}"
  register: ltm_monitor_include_results

- name: Load LTM monitor deletion fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: ltm_monitor_deletion_fragment
  loop: "{{ ltm_monitor_deletion_files }}"
  register: ltm_monitor_deletion_include_results

- name: Aggregate LTM monitors with directory settings
  ansible.builtin.set_fact:
    ltm_monitors: "{{ ltm_monitors | default([]) + [ ltm_monitor_directory_defaults | combine(item.1, recursive=True) ] }}"
  loop: "{{ query('subelements', ltm_monitor_include_results.results, 'ansible_facts.ltm_monitor_fragment.ltm_monitors', {'skip_missing': True}) }}"
  vars:
    ltm_monitor_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    ltm_monitor_directory_defaults: >-
      {{
        (
          lookup('ansible.builtin.file', ltm_monitor_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ).ltm_monitor_defaults | default({})
      }}

