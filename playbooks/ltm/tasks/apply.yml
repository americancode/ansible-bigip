- name: Add members to pools
  f5networks.f5_modules.bigip_pool_member:
    provider: "{{ provider }}"
    partition: "{{ item.0.partition | default('Common') }}"
    pool: "{{ item.0.name }}"
    name: "{{ item.1.name | default(omit) }}"
    host: "{{ item.1.host | default(item.1.address | default(omit)) }}"
    fqdn: "{{ item.1.fqdn | default(omit) }}"
    fqdn_auto_populate: "{{ item.1.fqdn_auto_populate | default(omit) }}"
    port: "{{ item.1.port }}"
    monitors: "{{ item.1.monitors | default(omit) }}"
    availability_requirements: "{{ item.1.availability_requirements | default(omit) }}"
    connection_limit: "{{ item.1.connection_limit | default(omit) }}"
    description: "{{ item.1.description | default(omit) }}"
    ip_encapsulation: "{{ item.1.ip_encapsulation | default(omit) }}"
    preserve_node: "{{ item.1.preserve_node | default(omit) }}"
    priority_group: "{{ item.1.priority_group | default(omit) }}"
    rate_limit: "{{ item.1.rate_limit | default(omit) }}"
    ratio: "{{ item.1.ratio | default(omit) }}"
    reuse_nodes: "{{ item.1.reuse_nodes | default(omit) }}"
    state: "{{ item.1.state | default((item.1.enabled | default(true)) | ternary('enabled', 'disabled')) }}"
  loop: "{{ query('subelements', ltm_all_pools_present | default([]), 'members', {'skip_missing': True}) }}"
  loop_control:
    label: "{{ item.0.partition | default('Common') }}/{{ item.0.name }}:{{ item.1.name | default(item.1.host | default(item.1.address | default(item.1.fqdn | default('member')))) }}:{{ item.1.port }}"

