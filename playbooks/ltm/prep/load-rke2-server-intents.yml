- name: Discover LTM RKE2 server intent fragments
  ansible.builtin.set_fact:
    ltm_rke2_server_intent_files: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          "find {{ repo_root }}/vars/ltm/intents -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
        ).splitlines() | reject('equalto', '') | list
      }}
    ltm_rke2_server_intent_deletion_files: >-
      {{
        lookup(
          'ansible.builtin.pipe',
          "find {{ repo_root }}/vars/ltm/deletions/intents -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
        ).splitlines() | reject('equalto', '') | list
      }}

- name: Load LTM RKE2 server intent fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: ltm_rke2_server_intent_fragment
  loop: "{{ ltm_rke2_server_intent_files }}"
  register: ltm_rke2_server_intent_include_results

- name: Load LTM RKE2 server intent deletion fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: ltm_rke2_server_intent_deletion_fragment
  loop: "{{ ltm_rke2_server_intent_deletion_files }}"
  register: ltm_rke2_server_intent_deletion_include_results

- name: Aggregate LTM RKE2 server intents with directory settings
  ansible.builtin.set_fact:
    ltm_rke2_server_intents: >-
      {{
        ltm_rke2_server_intents | default([]) + [
          (
            ltm_rke2_server_intent_directory_defaults
            | combine(item.1, recursive=True)
            | combine({'__source_file': item.0.item}, recursive=True)
          )
        ]
      }}
  loop: "{{ query('subelements', ltm_rke2_server_intent_include_results.results, 'ansible_facts.ltm_rke2_server_intent_fragment.ltm_rke2_server_intents', {'skip_missing': True}) }}"
  vars:
    ltm_rke2_server_intent_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    ltm_rke2_server_intent_directory_defaults: >-
      {{
        (
          lookup('ansible.builtin.file', ltm_rke2_server_intent_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ).ltm_rke2_server_intent_defaults | default({})
      }}

- name: Aggregate LTM RKE2 server intent deletions with directory settings
  ansible.builtin.set_fact:
    ltm_rke2_server_intent_deletions: >-
      {{
        ltm_rke2_server_intent_deletions | default([]) + [
          (
            (
              ltm_rke2_server_intent_deletion_directory_defaults
              | combine(item.1, recursive=True)
              | combine({'state': 'absent'}, recursive=True)
            )
            | combine({'__source_file': item.0.item}, recursive=True)
          )
        ]
      }}
  loop: "{{ query('subelements', ltm_rke2_server_intent_deletion_include_results.results, 'ansible_facts.ltm_rke2_server_intent_deletion_fragment.ltm_rke2_server_intents', {'skip_missing': True}) }}"
  vars:
    ltm_rke2_server_intent_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
    ltm_rke2_server_intent_deletion_directory_defaults: >-
      {{
        (
          lookup('ansible.builtin.file', ltm_rke2_server_intent_deletion_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ).ltm_rke2_server_intent_defaults | default({})
      }}
