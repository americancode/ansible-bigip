- name: Discover LTM pool fragments
  ansible.builtin.set_fact:
    ltm_pool_files: "{{ (repo_root ~ '/vars/ltm/pools') | discover_yaml_fragments }}"
    ltm_pool_deletion_files: "{{ (repo_root ~ '/vars/ltm/deletions/pools') | discover_yaml_fragments }}"

- name: Load LTM pool fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: ltm_pool_fragment
  loop: "{{ ltm_pool_files }}"
  register: ltm_pool_include_results

- name: Load LTM pool deletion fragments
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: ltm_pool_deletion_fragment
  loop: "{{ ltm_pool_deletion_files }}"
  register: ltm_pool_deletion_include_results

- name: Aggregate LTM pools with layered directory settings
  ansible.builtin.set_fact:
    ltm_pools: >-
      {{
        ltm_pools | default([]) + [
          (
            ltm_pool_settings_payload.ltm_pool_defaults
            | default({})
            | combine(item.1, recursive=True)
            | normalize_ltm_pool(
                ltm_pool_settings_payload.ltm_pool_defaults | default({}),
                ltm_pool_settings_payload.ltm_member_defaults | default({}),
                ltm_pool_settings_payload.ltm_monitor_sets | default({})
              )
          )
        ]
      }}
  loop: "{{ query('subelements', ltm_pool_include_results.results, 'ansible_facts.ltm_pool_fragment.ltm_pools', {'skip_missing': True}) }}"
  vars:
    ltm_pool_settings_payload: >-
      {{
        item.0.item
        | load_settings_hierarchy(repo_root ~ '/vars/ltm/pools')
      }}

- name: Aggregate LTM pool deletions with layered directory settings
  ansible.builtin.set_fact:
    ltm_pool_deletions: >-
      {{
        ltm_pool_deletions | default([]) + [
          (
            (
              ltm_pool_deletion_settings_payload.ltm_pool_defaults
              | default({})
              | combine(item.1, recursive=True)
              | normalize_ltm_pool(
                  ltm_pool_deletion_settings_payload.ltm_pool_defaults | default({}),
                  ltm_pool_deletion_settings_payload.ltm_member_defaults | default({}),
                  ltm_pool_deletion_settings_payload.ltm_monitor_sets | default({})
                )
            )
            | combine({'state': 'absent'}, recursive=True)
          )
        ]
      }}
  loop: "{{ query('subelements', ltm_pool_deletion_include_results.results, 'ansible_facts.ltm_pool_deletion_fragment.ltm_pools', {'skip_missing': True}) }}"
  vars:
    ltm_pool_deletion_settings_payload: >-
      {{
        item.0.item
        | load_settings_hierarchy(repo_root ~ '/vars/ltm/deletions/pools')
      }}

