- name: Initialize compiled LTM shortcut objects from virtual servers
  ansible.builtin.set_fact:
    ltm_compiled_virtual_servers_delete: []
    ltm_compiled_pools_delete: []

- name: Initialize compiled active LTM shortcut objects from virtual servers
  ansible.builtin.set_fact:
    ltm_compiled_virtual_servers_present: []
    ltm_compiled_pools_present: []

- name: Compile deleted LTM virtual-server shortcut objects
  ansible.builtin.set_fact:
    ltm_compiled_virtual_servers_delete: >-
      {{
        (ltm_compiled_virtual_servers_delete | default([])) + [ltm_compiled_service.virtual_server]
      }}
    ltm_compiled_pools_delete: >-
      {{
        (ltm_compiled_pools_delete | default([])) + (ltm_compiled_service.pools | default([]))
      }}
  loop: "{{ ltm_virtual_servers_delete | default([]) }}"
  vars:
    ltm_virtual_server_settings_path: "{{ item.__source_file | regex_replace('/[^/]+$', '/settings.yml') if item.__source_file is defined else '' }}"
    ltm_virtual_server_settings_payload: >-
      {{
        (
          lookup('ansible.builtin.file', ltm_virtual_server_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ) if ltm_virtual_server_settings_path else {}
      }}
    ltm_virtual_server_pool_defaults: "{{ ltm_virtual_server_settings_payload.ltm_pool_defaults | default({}) }}"
    ltm_virtual_server_member_defaults: "{{ ltm_virtual_server_settings_payload.ltm_member_defaults | default({}) }}"
    ltm_virtual_server_monitor_sets: "{{ ltm_virtual_server_settings_payload.ltm_monitor_sets | default({}) }}"
    ltm_compiled_service: >-
      {{
        item
        | compile_ltm_virtual_server_intent(
            ltm_virtual_server_pool_defaults,
            ltm_virtual_server_member_defaults,
            ltm_virtual_server_monitor_sets
          )
      }}

- name: Compile active LTM virtual-server shortcut objects
  ansible.builtin.set_fact:
    ltm_compiled_virtual_servers_present: >-
      {{
        (ltm_compiled_virtual_servers_present | default([])) + [ltm_compiled_service.virtual_server]
      }}
    ltm_compiled_pools_present: >-
      {{
        (ltm_compiled_pools_present | default([])) + (ltm_compiled_service.pools | default([]))
      }}
  loop: "{{ ltm_virtual_servers_present | default([]) }}"
  vars:
    ltm_virtual_server_settings_path: "{{ item.__source_file | regex_replace('/[^/]+$', '/settings.yml') if item.__source_file is defined else '' }}"
    ltm_virtual_server_settings_payload: >-
      {{
        (
          lookup('ansible.builtin.file', ltm_virtual_server_settings_path, errors='ignore')
          | default('{}', true)
          | from_yaml
        ) if ltm_virtual_server_settings_path else {}
      }}
    ltm_virtual_server_pool_defaults: "{{ ltm_virtual_server_settings_payload.ltm_pool_defaults | default({}) }}"
    ltm_virtual_server_member_defaults: "{{ ltm_virtual_server_settings_payload.ltm_member_defaults | default({}) }}"
    ltm_virtual_server_monitor_sets: "{{ ltm_virtual_server_settings_payload.ltm_monitor_sets | default({}) }}"
    ltm_compiled_service: >-
      {{
        item
        | compile_ltm_virtual_server_intent(
            ltm_virtual_server_pool_defaults,
            ltm_virtual_server_member_defaults,
            ltm_virtual_server_monitor_sets
          )
      }}

- name: Replace raw virtual-server shortcut objects with compiled canonical virtual servers
  ansible.builtin.set_fact:
    ltm_virtual_servers_delete: "{{ ltm_compiled_virtual_servers_delete | default([]) }}"
    ltm_virtual_servers_present: "{{ ltm_compiled_virtual_servers_present | default([]) }}"

- name: Build canonical LTM pool operations
  ansible.builtin.set_fact:
    ltm_canonical_pools_delete: "{{ (ltm_pools_delete | default([])) + (ltm_compiled_pools_delete | default([])) }}"
    ltm_canonical_pools_present: "{{ (ltm_pools_present | default([])) + (ltm_compiled_pools_present | default([])) }}"
