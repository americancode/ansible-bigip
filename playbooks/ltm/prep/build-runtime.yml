- name: Classify LTM monitor operations
  ansible.builtin.set_fact:
    ltm_monitors_delete: "{{ ltm_monitor_ops.delete }}"
    ltm_monitors_present: "{{ ltm_monitor_ops.present }}"
  vars:
    ltm_monitor_ops: "{{ (ltm_monitors | default([])) | classify_operations(ltm_monitor_deletions | default([])) }}"

