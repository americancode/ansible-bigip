- name: Configure BIG-IP network objects
  hosts: localhost
  gather_facts: false
  collections:
    - f5networks.f5_modules

  vars_files:
    - vars/common.yml

  pre_tasks:
    - name: Discover VLAN fragments
      ansible.builtin.set_fact:
        vlan_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/network/vlans -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        vlan_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/network/deletions/vlans -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load VLAN fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: vlan_fragment
      loop: "{{ vlan_files }}"
      register: vlan_include_results

    - name: Load VLAN deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: vlan_deletion_fragment
      loop: "{{ vlan_deletion_files }}"
      register: vlan_deletion_include_results

    - name: Aggregate VLANs with directory settings
      ansible.builtin.set_fact:
        bigip_vlans: "{{ bigip_vlans | default([]) + [ vlan_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', vlan_include_results.results, 'ansible_facts.vlan_fragment.bigip_vlans', {'skip_missing': True}) }}"
      vars:
        vlan_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        vlan_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', vlan_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).network_vlan_defaults | default({})
          }}

    - name: Aggregate VLAN deletions with directory settings
      ansible.builtin.set_fact:
        bigip_vlan_deletions: "{{ bigip_vlan_deletions | default([]) + [ (vlan_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', vlan_deletion_include_results.results, 'ansible_facts.vlan_deletion_fragment.bigip_vlans', {'skip_missing': True}) }}"
      vars:
        vlan_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        vlan_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', vlan_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).network_vlan_defaults | default({})
          }}

    - name: Discover route domain fragments
      ansible.builtin.set_fact:
        route_domain_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/network/route_domains -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        route_domain_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/network/deletions/route_domains -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load route domain fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: route_domain_fragment
      loop: "{{ route_domain_files }}"
      register: route_domain_include_results

    - name: Load route domain deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: route_domain_deletion_fragment
      loop: "{{ route_domain_deletion_files }}"
      register: route_domain_deletion_include_results

    - name: Aggregate route domains with directory settings
      ansible.builtin.set_fact:
        bigip_route_domains: "{{ bigip_route_domains | default([]) + [ route_domain_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', route_domain_include_results.results, 'ansible_facts.route_domain_fragment.bigip_route_domains', {'skip_missing': True}) }}"
      vars:
        route_domain_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        route_domain_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', route_domain_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).network_route_domain_defaults | default({})
          }}

    - name: Aggregate route domain deletions with directory settings
      ansible.builtin.set_fact:
        bigip_route_domain_deletions: "{{ bigip_route_domain_deletions | default([]) + [ (route_domain_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', route_domain_deletion_include_results.results, 'ansible_facts.route_domain_deletion_fragment.bigip_route_domains', {'skip_missing': True}) }}"
      vars:
        route_domain_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        route_domain_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', route_domain_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).network_route_domain_defaults | default({})
          }}

    - name: Discover self IP fragments
      ansible.builtin.set_fact:
        self_ip_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/network/self_ips -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        self_ip_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/network/deletions/self_ips -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load self IP fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: self_ip_fragment
      loop: "{{ self_ip_files }}"
      register: self_ip_include_results

    - name: Load self IP deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: self_ip_deletion_fragment
      loop: "{{ self_ip_deletion_files }}"
      register: self_ip_deletion_include_results

    - name: Aggregate self IPs with directory settings
      ansible.builtin.set_fact:
        bigip_self_ips: "{{ bigip_self_ips | default([]) + [ self_ip_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', self_ip_include_results.results, 'ansible_facts.self_ip_fragment.bigip_self_ips', {'skip_missing': True}) }}"
      vars:
        self_ip_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        self_ip_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', self_ip_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).network_self_ip_defaults | default({})
          }}

    - name: Aggregate self IP deletions with directory settings
      ansible.builtin.set_fact:
        bigip_self_ip_deletions: "{{ bigip_self_ip_deletions | default([]) + [ (self_ip_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', self_ip_deletion_include_results.results, 'ansible_facts.self_ip_deletion_fragment.bigip_self_ips', {'skip_missing': True}) }}"
      vars:
        self_ip_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        self_ip_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', self_ip_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).network_self_ip_defaults | default({})
          }}

    - name: Discover static route fragments
      ansible.builtin.set_fact:
        static_route_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/network/routes -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        static_route_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/network/deletions/routes -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load static route fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: static_route_fragment
      loop: "{{ static_route_files }}"
      register: static_route_include_results

    - name: Load static route deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: static_route_deletion_fragment
      loop: "{{ static_route_deletion_files }}"
      register: static_route_deletion_include_results

    - name: Aggregate static routes with directory settings
      ansible.builtin.set_fact:
        bigip_static_routes: "{{ bigip_static_routes | default([]) + [ static_route_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', static_route_include_results.results, 'ansible_facts.static_route_fragment.bigip_static_routes', {'skip_missing': True}) }}"
      vars:
        static_route_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        static_route_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', static_route_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).network_route_defaults | default({})
          }}

    - name: Aggregate static route deletions with directory settings
      ansible.builtin.set_fact:
        bigip_static_route_deletions: "{{ bigip_static_route_deletions | default([]) + [ (static_route_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', static_route_deletion_include_results.results, 'ansible_facts.static_route_deletion_fragment.bigip_static_routes', {'skip_missing': True}) }}"
      vars:
        static_route_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        static_route_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', static_route_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).network_route_defaults | default({})
          }}

    - name: Discover SNAT translation fragments
      ansible.builtin.set_fact:
        snat_translation_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/network/snat_translations -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        snat_translation_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/network/deletions/snat_translations -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load SNAT translation fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: snat_translation_fragment
      loop: "{{ snat_translation_files }}"
      register: snat_translation_include_results

    - name: Load SNAT translation deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: snat_translation_deletion_fragment
      loop: "{{ snat_translation_deletion_files }}"
      register: snat_translation_deletion_include_results

    - name: Aggregate SNAT translations with directory settings
      ansible.builtin.set_fact:
        bigip_snat_translations: "{{ bigip_snat_translations | default([]) + [ snat_translation_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', snat_translation_include_results.results, 'ansible_facts.snat_translation_fragment.bigip_snat_translations', {'skip_missing': True}) }}"
      vars:
        snat_translation_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        snat_translation_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', snat_translation_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).network_snat_translation_defaults | default({})
          }}

    - name: Aggregate SNAT translation deletions with directory settings
      ansible.builtin.set_fact:
        bigip_snat_translation_deletions: "{{ bigip_snat_translation_deletions | default([]) + [ (snat_translation_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', snat_translation_deletion_include_results.results, 'ansible_facts.snat_translation_deletion_fragment.bigip_snat_translations', {'skip_missing': True}) }}"
      vars:
        snat_translation_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        snat_translation_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', snat_translation_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).network_snat_translation_defaults | default({})
          }}

    - name: Discover SNAT pool fragments
      ansible.builtin.set_fact:
        snat_pool_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/network/snats -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        snat_pool_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/network/deletions/snats -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load SNAT pool fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: snat_pool_fragment
      loop: "{{ snat_pool_files }}"
      register: snat_pool_include_results

    - name: Load SNAT pool deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: snat_pool_deletion_fragment
      loop: "{{ snat_pool_deletion_files }}"
      register: snat_pool_deletion_include_results

    - name: Aggregate SNAT pools with directory settings
      ansible.builtin.set_fact:
        bigip_snat_pools: "{{ bigip_snat_pools | default([]) + [ snat_pool_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', snat_pool_include_results.results, 'ansible_facts.snat_pool_fragment.bigip_snat_pools', {'skip_missing': True}) }}"
      vars:
        snat_pool_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        snat_pool_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', snat_pool_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).network_snat_pool_defaults | default({})
          }}

    - name: Aggregate SNAT pool deletions with directory settings
      ansible.builtin.set_fact:
        bigip_snat_pool_deletions: "{{ bigip_snat_pool_deletions | default([]) + [ (snat_pool_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', snat_pool_deletion_include_results.results, 'ansible_facts.snat_pool_deletion_fragment.bigip_snat_pools', {'skip_missing': True}) }}"
      vars:
        snat_pool_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        snat_pool_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', snat_pool_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).network_snat_pool_defaults | default({})
          }}

    - name: Classify network object operations
      ansible.builtin.set_fact:
        bigip_vlans_delete: >-
          {{
            ((bigip_vlans | default([])) + (bigip_vlan_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        bigip_vlans_present: >-
          {{
            (bigip_vlans | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (bigip_vlans | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}
        bigip_route_domains_delete: >-
          {{
            ((bigip_route_domains | default([])) + (bigip_route_domain_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        bigip_route_domains_present: >-
          {{
            (bigip_route_domains | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (bigip_route_domains | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}
        bigip_self_ips_delete: >-
          {{
            ((bigip_self_ips | default([])) + (bigip_self_ip_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        bigip_self_ips_present: >-
          {{
            (bigip_self_ips | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (bigip_self_ips | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}
        bigip_static_routes_delete: >-
          {{
            ((bigip_static_routes | default([])) + (bigip_static_route_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        bigip_static_routes_present: >-
          {{
            (bigip_static_routes | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (bigip_static_routes | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}
        bigip_snat_translations_delete: >-
          {{
            ((bigip_snat_translations | default([])) + (bigip_snat_translation_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        bigip_snat_translations_present: >-
          {{
            (bigip_snat_translations | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (bigip_snat_translations | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}
        bigip_snat_pools_delete: >-
          {{
            ((bigip_snat_pools | default([])) + (bigip_snat_pool_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        bigip_snat_pools_present: >-
          {{
            (bigip_snat_pools | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (bigip_snat_pools | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}

  tasks:
    - name: Delete static routes
      f5networks.f5_modules.bigip_static_route:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ bigip_static_routes_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Delete SNAT pools
      f5networks.f5_modules.bigip_snat_pool:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ bigip_snat_pools_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Delete SNAT translations
      f5networks.f5_modules.bigip_snat_translation:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ bigip_snat_translations_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Delete self IPs
      f5networks.f5_modules.bigip_selfip:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ bigip_self_ips_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Delete route domains
      f5networks.f5_modules.bigip_routedomain:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ bigip_route_domains_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Delete VLANs
      f5networks.f5_modules.bigip_vlan:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ bigip_vlans_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Create VLANs
      f5networks.f5_modules.bigip_vlan:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        tag: "{{ item.tag | default(omit) }}"
        mtu: "{{ item.mtu | default(omit) }}"
        interfaces: "{{ item.interfaces | default(omit) }}"
        description: "{{ item.description | default(omit) }}"
        state: "{{ item.state | default('present') }}"
      loop: "{{ bigip_vlans_present | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Create route domains
      f5networks.f5_modules.bigip_routedomain:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name | default(omit) }}"
        id: "{{ item.id | default(omit) }}"
        parent: "{{ item.parent | default(omit) }}"
        strict: "{{ item.strict | default(omit) }}"
        vlans: "{{ item.vlans | default(omit) }}"
        description: "{{ item.description | default(omit) }}"
        connection_limit: "{{ item.connection_limit | default(omit) }}"
        routing_protocol: "{{ item.routing_protocol | default(omit) }}"
        bwc_policy: "{{ item.bwc_policy | default(omit) }}"
        flow_eviction_policy: "{{ item.flow_eviction_policy | default(omit) }}"
        fw_enforced_policy: "{{ item.fw_enforced_policy | default(omit) }}"
        service_policy: "{{ item.service_policy | default(omit) }}"
        state: "{{ item.state | default('present') }}"
      loop: "{{ bigip_route_domains_present | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name | default(item.id) }}"

    - name: Create self IPs
      f5networks.f5_modules.bigip_selfip:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        address: "{{ item.address }}"
        netmask: "{{ item.netmask }}"
        vlan: "{{ item.vlan }}"
        traffic_group: "{{ item.traffic_group | default(omit) }}"
        allow_service: "{{ item.allow_service | default(omit) }}"
        state: "{{ item.state | default('present') }}"
