---
# Example network definitions for system/playbooks/network.yml.
# Update interface names, VLAN tags, and self IP addresses for your environment.

bigip_vlans:
  - name: "external"
    tag: 110
    mtu: 1500
    description: "External application network"
    interfaces:
      - interface: "1.1"
        tagging: "tagged"
  - name: "internal"
    tag: 210
    mtu: 1500
    description: "Internal services network"
    interfaces:
      - interface: "1.2"
        tagging: "tagged"

bigip_self_ips:
  - name: "self_external"
    address: "10.10.11.10"
    netmask: "255.255.255.0"
    vlan: "external"
    traffic_group: "traffic-group-local-only"
    allow_service: "default"
  - name: "self_internal"
    address: "10.10.21.10"
    netmask: "255.255.255.0"
    vlan: "internal"
    traffic_group: "traffic-group-local-only"
    allow_service: "default"
