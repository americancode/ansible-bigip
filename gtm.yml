              | from_yaml
            ) if gtm_wide_ip_settings_path else {}
          }}
        gtm_wide_ip_pool_defaults: "{{ gtm_wide_ip_settings_payload.gtm_pool_defaults | default({}) }}"
        gtm_wide_ip_member_defaults: "{{ gtm_wide_ip_settings_payload.gtm_member_defaults | default({}) }}"
        gtm_wide_ip_monitor_sets: "{{ gtm_wide_ip_settings_payload.gtm_monitor_sets | default({}) }}"

    - name: Combine first-class and embedded GTM pool operations
      ansible.builtin.set_fact:
        gtm_all_pools_delete: "{{ (gtm_pools_delete | default([])) + (gtm_inline_pool_deletions | default([])) }}"
        gtm_all_pools_present: "{{ (gtm_pools_present | default([])) + (gtm_inline_pools_present | default([])) }}"

  tasks:
    - name: Delete Wide IPs
      f5networks.f5_modules.bigip_gtm_wide_ip:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        type: "{{ item.record_type | default('a') }}"
        state: absent
      loop: "{{ gtm_wide_ips_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Delete GTM pools
      f5networks.f5_modules.bigip_gtm_pool:
