    - name: Create GTM HTTP monitors
      f5networks.f5_modules.bigip_gtm_monitor_http:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        parent: "{{ item.parent | default(omit) }}"
        send: "{{ item.send | default(omit) }}"
        receive: "{{ item.receive | default(omit) }}"
        ip: "{{ item.ip | default(omit) }}"
        port: "{{ item.port | default(omit) }}"
        interval: "{{ item.interval | default(omit) }}"
        timeout: "{{ item.timeout | default(omit) }}"
        probe_timeout: "{{ item.probe_timeout | default(omit) }}"
        ignore_down_response: "{{ item.ignore_down_response | default(omit) }}"
        transparent: "{{ item.transparent | default(omit) }}"
