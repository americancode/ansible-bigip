      loop: "{{ gtm_servers_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Delete GTM datacenters
      f5networks.f5_modules.bigip_gtm_datacenter:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ gtm_all_datacenters_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Delete GTM BIG-IP monitors
      f5networks.f5_modules.bigip_gtm_monitor_bigip:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ gtm_monitors_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"
      when:
        - item.type == 'bigip'

    - name: Delete GTM external monitors
      f5networks.f5_modules.bigip_gtm_monitor_external:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ gtm_monitors_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"
      when:
        - item.type == 'external'

    - name: Delete GTM FirePass monitors
      f5networks.f5_modules.bigip_gtm_monitor_firepass:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ gtm_monitors_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"
      when:
