---
- name: Configure BIG-IP DNS/GTM objects
  hosts: localhost
  gather_facts: false
  collections:
    - f5networks.f5_modules

  vars_files:
    - vars/common.yml

  pre_tasks:
    - name: Discover GTM datacenter fragments
      ansible.builtin.set_fact:
        gtm_datacenter_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/gtm/datacenters -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        gtm_datacenter_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/gtm/deletions/datacenters -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load GTM datacenter fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: gtm_datacenter_fragment
      loop: "{{ gtm_datacenter_files }}"
      register: gtm_datacenter_include_results

    - name: Load GTM datacenter deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: gtm_datacenter_deletion_fragment
      loop: "{{ gtm_datacenter_deletion_files }}"
      register: gtm_datacenter_deletion_include_results

    - name: Aggregate GTM datacenters with directory settings
      ansible.builtin.set_fact:
        gtm_datacenters: "{{ gtm_datacenters | default([]) + [ gtm_datacenter_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', gtm_datacenter_include_results.results, 'ansible_facts.gtm_datacenter_fragment.gtm_datacenters', {'skip_missing': True}) }}"
      vars:
        gtm_datacenter_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        gtm_datacenter_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', gtm_datacenter_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).gtm_datacenter_defaults | default({})
          }}

    - name: Aggregate GTM datacenter deletions with directory settings
      ansible.builtin.set_fact:
        gtm_datacenter_deletions: "{{ gtm_datacenter_deletions | default([]) + [ (gtm_datacenter_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', gtm_datacenter_deletion_include_results.results, 'ansible_facts.gtm_datacenter_deletion_fragment.gtm_datacenters', {'skip_missing': True}) }}"
      vars:
        gtm_datacenter_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        gtm_datacenter_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', gtm_datacenter_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).gtm_datacenter_defaults | default({})
          }}

    - name: Discover GTM monitor fragments
      ansible.builtin.set_fact:
        gtm_monitor_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/gtm/monitors -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        gtm_monitor_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/gtm/deletions/monitors -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load GTM monitor fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: gtm_monitor_fragment
      loop: "{{ gtm_monitor_files }}"
      register: gtm_monitor_include_results

    - name: Load GTM monitor deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: gtm_monitor_deletion_fragment
      loop: "{{ gtm_monitor_deletion_files }}"
      register: gtm_monitor_deletion_include_results

    - name: Aggregate GTM monitors with directory settings
      ansible.builtin.set_fact:
        gtm_monitors: "{{ gtm_monitors | default([]) + [ gtm_monitor_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', gtm_monitor_include_results.results, 'ansible_facts.gtm_monitor_fragment.gtm_monitors', {'skip_missing': True}) }}"
      vars:
        gtm_monitor_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        gtm_monitor_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', gtm_monitor_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).gtm_monitor_defaults | default({})
          }}

    - name: Aggregate GTM monitor deletions with directory settings
      ansible.builtin.set_fact:
        gtm_monitor_deletions: "{{ gtm_monitor_deletions | default([]) + [ (gtm_monitor_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', gtm_monitor_deletion_include_results.results, 'ansible_facts.gtm_monitor_deletion_fragment.gtm_monitors', {'skip_missing': True}) }}"
      vars:
        gtm_monitor_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        gtm_monitor_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', gtm_monitor_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).gtm_monitor_defaults | default({})
          }}

    - name: Discover GTM server fragments
      ansible.builtin.set_fact:
        gtm_server_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/gtm/servers -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        gtm_server_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/gtm/deletions/servers -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load GTM server fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: gtm_server_fragment
      loop: "{{ gtm_server_files }}"
      register: gtm_server_include_results

    - name: Load GTM server deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: gtm_server_deletion_fragment
      loop: "{{ gtm_server_deletion_files }}"
      register: gtm_server_deletion_include_results

    - name: Aggregate GTM servers with directory settings
      ansible.builtin.set_fact:
        gtm_servers: "{{ gtm_servers | default([]) + [ gtm_server_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', gtm_server_include_results.results, 'ansible_facts.gtm_server_fragment.gtm_servers', {'skip_missing': True}) }}"
      vars:
        gtm_server_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        gtm_server_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', gtm_server_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).gtm_server_defaults | default({})
          }}

    - name: Aggregate GTM server deletions with directory settings
      ansible.builtin.set_fact:
        gtm_server_deletions: "{{ gtm_server_deletions | default([]) + [ (gtm_server_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', gtm_server_deletion_include_results.results, 'ansible_facts.gtm_server_deletion_fragment.gtm_servers', {'skip_missing': True}) }}"
      vars:
        gtm_server_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        gtm_server_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', gtm_server_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).gtm_server_defaults | default({})
          }}

    - name: Discover GTM pool fragments
      ansible.builtin.set_fact:
        gtm_pool_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/gtm/pools -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        gtm_pool_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/gtm/deletions/pools -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load GTM pool fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: gtm_pool_fragment
      loop: "{{ gtm_pool_files }}"
      register: gtm_pool_include_results

    - name: Load GTM pool deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: gtm_pool_deletion_fragment
      loop: "{{ gtm_pool_deletion_files }}"
      register: gtm_pool_deletion_include_results

    - name: Aggregate GTM pools with directory settings
      ansible.builtin.set_fact:
        gtm_pools: "{{ gtm_pools | default([]) + [ gtm_pool_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', gtm_pool_include_results.results, 'ansible_facts.gtm_pool_fragment.gtm_pools', {'skip_missing': True}) }}"
      vars:
        gtm_pool_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        gtm_pool_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', gtm_pool_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).gtm_pool_defaults | default({})
          }}

    - name: Aggregate GTM pool deletions with directory settings
      ansible.builtin.set_fact:
        gtm_pool_deletions: "{{ gtm_pool_deletions | default([]) + [ (gtm_pool_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', gtm_pool_deletion_include_results.results, 'ansible_facts.gtm_pool_deletion_fragment.gtm_pools', {'skip_missing': True}) }}"
      vars:
        gtm_pool_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        gtm_pool_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', gtm_pool_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).gtm_pool_defaults | default({})
          }}

    - name: Discover GTM Wide IP fragments
      ansible.builtin.set_fact:
        gtm_wide_ip_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/gtm/wide_ips -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}
        gtm_wide_ip_deletion_files: >-
          {{
            lookup(
              'ansible.builtin.pipe',
              "find vars/gtm/deletions/wide_ips -type f -name '*.yml' ! -name 'settings.yml' 2>/dev/null | sort"
            ).splitlines() | reject('equalto', '') | list
          }}

    - name: Load GTM Wide IP fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: gtm_wide_ip_fragment
      loop: "{{ gtm_wide_ip_files }}"
      register: gtm_wide_ip_include_results

    - name: Load GTM Wide IP deletion fragments
      ansible.builtin.include_vars:
        file: "{{ item }}"
        name: gtm_wide_ip_deletion_fragment
      loop: "{{ gtm_wide_ip_deletion_files }}"
      register: gtm_wide_ip_deletion_include_results

    - name: Aggregate GTM Wide IPs with directory settings
      ansible.builtin.set_fact:
        gtm_wide_ips: "{{ gtm_wide_ips | default([]) + [ gtm_wide_ip_directory_defaults | combine(item.1, recursive=True) ] }}"
      loop: "{{ query('subelements', gtm_wide_ip_include_results.results, 'ansible_facts.gtm_wide_ip_fragment.gtm_wide_ips', {'skip_missing': True}) }}"
      vars:
        gtm_wide_ip_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        gtm_wide_ip_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', gtm_wide_ip_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).gtm_wide_ip_defaults | default({})
          }}

    - name: Aggregate GTM Wide IP deletions with directory settings
      ansible.builtin.set_fact:
        gtm_wide_ip_deletions: "{{ gtm_wide_ip_deletions | default([]) + [ (gtm_wide_ip_deletion_directory_defaults | combine(item.1, recursive=True)) | combine({'state': 'absent'}, recursive=True) ] }}"
      loop: "{{ query('subelements', gtm_wide_ip_deletion_include_results.results, 'ansible_facts.gtm_wide_ip_deletion_fragment.gtm_wide_ips', {'skip_missing': True}) }}"
      vars:
        gtm_wide_ip_deletion_settings_path: "{{ item.0.item | regex_replace('/[^/]+$', '/settings.yml') }}"
        gtm_wide_ip_deletion_directory_defaults: >-
          {{
            (
              lookup('ansible.builtin.file', gtm_wide_ip_deletion_settings_path, errors='ignore')
              | default('{}', true)
              | from_yaml
            ).gtm_wide_ip_defaults | default({})
          }}

    - name: Classify GTM object operations
      ansible.builtin.set_fact:
        gtm_datacenters_delete: >-
          {{
            ((gtm_datacenters | default([])) + (gtm_datacenter_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        gtm_datacenters_present: >-
          {{
            (gtm_datacenters | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (gtm_datacenters | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}
        gtm_monitors_delete: >-
          {{
            ((gtm_monitors | default([])) + (gtm_monitor_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        gtm_monitors_present: >-
          {{
            (gtm_monitors | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (gtm_monitors | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}
        gtm_servers_delete: >-
          {{
            ((gtm_servers | default([])) + (gtm_server_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        gtm_servers_present: >-
          {{
            (gtm_servers | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (gtm_servers | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}
        gtm_pools_delete: >-
          {{
            ((gtm_pools | default([])) + (gtm_pool_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        gtm_pools_present: >-
          {{
            (gtm_pools | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (gtm_pools | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}
        gtm_wide_ips_delete: >-
          {{
            ((gtm_wide_ips | default([])) + (gtm_wide_ip_deletions | default([])))
            | selectattr('state', 'defined')
            | selectattr('state', 'equalto', 'absent')
            | list
          }}
        gtm_wide_ips_present: >-
          {{
            (gtm_wide_ips | default([]))
            | rejectattr('state', 'defined')
            | list
            +
            (
              (gtm_wide_ips | default([]))
              | selectattr('state', 'defined')
              | rejectattr('state', 'equalto', 'absent')
              | list
            )
          }}

    - name: Derive GTM datacenters from servers
      ansible.builtin.set_fact:
        gtm_embedded_datacenters_present: "{{ gtm_embedded_datacenters_present | default([]) + [ {'name': item.datacenter, 'partition': item.partition | default('Common')} ] }}"
      loop: "{{ gtm_servers_present | default([]) }}"
      when: item.datacenter is defined

    - name: Derive GTM datacenter deletions from deleted servers
      ansible.builtin.set_fact:
        gtm_embedded_datacenters_delete: "{{ gtm_embedded_datacenters_delete | default([]) + [ {'name': item.datacenter, 'partition': item.partition | default('Common'), 'state': 'absent'} ] }}"
      loop: "{{ gtm_servers_delete | default([]) }}"
      when: item.datacenter is defined

    - name: Combine GTM datacenter sources
      ansible.builtin.set_fact:
        gtm_all_datacenters_present: "{{ (gtm_datacenters_present | default([])) + (gtm_embedded_datacenters_present | default([])) }}"
        gtm_all_datacenters_delete: "{{ (gtm_datacenters_delete | default([])) + (gtm_embedded_datacenters_delete | default([])) }}"

    - name: Derive inline GTM pool deletions from Wide IP deletions
      ansible.builtin.set_fact:
        gtm_inline_pool_deletions: "{{ gtm_inline_pool_deletions | default([]) + [ gtm_inline_pool_delete ] }}"
      loop: "{{ query('subelements', gtm_wide_ips_delete | default([]), 'pools', {'skip_missing': True}) }}"
      vars:
        gtm_inline_pool_delete: >-
          {{
            (
              item.1 if item.1 is mapping else {'name': item.1}
            ) | combine({
              'partition': (
                item.1.partition if (item.1 is mapping and item.1.partition is defined)
                else item.0.partition | default('Common')
              ),
              'record_type': item.0.record_type | default('a'),
              'state': 'absent'
            }, recursive=True)
          }}

    - name: Derive inline GTM pools from active Wide IPs
      ansible.builtin.set_fact:
        gtm_inline_pools_present: "{{ gtm_inline_pools_present | default([]) + [ gtm_inline_pool_present ] }}"
      loop: "{{ query('subelements', gtm_wide_ips_present | default([]), 'pools', {'skip_missing': True}) }}"
      vars:
        gtm_pool_is_inline: >-
          {{
            item.1 is mapping and (
              item.1.members is defined or
              item.1.default_monitors is defined or
              item.1.monitors is defined or
              item.1.preferred_lb_method is defined or
              item.1.alternate_lb_method is defined or
              item.1.fallback_lb_method is defined or
              item.1.fallback_ip is defined or
              item.1.ttl is defined or
              item.1.max_answers_returned is defined or
              item.1.availability_requirements is defined or
              item.1.enabled is defined or
              item.1.state is defined
            )
          }}
        gtm_inline_pool_present: >-
          {{
            item.1 | combine({
              'partition': item.1.partition | default(item.0.partition | default('Common')),
              'record_type': item.0.record_type | default('a')
            }, recursive=True)
          }}
      when: gtm_pool_is_inline | bool

    - name: Combine GTM pool sources
      ansible.builtin.set_fact:
        gtm_all_pools_present: "{{ (gtm_pools_present | default([])) + (gtm_inline_pools_present | default([])) }}"
        gtm_all_pools_delete: "{{ (gtm_pools_delete | default([])) + (gtm_inline_pool_deletions | default([])) }}"

  tasks:
    - name: Delete Wide IPs
      f5networks.f5_modules.bigip_gtm_wide_ip:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        type: "{{ item.record_type | default('a') }}"
        state: absent
      loop: "{{ gtm_wide_ips_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Delete GTM pools
      f5networks.f5_modules.bigip_gtm_pool:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        type: "{{ item.record_type | default('a') }}"
        state: absent
      loop: "{{ gtm_all_pools_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Delete manual GTM virtual servers for deleted pools
      f5networks.f5_modules.bigip_gtm_virtual_server:
        provider: "{{ provider }}"
        partition: "{{ item.1.partition | default(item.0.partition | default('Common')) }}"
        server_name: "{{ item.1.server }}"
        name: "{{ item.1.virtual_server }}"
        state: absent
      loop: "{{ query('subelements', gtm_all_pools_delete | default([]), 'members', {'skip_missing': True}) }}"
      loop_control:
        label: "{{ item.1.partition | default(item.0.partition | default('Common')) }}/{{ item.1.server }}/{{ item.1.virtual_server }}"

    - name: Delete GTM servers
      f5networks.f5_modules.bigip_gtm_server:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ gtm_servers_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Delete GTM datacenters
      f5networks.f5_modules.bigip_gtm_datacenter:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ gtm_all_datacenters_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"

    - name: Delete GTM BIG-IP monitors
      f5networks.f5_modules.bigip_gtm_monitor_bigip:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ gtm_monitors_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"
      when:
        - item.type == 'bigip'

    - name: Delete GTM external monitors
      f5networks.f5_modules.bigip_gtm_monitor_external:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ gtm_monitors_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"
      when:
        - item.type == 'external'

    - name: Delete GTM FirePass monitors
      f5networks.f5_modules.bigip_gtm_monitor_firepass:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ gtm_monitors_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"
      when:
        - item.type == 'firepass'

    - name: Delete GTM HTTP monitors
      f5networks.f5_modules.bigip_gtm_monitor_http:
        provider: "{{ provider }}"
        partition: "{{ item.partition | default('Common') }}"
        name: "{{ item.name }}"
        state: absent
      loop: "{{ gtm_monitors_delete | default([]) }}"
      loop_control:
        label: "{{ item.partition | default('Common') }}/{{ item.name }}"
      when:
