---
- name: Configure BIG-IP DNS/GTM objects for grafana.my.domain.com
  hosts: localhost
  gather_facts: false
  collections:
    - f5networks.f5_modules

  vars_files:
    - vars/common.yml
    - vars/gtm_config.yml

  tasks:
    - name: Create GTM datacenter for the A/B mirror pair
      when: enable_gtm | bool
      f5networks.f5_modules.bigip_gtm_datacenter:
        provider: "{{ provider }}"
        partition: "{{ partition }}"
        name: "{{ gtm_mirror_pair.datacenter }}"
        state: present

    - name: Register cluster LTMs as GTM servers
      when: enable_gtm | bool
      f5networks.f5_modules.bigip_gtm_server:
        provider: "{{ provider }}"
        partition: "{{ partition }}"
        name: "{{ item.gtm_server }}"
        datacenter: "{{ gtm_mirror_pair.datacenter }}"
        product: "bigip"
        server_type: "ltm"
        devices:
          - name: "{{ item.gtm_server }}"
            addresses:
              - "{{ item.gtm_server_ip }}"
        virtual_server_discovery: "disabled"
        link_discovery: "disabled"
        state: present
      loop: "{{ gtm_mirror_pair.members }}"

    - name: Create manual GTM virtual servers for cluster ingress VIPs
      when: enable_gtm | bool
      f5networks.f5_modules.bigip_gtm_virtual_server:
        provider: "{{ provider }}"
        partition: "{{ partition }}"
        server_name: "{{ item.gtm_server }}"
        name: "{{ item.virtual_server }}"
        address: "{{ item.address }}"
        port: "{{ item.port }}"
        translation_address: "{{ item.translation_address | default('') }}"
        translation_port: "{{ item.translation_port | default('') }}"
        monitors: "{{ item.monitors | default(['/Common/https']) }}"
        state: present
      loop: "{{ gtm_mirror_pair.members }}"

    - name: Create GTM pool for grafana using manual GTM virtual servers
      when: enable_gtm | bool
      f5networks.f5_modules.bigip_gtm_pool:
        provider: "{{ provider }}"
        partition: "{{ partition }}"
        name: "{{ gtm_mirror_pair.pool_name }}"
        type: "a"
        preferred_lb_method: "topology"
        alternate_lb_method: "global-availability"
        fallback_lb_method: "round-robin"
        members:
          - server_name: "{{ gtm_mirror_pair.members[0].gtm_server }}"
            virtual_server: "{{ gtm_mirror_pair.members[0].virtual_server }}"
          - server_name: "{{ gtm_mirror_pair.members[1].gtm_server }}"
            virtual_server: "{{ gtm_mirror_pair.members[1].virtual_server }}"
        state: present

    - name: Create the Wide IP for grafana.my.domain.com
      when: enable_gtm | bool
      f5networks.f5_modules.bigip_gtm_wide_ip:
        provider: "{{ provider }}"
        partition: "{{ partition }}"
        name: "{{ gtm_mirror_pair.wide_ip }}"
        type: "a"
        pool_lb_method: "topology"
        pools:
          - name: "{{ gtm_mirror_pair.pool_name }}"
            partition: "{{ partition }}"
            ratio: 1
        state: present

    - name: Explain health-check behavior for this GTM example
      when: enable_gtm | bool
      ansible.builtin.debug:
        msg:
          - "GTM pool members point at manually defined GTM virtual servers, not auto-discovered LTM virtuals."
          - "GTM health checks run directly against the configured VIP and port for each cluster member."
          - "This avoids the /Common to /K8s LTM virtual discovery/reference problem, but still requires GTM server and datacenter objects."
